body:
  text: 元史紀事本末紀事本末類提要臣等謹案元史紀事本末四卷明陳邦瞻撰凡列目二十有七其律令之定一條下注一補字則歸安臧懋修所増也明修元史僅八月而成書潦草殊甚後商輅等撰續綱目不能旁徴博采于元事亦多不詳此書採掇不出二書之外故未能及宋史紀事之賅博又于元明間事皆以為應入明國史于徐達破大都順帝駐應昌諸事皆畧而不書夫元初草創之蹟邦瞻既列于宋編又以燕京不守元帝北徂為當入明史是一代興廢之大綱皆沒而不著揆以史例未見其然至至正二十六年韓林兒之死乃廖永忠沈之𤓰步洪武中寧王權作通鑑博論已明著其事不過以太祖嘗奉其年號嫌于項羽義帝之事歸其獄于永忠耳邦瞻更諱之書卒尤為曲筆庫庫特穆爾自順帝北遷之後尚為元盡力屢用兵以圖興復故太祖稱王巴拜真男子以為勝常遇春後秦王樉妃即納其女邦瞻乃以為不知所終亦不免于失實特是元代推步之法科舉學校之制以及漕運河渠諸大政措置極詳邦瞻于此數端紀載頗為明晰其他治亂之蹟亦尚能撮舉大槩攬其指要固未嘗不可以資考鏡也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f98b44c18eb6635c05f6c120c08215f272bf2362896ae818be5d5600b67b8ed4

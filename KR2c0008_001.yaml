body:
  text: 元史紀事本末卷一明陳邦瞻撰江南羣盜之平世祖至元十七年十二月漳州民陳桂龍兵起福建都元帥旺扎勒圖等擊走之桂龍及其兄子陳弔眼有衆數萬屯高安寨據之朝廷命旺扎勒圖及副帥高興討之時建寧賊黃華勢尤倡獗旺扎勒圖先引兵壓其境華驚懼乞降旺扎勒圖奏以華為副元帥凡軍行悉以咨之桂龍等乘高為險人莫敢進興命人挾束薪進至半山棄薪走如是六日誘其矢石皆盡乃爇薪焚山斬首二萬級桂龍遁走入畬洞十九年夏四月陳桂龍降初桂龍既遁陳吊眼猶擁衆連五十餘寨未下高興等擊斬之桂龍等遂帥其黨來降詔流桂龍於邊地十二月獲福州叛賊林天成戮于市二十年三月廣州新會林桂方趙良鈐等擁衆萬餘號羅平國稱延康年號擒之九月象山縣海賊尤宗祖等聚衆剽掠海上哈喇台等招降之凡九千五百九十二人海道以寧冬十月建寧路總管黃華復反聚衆十萬號頭陀軍稱宋祥興年號破崇安浦城諸縣復攻建寧詔史弼等引兵急擊之華敗走自焚餘黨悉潰二十一年二月漳州盜起雍州賓州梧州韶州衡州民黃大成等相延為亂命湖南宣慰使色勒敏將兵討之詔遷宋宗室及大臣之仕者于內地時荆湖閩廣之間兵興無寧嵗有言宋宗室居江南欲反者遣使捕之宿衛士諤爾根薩里曰江南初下民疑未附宋宗室反不聞郡縣言而信一人浮言捕擊之恐人人自危矣帝悟召使者還故有是詔十一月江西行省參知政事雲丹密實擒獲海盜黎德及招降餘黨百三十三人即其地誅黎德以徇以德弟黎浩及偽招討吳興等檻送京師二十二年二月廣東宣慰使雲丹密實討潮惠二州盜郭逢貴等四十五寨降民萬餘户軍三千六百一十人請將所獲逢貴等入覲面陳事宜詔許之秋七月至京師言山寨降者百五十餘所帝問戰而後降耶招之即降耶對曰其首拒敵者臣已磔之矣是皆招降者也因言前大兵後未嘗撫治其民州縣官復無至者故盜賊各據土地互相攻殺人民漸耗今宜擇良吏往治從之二十三年春正月西州趙和尚自稱宋福王子廣王以誑民謀作亂伏誅八月婺州永康縣民陳巽四等謀反伏誅十一月詔議弭盜僧格伊蘇特穆爾言江南歸附十年盜賊迄今未清宜降旨立限招捕而以安集責州縣之吏其不能者黜之葉季言臣在漳州十年詳知其事大抵軍官嗜利與賊通者尤難弭息宜令各處鎮守軍官例以三年轉徙庶革斯弊帝皆從之詔江西行省平章呼圖克特穆爾督捕廣東等處盜賊二十五年夏四月廣東民董賢舉浙江民楊鎮龍柳世英循州民鍾明亮各擁衆萬餘相繼起兵皆稱大老明亮勢尤猖蹶詔遣江西行省丞相蒙固岱行樞密院副使雲丹密實發四省兵討之明亮屢降復叛既而福建按察使王惲上疏言福建郡縣五十餘處連山距海實邊徼要區由平宋以來官吏殘虐故愚民往往嘯聚朝廷遣兵討之復致蹂踐甚非一視同仁之意况福建歸附之民戶幾百萬黃華之變十去四五今明亮之勢又烈於華其可以尋常草竊視之乎宜選精兵明號令以計取之不然禍未已也御史大夫伊嚕勒亦言江南盜起凡四百餘處宜選將討之帝曰雲丹密實屢以捷聞蒙固岱已往卿毋以為慮二十六年夏四月禁江南民挾弓矢犯者籍以為兵五月明亮率衆萬八千五百七十三人來降六月雲丹密實請以降賊明亮為循州知州宋士賢為梅州判官丘應祥等十八人為縣尹巡尉帝不允令明亮應祥並赴都冬十月雲丹密實以丘應祥董賢舉歸于京師丙戌明亮復反以衆萬人冦梅州江羅等以八千人冦漳州又韶雄諸賊二十餘處皆舉兵應之聲勢張甚詔雲丹密實復與福建江西省合兵討之且諭旨雲丹密實鍾明亮既降朕令汝遣赴闕而汝玩常不發致有是變自今降賊其即遣之是月婺州賊葉萬五以衆萬人冦武義縣殺千户一人江淮省平章布琳濟達將兵討之十一月漳州賊陳機察等八千人冦龍巖執千戶張武義與楓林賊合福建行省兵大破之陳機察邱大老張順等以其黨降行省請斬之以警衆事下樞密院議范文虎曰賊固當斬然既降乃殺之何以示信宜並遣赴闕從之二十七年春正月江西賊華大老黃大老等掠樂昌諸郡行樞密院討平之三月建昌賊邱元等稱大老集衆千餘人掠南豐諸郡太平縣賊葉大五集衆百餘人寇寧國皆擒斬之五月雲丹密實與江西行省管如德合兵討明亮降詔縛至闕下如德留明亮等不遣明亮復率衆寇贑州六月徽州績溪賊胡發饒必成杭州賊唐珍建平賊王靜照蕪湖賊徐汝安孫惟俊等皆伏誅十一月江淮行省平章布琳濟達言福建盜賊已平惟浙東一道地極邊惡賊所巢穴初巴延等於各路置軍鎮戍蓋視地之輕重而為多寡後為蒙固岱更易其法今宜復還三萬户分戍之揚州建康鎮江三城跨據大江人民繁會宜置萬户府七杭州行省諸司府庫所在宜置萬户府四瀕海沿江要害二十二所宜增置戰艦分兵閲習水戰之法從之是月興化路仙遊賊朱三十五冦青山處州青田賊劉甲乙等集衆萬餘人冦溫州平陽二十八年秋七月遣哈克繖總兵討平江南盜賊二十九年春正月詔江南避亂者令復業九月治書侍御史裴居安言雲丹密實遇盜起不即加兵盜去乃延誅平民詔台院遣官雜問之三十年二月江西行院雲丹密實言江南豪右多庇匿盜賊宜誅為首者餘徙內縣從之成宗元貞二年冬十月贛州民劉六十聚衆至萬餘建立名號朝廷遣將討之多觀望不進賊勢益盛江南行省左丞董士選請自往進至興國距其營百里命將校分兵守地悉置激亂之人於法復誅姦民之為囊槖者于是民爭出自效不數日六十就擒餘黨悉散事平士選遣使奏聞但請黜贓吏數人而已略不及破賊事時稱其不伐北邊諸王之亂納延海都都勒世祖至元二十四年夏四月諸王納延反納延烈祖第五子伯勒格特之曽孫伊蘇布哈之孫廣寧王卓多之次子也始納延遣使徵東道兵帝諭諸王羅壘特穆爾毋輒發或告納延反帝遣巴延往覘之巴延多載衣裘入其境輒以與驛人既至納延謀執之巴延覺與其從者趨出分三道逸去驛人以得衣裘故爭獻健馬遂得脫馳還白狀至是納延反時西北諸王多欲從之帝以為憂宿衛使阿實克布哈曰此莫若先撫安諸王乃行天討則叛者勢自孤矣帝曰善爾試為朕行之乃北説諸王納延曰大王聞納延反耶曰聞之曰大王知納延已遣使自歸耶曰不知也曰聞大王等皆欲為納延外應今納延既自歸矣是獨大王與主上抗耳大王何不往見上自陳為萬全計納延許之於是諸王之謀乃解帝遂議親討之五月遣額森傳旨諭北京等處宣慰司凡隸納延所部者禁其往來毋淂乘馬持弓矢時將校多納延部人或其親昵立馬相嚮語輒釋仗不戰帝患之浙西道儒學提舉葉李密啓曰兵貴奇不貴衆臨敵當以計取彼既親昵誰肯盡力徒費陛下糧餉四方轉輸之勞臣請令漢軍列前少戰而聮大軍斷其後以示死鬬彼嘗玩我必不設備我以大衆踣之無不勝矣帝然之乃詔左丞李庭等將漢軍用漢法以戰六月帝至實喇圖嚕之地納延黨金嘉努塔布台擁衆號十萬進逼乘輿帝親麾諸軍圍之納延堅壁不出司農卿特爾格曰彼衆我寡當以疑退之於是帝張蓋據胡牀特爾格進酒塔布台按兵不敢進李庭曰彼夜當遁耳乃引壯士千餘人抱火炮夜入其陳炮發果自潰散帝曰何以知之庭曰塔布台兵雖多然無紀律見車駕駐此而不戰必疑有大軍繼之是以知其必遁遂命庭將漢軍伊實特穆爾將蒙古軍並進納延敗走追執之秋七月納延黨諸王齊都爾犯咸平遼東宣慰使托爾楚遣使馳驛以聞帝命領軍一萬與皇子阿雅噶齊同力備禦之時女真碩達勒達官民皆與納延連結托爾楚棄妻子與麾下十二騎直抵建州距咸平千五百里與納延黨達春巴圖魯等合戰兩中流矢繼知其黨特爾格徹爾等欲襲皇子乃以千餘人扈從渡遼水身與納延兵接戰轉鬬而前射其酋特爾格岱中其口鏃出于項墮馬死遂軍懿州懿州老幼千餘人焚香羅拜道旁泣曰非宣慰公吾屬無遺種矣托爾楚曰今日之事上賴皇帝洪福下賴將士之力吾何功焉又追納延餘黨北至金山戰捷帝嘉其功賜明珠虎符充蒙古軍萬户二十五年春正月諸王海都犯邊海都者太宗之孫哈沙大王之子也世居北方自定宗以來日尋干戈至元初即有叛意廷議欲伐之帝曰朕以宗室之情惟當懷之以德其擇謹密足任大事者往使焉左右以平陽馬步改達嚕噶齊特里克對遂召見特里克應對稱旨帝嘉其辨慧曰此事非此人不可然必先詣巴圖蒙克特默王所相與計事而後行使二人副之特里克既奉命欲直造海都境視其虛實然後議于諸王副者持不可特里克曰親承密旨違則當誅副者懼而從之既至海都日召宗親宴飲將伺其隙謀害之特里克厲聲斥之曰且食毋令語言脫口相托為罪海都愕然曰直哉酒半特里克求衣為歡海都嘉其雄辨將解與之其妃止之以皮服三襲付之因語其屬曰為使者當如是矣厚贈以行乃至巴圖蒙克特默王所具告之故王曰祖宗有訓叛者人得誅之如通好不從舉師以行天罰我即外應勦絶何有特里克還悉以事聞因言曰海都兵繁而鋭不宜速戰來則堅壘待之去則勿追自守既固即無虞矣帝深然之敕所受海都皮服全飾以金凡朝會宜服以表示焉是嵗詔封皇子諾木罕為北平王率諸王兵鎮守而以安圖行省院事既而海都叛帝大閲兵將討之先命戶部尚書錫巴爾使海都諭令罷兵置驛來朝錫巴爾至海都傳旨海都聽命既退軍置驛而丞相安圖軍先已克和爾和特默王部曲盡獲其輜重海都懼將逃謂錫巴爾曰我不難殺汝念我父嘗受書于汝歸以安圖之事聞非我罪也錫巴爾以聞帝曰汝言是也尋命為中書右丞議政事妻以宗王女布琳章公主明年復使諭海都且曰茍不從我能諸王蕃衛兵乎海都辭以畏死不敢至是復冦邊巴圖約蘇圖迎擊死之夏四月詔皇孫特穆爾行邊納延餘黨和爾果斯及哈坦等尚攻掠邊郡未下詔皇孫特穆爾北撫諸軍進討之都指揮圖圖爾哈擊敗和爾果斯章伊拉衮還至哈拉衮山夜渡格哷勒復擊敗哈坦軍盡得遼左諸部置東路萬户府二十六年二月哈坦兵冦壺盧口開元路治中烏雲雅勒呼格戰連破之六月庚申諸王奈曼岱敗哈坦兵於托果爾河辛巳海都犯邊圖圖爾哈從皇孫晉王征之抵杭海嶺敵先據險諸軍失利惟圖圖爾哈以其軍直前鏖戰翼晉王而出追騎大至乃選精鋭設伏以待之冦不敢逼海都兵至和林宣慰使奇卜同知奈曼岱副使巴噶塔喇皆反應之劉哈喇巴圖爾乘間逃歸秋七月帝自將討海都至北邊召見圖圖爾哈慰諭之曰昔太祖與臣下同患難者飲班珠爾河之水以記功今日之事何愧昔人卿其勉之二十七年二月哈坦冦遼東海陽五月冦開元平章政事哲爾特穆爾帥師戰于烏法大破之二十九年冬十月諸王穆爾特穆爾附海都以叛詔巴延討之至額森呼圖克嶺已為穆爾特穆爾所據矢下如雨巴延先登陷陳諸軍望風爭奮大破之穆爾特穆爾挺身走命蘇克特們德爾等追之巴延軍還夜至布色圖卒遇伏兵巴延堅壁不動黎明遂引去巴延輕騎追至巴奇爾會蘇克特們德爾等亦至乃夾擊之斬首二千餘級軍中獲諜者錫都欲殺之巴延不許厚賜之遣齎書諭穆爾特穆爾以禍福穆爾特穆爾得書感泣率其衆來降三十年三月括諸路馬時以海都入冦詔羣臣議所以為備從樞密李廷言復括天下馬凡得十一萬匹六月詔皇孫特穆爾撫軍北邊召巴延還以伊實特穆爾代之時有譖巴延久居北邊與海都通好因仍保守無尺寸之獲者詔受皇孫特穆爾以皇太子寶撫其軍以太傅伊實特穆爾輔行召巴延居大同以俟後命伊實特穆爾未至三驛海都兵復至巴延遣人語伊實特穆爾曰公姑止待我剪此冦而來未晚也遂與海都兵交且戰且却凡七日諸將以為怯憤曰果懼戰何不授軍於太傅巴延曰海都懸軍涉吾地邀之則遁誘其深入一戰可擒也諸君必欲速戰若失海都誰執其咎諸將曰請任之即還軍擊敗之海都果脫去乃召伊實特穆爾至軍中授以印而行成宗大德元年冬十月奇徹都指揮使成格勒攻破巴林之地還擊海都軍敗走之巴林之地時為海都所據成格勒帥師於金山進攻之其將達朗台阻達嚕噶河而軍伐木柵岸以自庇士皆下馬跪坐持弓矢以待成格勒奮師馳擊大破之盡得其人馬廬帳還次阿嚕河與海都援將巴拜遇成格勒麾軍渡河蹙之巴拜敗走僅以身免十二月駙馬齊爾濟蘇遇冦敗沒是嵗秋諸王將帥共議備邊事咸曰敵往嵗不冬出且可休兵于境竒爾濟蘇特嚴兵待之冬敵果大至竒爾濟蘇三戰三克乘勝逐北馬躓為敵所執誘使降不屈又欲妻以女竒爾濟蘇毅然曰我天子壻也非天子命而可再娶乎竟不屈死焉三年十二月命兄子哈尚鎮漠北哈尚帝兄達爾瑪巴拉之長子帝以寧逺王庫庫楚總兵北邊怠于備禦命哈尚即軍中代之四年八月哈尚與海都軍戰于呼巴哩之地敗之五年九月海都與都勒斡諸部大舉入冦哈尚躬督成格勒等五軍合擊大破之阿實克射都勒斡中膝號遁去海都不得志引還旋亦死七年秋七月都勒斡遣使降都勒斡既敗聚其屬及海都之子謀遣使請命使至伊徹察喇會諸王將帥議曰都勒斡乞降事當待命於上然往返再閲月恐失事機乃使馬烏赫哩往報之既遣始以聞帝嘉之詔慎飭軍士安置驛傳以俟自是諸王叛者相率來歸武宗至大元年十二月伊徹察喇進攻徹伯爾諸部平之伊徹察喇言諸王之在邊境者素無悛過之心儻諸部合謀必為國患請撫安都勒斡之子科綽及處諸部來歸者於金山之陽遣軍屯田山北脫彼有謀吾已據其腹心矣帝稱善趣軍進攻之徹伯爾等果欲奔科綽不納遂相率來降漠北悉平三年三月賜諸王徹伯爾幣帛初世祖以海都叛詔積其分地五户絲為幣帛俟其來降賜之至是其子徹伯爾來歸尚書省臣請以賜之帝曰世祖謀慮深逺若是待諸王朝會班賞既畢卿等備述其故然後與之使彼知愧高麗之臣世祖至元十七年始置驛站于高麗初太祖十一年契丹人祿格領衆九萬餘竄入高麗拔江東城據之太祖遣哈齊濟扎蘭等領兵往其國助攻滅祿格諭令嵗輸貢賦高麗尋進方物謝十六年諭以伐女真事始奉表陳賀屢遣使至其國會使者為盜所殺遂絶太宗三年命薩里台帥兵攻之國人洪福源迎降薩里台使福源抵王京招其主王㬚㬚遣其弟侹請和許之置京府縣達嚕噶齊七十二人監之遂班師四年㬚盡殺朝廷所置官以叛復遣薩里台以兵往至王京南攻其處仁城中流矢卒軍還㬚亦上表謝罪自後叛服不常憲宗八年凡四命將征之拔其城十有四憲宗末㬚遣其世子倎入朝至帝中統元年㬚卒命倎歸國封為高麗國王以兵衛送之仍赦其境內二年倎更名植遣世子愖奉表以聞五年植自入朝至元三年帝欲通好日本諭高麗與日本鄰國宜為鄉導五年植遣其弟淐入朝帝以植欺罔淐至面數其事切責之特遣使詔諭植責令供軍實造戰艦助攻宋及日本植復遣其臣來朝六年植上表奏誅權臣金俊等復遣世子愖入朝愖至奏本國臣下擅廢植立其弟安慶公淐事詔遣鄂爾多斯布哈李諤等至其國詳問之尋詔授愖特進上柱國率兵三千赴國難帝以植淐廢置出其臣林衍所為詔植淐衍等同詣闕面陳情實先遣兵壓境不至即以時進討未幾高麗統領崔坦等以林衍作亂挈西京五十餘城人附詔樞密院議征高麗事初馬亨以為高麗者本箕子所封之地漢晉皆為郡縣今雖來朝其心難測莫若嚴兵假道以取日本為名乘勢可襲其國定為郡縣馬希驥亦言今高麗乃古新羅百濟高句麗三國併而為一大抵藩鎮權分則易制諸侯強盛則難臣驗彼州城軍民多寡離而為二分治其國使權侔勢等自相維持則徐議良圖亦易為區處議皆未決會使者至其國植受詔復位旋親朝京師七年以高麗西京內屬改東寧府畫慈悲嶺為界蒙固圖為安撫使佩虎符率兵戍其西境仍詔諭高麗僚屬軍民以討林衍之故時植復入朝朝廷遣軍送植就國敕將帥嚴戒兵士勿令有所侵犯會林衍死衍黨復立承化侯為王竄入珍島大軍進至王京西關城遣人收繫衍妻子植入居舊京是年復詔植送使者通好日本八年諸將大破珍島賊平之十年植屢言國小地狹比嵗荒歉其生劵軍乞駐東京詔令營北京界仍敕東京路運米二萬石賑之十一年植卒世子愖襲爵改名睶尚皇女和塔拉竒爾默色十四年征東元帥府上言高麗侍中金方慶陰養死士匿鎧仗器械造戰艦積糧餉謀作亂捕方慶等按驗得實已流諸海島然髙麗親附民心未安可發征日本還卒二千七百人置長吏屯忠清全羅諸處鎮撫其民且令士卒備牛畜耒耜為屯田計從之十九年睶上言日本冦其邉海郡邑燒居室掠子女而去請發庫哩特穆爾麾下蒙古軍五百人戍金州從之二十年立征東行中書省以髙麗國王睶與安塔哈共事二十八年髙麗飢詔給米一十萬斛賑之成宗大德元年封髙麗國王昛為逸夀王睶前改名以世子謜為髙麗王從所請也二年中書省臣奏謜有罪當廢復以其父昛為王三年昛遣使入貢丞相等言昛在國僭擬不法謜年少妄殺無辜乞降詔戒飭從之會哈克繖使髙麗還言昛不能服其衆朝廷宜遣官共理之遂復立征東行省命庫哩濟蘇為髙麗行省平章事五年復罷行省官是年昛卒子謜復立謜死子燾嗣燾死弟皓嗣日本用兵世祖至元十七年五月召范文虎議征日本日本古倭奴國在東海之東先是至元一年以髙麗人趙彛等言日本國可通擇可使者三年八月命兵部侍郎赫德給虎符充國信使禮部侍郎殷𢎞副之持國書使日本書曰大蒙古皇帝奉書日本國王朕惟自古小國之君境土相接尚務講信修睦况我祖宗受天明命奄有區夏遐方異域畏威懷德者不可悉數朕即位初以高麗無辜之民久瘁鋒鏑即令罷兵還其疆域髙麗君臣感戴來朝歡若父子計王君臣亦已知之高麗朕東藩也日本密邇高麗開國以來亦時通中國至於朕躬而無一乘之使以通和好尚恐王國知之未審故特遣使布告朕志冀自今以往通問結好以相親睦赫德等道由高麗高麗國王王植以帝命遣其臣宋君裴金贊等道詔使往日本不至而還四年六月帝謂王植以辭為解令去使徒還復遣赫德等至高麗諭植委以日本事以必得其要領為期植以為海道險阻不可辱天使九月遣其臣潘阜等持書往日本留六月亦不得其要領而歸五年九月命赫德復持書往至對馬島日本拒而不納執其塔二郎彌二郎二人而還六年六月命高麗送還執者俾中書省牒其國亦不報十二月又命祕書監趙良弼往良弼將行乞定與其王相見之儀廷議與其國上下之分未定無禮數可言帝從之七年十二月詔諭髙麗國王植送弼期必達八年六月日本通事曹介升等上言髙麗迂路導引國使外有捷徑儻得便風半日可達若使臣去則不敢同往若大軍進征則願為鄉導帝曰如此則當思之九月高麗王植遣其通事徐稱導良弼至日本日本始遣彌四郎者入朝帝宴勞遣之九年二月良弼遣書狀官張鐸言去嵗九月與日本彌四郎等至其大宰府西守護所守者云曩為高麗所紿屢言上國來伐豈期皇帝好生惡殺先遣行人下示璽書然王京去此尚逺願先遣人從奉使回報良弼乃遣鐸同其使二十六人至京師求見帝疑其國主使之云守護所者詐也詔問姚樞許衡等皆曰誠如聖算彼懼我加兵故發此輩伺吾強弱耳宜示之寬仁且不宜聽其入見從之是月高麗王植復以書諭日本令必通好大朝竟不報十年六月良弼復往使至大宰府而還十一年三月命經略使錫都察球爾等以千料舟巴圖魯輕疾舟汲水三舟各三百載士卒一萬五千期以七月征日本冬十月入其國敗之而官軍不整又矢盡惟虜掠四境而還十二年二月遣禮部侍郎杜世忠等往使復致書亦不報十四年日本遣商人持金來易銅錢許之十七年二月日本殺國信使杜世忠等征東元帥錫都察球爾請自帥帥往征日本廷議姑少緩之至是月帝召范文虎議征日本方略旋詔括前願從軍者及張世傑潰軍往征日本九月發兵十萬命范文虎將之賜右丞察球爾所將征日本新附軍鈔及甲十二月髙麗國王睶率兵萬人戰船九百艘征日本詔給察球爾等戰具高麗鎧甲戰襖諭諸將兵道高麗毋擾其民十八年春正月召日本行省右丞相阿勒哈右丞范文虎等赴闕授方略二月諸將陛辭帝敕曰始因彼國使來故朝廷亦遣使往彼留我使不還故使卿輩為此行朕聞漢人言取人家國欲得百姓若盡殺其人徒得地何用更有一事慮卿等不和耳假若彼國使至與卿輩有所議當同心協謀如出一口答之六月阿勒哈卒詔以左丞安塔哈代之八月范文虎等喪師遁還上言初至日本欲攻大宰府暴風破舟猶欲議戰萬戶厲德彪招討王國佐等不聽節制輒逃去本省戰餘軍還合浦散遣還鄉里未幾敗卒于閶歸言官軍六月入海七月至平壺島移五龍山八月一日風破舟五日文虎等諸將各自擇堅好船乘之棄士卒十餘萬於山下衆議推張百戶者為主帥方伐木作舟欲還七日日本人來戰盡死餘二三萬為其虜去九月至八角島盡殺蒙古髙麗漢人謂親附軍為唐人不殺而奴之閶輩是也蓋行省官議事不相下故皆棄軍歸久之莫青吳萬五者亦逃還是役也十萬之衆得還者三人而已十一月敕高麗國金州等處置鎮邊萬户府以控制日本髙麗國王請完海濱城防日本不允十二月罷日本行中書省二十年春正月發五衛軍二萬人征日本詔糴糧于察罕諾爾以給軍匠三月命安塔哈為日本行省丞相與徹爾特穆爾劉二巴圖魯大募兵造舟伐日本中丞崔彧言江南相繼盜起皆緣募水手造海船民不聊生日本之役宜姑止之江南四省應辦軍需宜量民力勿強以土産所無凡給物價及民者必以實召募水手當從所欲伺民之氣稍蘇我之力粗備二三年復東征未晚不從二十一年春正月遣王積翁齎詔使日本取道慶元航海帝以其俗尚佛命補陀僧如智同往舟人有不願行者共謀殺積翁二十二年十一月敕漕江淮米百萬石泛海貯於高麗之合浦仍令東京及高麗各貯米十萬石備征日本期諸軍於明年三月以次而發會于合浦是月復赦囚徒黥其面及招宋時販私鹽軍習海道者為水工以征日本二十三年春正月詔罷征日本以方議伐安南故也先是立征東行省敕各處造海舶集漕船募水手貯糧餉有司征斂大為姦利吏部尚書劉宣上言近議再興日本之兵此役不息安危所係近用索多議伐占城哈雅言征交址三數年間吏民大擾盜賊蝟興且交址小邦親王提兵深入無功反殪大將况日本海洋萬里非二國比萬一不利援兵安能飛渡耶帝納其言遂下詔罷征日本成宗大德元年江浙省臣伊遜岱爾乞用兵日本帝曰今非其時朕徐思之三年遣僧寧一山加妙慈𢎞濟太師附商舶往使日本日本竟不至八年夏四月置千户所戍定海以防嵗至倭船十年夏四月倭商有慶等抵慶元貿易以金鎧甲為獻命江浙行省備之占城安南用兵世祖至元十九年六月詔發軍討占城初朝廷以占城既附遣索多就其國立省撫治之王子補的負固弗率凡使臣經其國者皆被執帝怒決意進討發淮浙福建湖廣軍五千海船百艘戰船二千五百命索多將之以行二十年春正月索多攻占城破之入其國王子遁入山谷後遣其臣寶脫秃花陽求歸順以欵師復潛殺所入使臣皇甫傑等百餘人索多等久之方覺其詐乃遣兵攻之轉戰至木城下阻隘不敢進賊軍旁截歸路軍殊死戰得出索多等遂謀引還二十一年二月命安塔哈發兵萬五千人船二百艘征占城船不足命江西省益之秋七月詔鎮南王托歡征占城與左丞李恆往會索多兵俱進復以安南通謀占城令軍行假道於其國且徵其糧餉以給軍十二月托歡軍次安南安南王陳日烜言其國至占城水陸非便遣兵分道拒守境上二十二年五月托歡軍擊陳日烜敗走之遂入其城而還日烜遣兵來追索多李恆戰死初托歡屢移書日烜欲假道竟不納益修兵船為迎敵計托歡乘間縳筏為橋渡富良江北與日烜大戰破之日烜遁走不知所之其弟益稷率其屬來降托歡聚諸將議交人拒敵官軍雖數敗散然增兵轉盛官軍疾疫死傷亦衆占城竟不可達乃謀引兵還交兵追襲之李恆中毒矢至思明卒索多軍與托歡相去二百餘里托歡軍還索多猶未知之亟趨其營交人邀于乾滿江力戰而死秋七月樞密院言鎮南王所統征交址兵久戰力疲請發蒙古軍千人漢軍新附四千人取鎮南王節制以征安南帝從之復以唐古特為荆湖行省左丞唐古特請放征安南軍還家休息詔從鎮南王處之二十三年春正月詔以陳益稷自拔來歸封為安南國王仍命鎮南王托歡左丞相阿爾哈雅平定具國以兵納益稷時湖南宣慰司上言連嵗征日本及用兵占城百姓罷弊轉輸賦役煩重貧民鬻子應役舉動之間利害非一且安南已嘗遣使納表稱藩若從其請以蘇民力計之上也無已則宜寬百姓之賦積糧餉繕甲兵俟來嵗天時稍利然後大舉未晚會吏部尚書劉宣亦言之帝是其請命還軍居益稷於鄂州二十四年春正月復詔托歡督右丞程鵬飛參知政事樊楫等進擊安南鵬飛與楫等分兵三道水陸並進凡十七戰皆捷遂深入其境安南王日烜棄城走於海二十五年二月托歡復遣兵追陳日烜於海不知所之右丞相阿巴齊曰賊棄巢穴逺遁意待吾敝而乘之將士皆北人春夏之交瘴癘將作賊弗就擒饋餉且盡吾不能持久矣時日烜復遣使請降以疑師諸將信其説久之不降擁衆據海口阿巴齊率衆攻之將士多被疫不能進諸蠻復叛所得險厄皆失守遂謀引還日烜復集散兵三十萬守禦東關遏托歡歸路諸軍且戰且行日數十合賊據險竊發毒矢將士裏瘡以戰樊楫阿巴齊皆死前軍齊都爾奮勇乘之交人小却托歡由間道趨還日烜尋遣使入朝貢金人以贖已罪帝以托歡無功而還令出鎮揚州終身不許入覲二十八年冬十月遣禮部尚書張立道使安南徵其王入朝初托歡等既還帝怒安南不已欲再伐之會日烜死子日燇襲位博果密曰彼山海小夷以天威臨之寧不震懼獸窮則噬勢使之然今若遣使諭之彼宜無不奉命遂以立道嘗使安南有功復使往徵其王入朝二十九年九月復遣吏部尚書梁曾編修陳孚使安南徵其王入朝時以張立道既還日燇不至故特詔往徵之三十年八月安南遣使入貢詔安置於江陵復議舉兵伐之初梁曾等至安南其國有三門日燇欲迎詔自旁門入曾貽書責之往復者三卒從中行且諷之入朝日燇不從遣其臣陶子奇偕曾來貢曾進所與日燇辨論書帝大悅解衣賜之廷臣以日燇終不入朝遂拘陶子奇於江陵命劉國傑與諸王伊勒吉岱等整兵聚糧復議伐之十二月平章政事伊克默色史弼高興等以征安南無功而還各杖而恥之仍沒其家資三之一三十一年五月罷安南兵釋其使歸國時帝崩皇孫特穆爾即位故有是詔西南夷用兵緬齒八百媳婦金世祖至元十九年二月議征緬國先是至元八年大理善闡等路宣慰司遣奇塔特因使緬國招其王內附緬使價博詣京師帝復遣使詔諭之十四年雲南省臣言緬王無降心去使不返勢須用兵帝未許已而雲南都元帥尼雅斯拉鼎率兵入緬界稍稍招降其衆以天熱還師至是上言緬國形勝盡在臣目中可擊帝悅遂以塔布為右丞伊蘇德濟為參政命諸王桑阿克達爾督諸軍復往擊之二十年十一月桑阿克達爾等分道攻緬拔江頭城令都元帥袁世安戍之復遣使詔諭緬王不應議以建都大公城乃其巢穴遂水陸進兵攻拔之二十一年春正月建都王烏蒙金齒西南夷十二部俱降初諸國為緬所制欲降不果至是因緬城既拔遂皆來降夏四月呼圖克特穆爾征緬之師為賊衝潰詔發思播田楊二家軍助之二十四年春正月緬始平乃定嵗貢方物二十九年八月遣蒙果勒默色以軍征八百媳婦國成宗元貞二年十二月立徹爾軍民總管府雲南行省臣言大徹爾地與八百媳婦犬牙相錯今大徹爾胡念已降小徹爾復占扼地利多相殺掠胡念遣其弟胡倫乞别置一司擇通習蠻夷情狀者為之帥招其來附以為進討之地從之大德四年五月征緬初緬人僧哥倫作亂緬王執其兄阿散哥也尋釋之阿散哥也乃率其黨囚王於豕牢因弒之王次子奔訴京師詔遣色辰額哷等率行省兵二千人討之十二月遣雲南行省左丞劉深將兵擊八百媳婦旺扎勒因劉深之言勸帝曰世祖以神武一海內功蓋萬世今陛下嗣大厯服未有成功以彰休烈西南夷有八百媳婦未奉正朔請往征之哈喇哈遜曰山嶠小夷遼絶萬里可諭之使來不必逺厪兵力不聽竟發兵二萬命深及哈喇岱等將之以往御史中丞董士遐亦言不當輕信一人妄言而置百萬生靈於死地帝變色曰事已成卿勿復言麾之出五年夏四月調雲南軍征八百媳婦五月雲南土官宋隆濟叛時劉深等取道順元逺冒煙瘴未戰士卒死者已十七八驅民轉餉溪谷之間一夫負粟八斗率數人佐之數十日乃達死者亦數十萬人中外騷然而深復令雲南調民供餽及脅求水西土官之妻蛇節金三千兩馬三千匹隆濟因紿其衆曰官軍徵發爾等將悉剪髮黥面為兵身死行陳妻子為虜衆惑其言遂叛六月宋隆濟率苖狫紫江諸蠻四千人攻楊黃寨殺掠甚衆隆濟進攻貴州知州張懷德力戰敗死遂圍劉深於窮谷中梁王庫庫兵救之賊衆稍却八月遣色辰額哷等兵伐金齒諸蠻時征緬師還為金齒所遮士多戰死金齒地連八百媳婦諸蠻相效不輸稅賦賊殺官吏故皆征之九月誅高慶察罕布哈免色辰額哷為庶人初色辰額哷等兵攻阿散哥也不克引還言賊降在朝夕慶等受其賂首唱為還計是以無功詔遣官鞠之得色辰額哷以下將校受賂狀詔誅慶及察罕布哈色辰額哷等遇赦削奪官爵為庶人十一月遣劉國傑率師討宋隆濟及蛇節時劉深兵敗帝始悔不用哈喇哈遜及董士選之言乃遣劉國傑及楊賽音布哈等率四川雲南湖廣兵分道進討諸蠻别敕梁王提兵應之軍中機務一聽國傑處分六年春正月宋隆濟屢攻貴州不解劉深等糧盡道梗不通遂引兵還隆濟復率衆邀之輜重委棄士卒殺傷殆盡南臺御史中丞陳天祥上書諫曰八百媳婦乃荒裔小夷取之不足以為利不取不足以為害而劉深欺上罔下逺勤大衆經過八番縱橫自恣中途變生所在皆叛既不制亂反為亂衆所制食盡計窮倉皇退走喪師十八九棄地千餘里朝廷再發四省之兵使劉二巴圖總督以圖收復湖南湖北大發運糧丁夫衆至二十餘萬况當農時驅此愁苦之人往回數千里中何事不有比文從政敗卒言西南諸夷皆重山復嶺陡澗深林其窄隘處僅容一人一騎上如登天下如入井賊若乘險邀擊我軍雖衆無施或諸蠻逺阻險隘以老我師進不得前旁無所掠將不戰自困矣且自征伐倭國占城緬諸夷以來近三十年未嘗有尺土一民之益計其所費可勝言哉去嵗西征及今此舉何以異之乞早正深罪乃下明詔招諭彼必自相歸順不須逺勞王師與小醜爭一朝之勝負也為今之計宜駐兵近境多市軍糧內安外固漸次服之此王者之師萬全之利也茍謂業已如此欲罷不能亦當詳審成敗算定而行彼諸蠻皆烏合之衆必無久能同心捍我之理但急之則相救緩之則相疑以計使之互相讎怨待彼有隙可乘徐命諸軍數道俱進服從者懷之以仁抗敵者威之以武恩威兼濟功乃可成若復舍恩任威深蹈覆轍恐他日之患有甚於今日者也不報二月罷劉深等官時烏撒烏蒙東川芒部及武定威楚普安諸蠻因蛇節之亂皆以供輸煩勞為辭乘釁起兵攻掠州縣焚燒堡寨遣伊蘇岱爾等將兵會國傑討之時國傑方討順元蠻不及來會伊蘇岱爾等率師分道並進次第平之七年三月以征八百媳婦喪師誅劉深笞哈喇岱鄭祐罷雲南征緬分省時有司會赦議釋劉深罪哈喇哈遜曰徼名首釁喪師辱國非常罪比不誅無以謝天下遂誅之夏四月劉國傑敗宋隆濟蛇節于墨特川平之初國傑師出播州境與賊遇戰失利乃令軍士人持一盾而釘其上俟陳合即棄盾佯走賊果逐之馬遇盾皆仆國傑鼓譟趨之賊大敗既而餘寇復合要戰國傑不應數日命楊賽音布哈分兵先進大軍繼之賊兵潰乘勝逐北千里殺獲無算遂破之於墨特川蛇節降誅之隆濟遁去尋為兄子宋阿重執之來獻伏誅餘黨相繼平成宗至大二年十一月八百媳婦及大小徹里諸蠻作亂詔遣雲南右丞色濟固爾威往招諭之比至為賊所賂復肆攻掠遂以敗還阿哈瑪特僧格之姦世祖至元十七年十二月平章政事阿哈瑪特奏理算江淮錢榖誣行省平章阿勒巴右丞雅克特穆爾左丞崔斌殺之阿哈瑪特回紇人以言利有寵於帝中統三年始立左右部分統庶務以阿哈瑪特領其事仍兼諸路轉運使專理財賦阿哈瑪特欲每事得專奏聞不關白中書時張文謙居政府力言分制財用古有是理中書不預則天子親涖之乎乃止明年阿哈瑪特以河南鈞徐等州俱有鐵冶請興鼓鑄之利乃括戶三千興煽之嵗輸鐵一百三萬七十斤至元元年又以太原民煮小鹽越境販賣民貪其價廉競買食之解鹽以故不售嵗入課銀止七千五百兩請嵗增五千兩無問諸色兵民均出其賦帝以阿哈瑪特為有能因罷左右部歸中書超拜阿哈瑪特平章事六年新立憲臺阿哈瑪特慮其發已姦因言于帝曰庶務責成各路錢榖付之轉運必繩治之事何由辦請罷御史臺及諸道提刑司廉希憲曰立臺察內則紏劾姦邪外則察視非常訪求民瘼裨益國政無大於此者如阿哈瑪特所言必使上下專恣貪暴公行然後事可集耶阿哈瑪特語塞乃止時帝急為富國計見阿哈瑪特行事時有成績又屢與史天澤爭辨天澤常詘帝由是益奇其才專委任之所言無不從阿哈瑪特益橫初制銓選吏部定擬資品呈尚書省尚書咨中書然後聞阿哈瑪特擢用私人不由部擬不咨中書安圖以為言帝問阿哈瑪特阿哈瑪特言事無大小皆委之臣臣所用之人臣宜自擇安圖因請自今惟重刑及遷上路總管始屬之臣餘並付阿哈瑪特帝從之阿哈瑪特復請重定條畫下諸路括户口增太原鹽課以千錠為常額十五年復奏立江西𣙜茶運司及諸路轉運鹽使司宣課提舉司宣課司官吏多至五百餘人崔斌上言江南官冗杭州地大民衆阿哈瑪特溺于私愛以任其不肖子瑪蘇庫且阿哈瑪特先自陳免其子弟之任今乃身為平章而子若侄或為參政或為尚書或領將作監會同館一門悉處要津有虧公道帝是斌言命黜之然終不以為阿哈瑪特罪既而淮西宣慰使昂吉爾入朝亦以官冗為言於是詔江西省併入福建罷𣙜茶營田司歸本道宣慰司罷漕運司歸行省至是崔斌遷為江淮行省左丞阿哈瑪特憤其害已乃奏理算江淮行省錢榖誣搆斌與阿勒巴等盜官糧四十萬及擅易命官八百餘員命都事劉正等往按獄弗具復遣參政張澍等雜治之竟致斌等於死斌有文學達政術副阿爾哈雅取荆湖廣海屢建大功多所全活太子聞殺斌方食投箸惻然遣使止之不及天下寃之十八年閏八月括江南户口稅課時京兆等路歲課自一萬九千已增至五萬四千錠阿哈瑪特猶以為未實欲核之上察其非而止十九年三月益都千戶王著殺阿哈瑪特於闕下著因人心憤怨阿哈瑪特密鑄大銅鎚與妖人高和尚謀擊殺之時皇太子從帝如上都而阿哈瑪特留守京師著以太子素惡其姦乃遣二西僧至中書詐稱皇太子還都作佛事省中疑之時高觿張九思皆宿衛宫中詰之倉皇失對遂執之訊問不伏及午著復矯太子令俾樞密副使張易發兵夜會東宫易不察遽以兵往觿問果何為易附耳曰太子來誅左相也既而省中遣使出迎悉為偽太子所殺奪其馬入建德門夜二鼓至東宫前立馬呼省官至前責阿哈瑪特數語著即牽去以所袖銅鎚碎其腦立斃繼呼郝禎至殺之囚右丞相張惠於是觽九思開門大呼曰此賊也叱衛士急捕之留守布敦持挺擊立馬者墜他衆奔潰多就擒高和尚逃去惟著挺身請囚時帝在察罕諾爾聞之即遣和爾果斯等歸討為亂者獲髙和尚于高梁河與王著張易皆棄市著臨刑大呼曰王著為天下除害今死矣異日必有為我書其事者復以張易從著為亂將傳首四方張九思曰易應變不審則有之坐以與謀則過矣乞免傳首從之王惲曰著激於義捐一身為天下除害事既露不去自縛詣司敗以至臨命氣不少挫視死如歸誠殺身成名死而不悔者也律以春秋誅亂臣賊子之法不以義與之可乎四月詔戮阿哈瑪特尸遂窮治其黨阿哈瑪特既死帝猶不深知其姦及詢樞密副使博囉乃盡得其罪惡始大怒曰王著殺之誠是也命發塜剖其棺戮尸于通玄門外縱犬食之四民聚觀稱快籍其家得櫝藏二人皮問之其妾云每呪詛時置神坐于上又以帛二幅畫甲騎圍守幄殿兵皆張弦挺刃內向狀涉不軌遂并誅其子庫克新等四人尋令中書悉罷黜其黨與凡汰其中省部者七百十四人罷其濫設官府二百餘所又以郝禎耿仁黨惡尤甚命剖禎棺戮其尸下耿仁于獄誅之初阿哈瑪特欲誣殺秦長卿劉仲澤伊克莽多卜丹三人兵部尚書張雄飛力持不可阿哈瑪特使人啖之曰誠能殺此三人當處以參政雄飛曰殺人以求大官不能為也阿哈瑪特怒出為澧州安撫使畏遷御史中丞行御史臺事阿哈瑪特恐其子庫克新為江淮右丞不為所容改陜西按察使未行阿哈瑪特死召拜參知政事庫克新被逮勑廷臣雜問庫克新歷指宰執曰汝嘗受我家錢何得問我雄飛曰我曾受否曰公獨無雄飛曰如是則我當問汝矣遂伏辜二十一年十一月以安圖為右丞相盧世榮為右丞史樞為左丞薩勒迪默色廉希恕並參知政事初阿哈瑪特專政世榮以賄進為江西𣙜茶運使以罪廢阿哈瑪特死朝臣諱言利無以副上意者總制院使僧格薦世榮才能富國召問稱旨令與中書廷辨所欲行右丞相和爾果斯等皆以議不合罷去故安圖復為右丞相而以世榮為右丞史樞等皆世榮所薦也世榮既入中書即日奉詔理鈔法之弊自謂其生財有法用其法當賦倍增而民不擾翰林學士董文用謂之曰此錢取於右丞家耶取之民耶取於右丞家則吾不知若取於民則有説矣牧羊者嵗嘗兩剪其毛今牧人日剪以獻主者固悅其得毛之多然羊無以避寒熱既死且盡毛又可得乎民財有限右丞將盡取之得無有日剪其毛之患乎世榮不能對御史中丞崔彧亦極言世榮不可相帝大怒下彧吏欲置之法尋罷之鈔法者中統二年王文統請造中統元寶交鈔自十文至二貫文凡十等不限年月諸路通行賦稅並聽收受名交鈔法二十二年二月立規措所初盧世榮言天下嵗課鈔九十萬餘以臣經畫之不取于民可增三百萬事未行而中外已非議請與臺院面議上前行之帝曰不必如此卿但言之世榮乃言自王文統後鈔法虛弊已久宜括銅鑄錢併製綾劵與鈔參行泉杭二州宜立市舶轉運司給民錢令商販諸畨官取其息七民取其三各路雖設常平倉名存實廢宜取權豪所擅鐵冶鑄器鬻之以其息儲粟平糶則可均物價而獲厚利民間酒課大輕宜官給鈔行古𣙜酤法仍禁民私酤米一石取鈔十貫可得二十倍國家以兵得天下不藉餽糧惟資羊馬宜於上都隆興諸路買幣帛易羊馬選蒙古人牧之嵗收其皮毛筋角酥酪之用以十之二與牧者而馬以備軍興羊以充賜豫帝皆善而行之至是請立規措所所司官吏以善賈為之帝曰此何職世榮曰規畫錢榖耳從之又言天下能規運錢榖者為阿哈瑪特所用今悉以為污濫出之臣欲擇而用之懼有言臣私有罪者帝曰何必計此第用其可用者於是擢用甚衆三月立真定等路宣慰司兼都轉運司領課程事盧世榮請於真定濟南太原甘肅江西江淮湖廣等處立宣慰司兼都轉運司以治課程仍嚴立條例禁諸司不得沮撓檢察以宣德王好禮並為浙西宣慰使帝曰宣德人多言其惡世榮言彼自陳能嵗辦鈔七十餘萬錠是以用之四月監察御史陳天祥劾中書右丞盧世榮罪惡世榮居中書數月恃委任之專肆無忌憚眇視丞相左司郎中周戭因議事微有可否誣以沮詔旨入奏令杖一百斬之朝廷震懾無敢言者至是天祥上疏言世榮始為江西𣙜茶轉運使屢犯贓罪動數萬計今竟不悛狂悖尤甚雖居丞轄實專大政恣行苛刻大肆誅求欲以一嵗之期致十年之積考其行事不副所言始言能令鈔法如舊鈔今愈虛始言能令百物自賤物今愈貴始言不取於民能令課程增三百萬錠今乃迫脅諸路官司虛增其數凡若所為動為民擾脫不早有更張須其自敗正猶蠧雖自除本病深矣疏聞詔丞相以下雜問其罪今世榮天祥皆赴上都於是御史中丞阿拉克特穆爾等以世榮所招罪狀上奏世榮對於帝前一一欵服詔安圖與諸省臣議世榮所行當罷者罷之當更者更之其所用人實無罪者朕自裁決九月罷𣙜酤初民間酒聽自造米一石官取鈔一貫盧世榮以官鈔五萬錠立𣙜酤法米一石取鈔十貫增舊十倍至是罷之聽民自造十一月盧世榮伏誅世榮初以言利進太子意深非之曰財非天降安能嵗取盈乎僧格素主世榮聞太子言默然不敢救至是世榮竟以誅死時帝春秋髙南臺御史有上書請內禪者臺臣匿其章不敢聞而阿哈瑪特之黨特濟格克實克等請收百司吏案鉤考天下錢榖欲因以發之都事尚文曰是欲上危太子下陷大臣其謀姦矣遂語御史大夫及丞相先入言之以奪其謀帝震怒曰汝等無罪耶丞相進曰臣等無所逃罪但此輩名載刑書而為此舉實搖動人心耳太子聞之竟以憂懼殂二十三年秋七月免左丞相翁吉喇特平章政事阿必實克官從總制使院僧格之言也僧格為人狡黠豪橫好言財利帝深喜之盧世榮誅遂有大任之意嘗令具省臣姓名以進帝曰安圖郭祐楊居寬等並仍前職翁吉喇特等其别議仍選可代者以聞遂罷之自是廷中有所建置人才進退僧格咸與聞焉二十四年閏二月復置尚書省以僧格特穆爾並為平章政事諤爾根薩里為右丞葉李為左丞馬紹參知政事時敏珠爾多卜丹言自制國用使司改尚書省頗有成效今仍分兩省為宜詔從之安圖諫曰臣力不能回天但乞不用僧格别選賢者猶或不至虐民誤國不聽三月行至元鈔僧格以交鈔及中統元寶行之既久物重鈔輕遂建議更造至元鈔行之自一貫至五十文凡十有一等每一貫文視中統鈔五貫文十一月以僧格為尚書右丞相諤爾根薩里平章政事葉李為右丞馬紹為左丞初僧格奉詔檢核中書省虧欠鈔六十餘錠參知政事楊居寬微自辨以為實掌銓選錢糧非所專僧格怒令左右掌其頰遂與郭祐皆引服事聞帝令丞相安圖共議之曰此曹狡猾無令他日得以脅問誣服為詞由是祐居寬皆坐棄市籍其家人咸寃之時有江寧縣達嚕噶齊吳德者憤言尚書今日鉤考中書不遺餘力他日復為中書鉤考爾獨不死耶或以告僧格亟捕德殺之未幾帝問翰林諸臣言以丞相領尚書省事漢唐有此制否咸曰有之而左丞葉李遽言前省臣所不能者僧格舉能行之宜以為丞相遂授僧格尚書右丞相進李右丞二十二年冬十月遣使鉤考諸路錢榖初僧格摘委六部鉤考百司倉庫財榖復以為不專其任遂置徵理司以主之時理算之計行入倉庫司錢榖者無不破産及當更代人皆棄家避之僧格又言湖廣錢榖已責償于平章約蘇穆爾他省欺盜者必多請以參知政事錫都等十二人理算江淮江西福建四川甘肅安西六省耗失之數給兵以衛其行詔皆從之十一月立僧格德政碑時天下騷然而江淮尤甚讒佞之徒方且諷請立石為僧格頌德帝曰民欲立則立之仍告僧格使之喜也碑成樹之省前題曰王公輔政之碑時董文用為御史中丞獨不附僧格使人諷文用頌已功德不答又自謂文用曰百官皆具食丞相府矣亦不答會朔方軍興而征求愈急文用曰民急矣外難未除而內傷其根本丞相宜思之因持郡國所上盜賊之目謂之曰百姓非不欲安樂急法暴斂至此御史臺所以救時政之不及丞相當有以助之不當抑之也僧格愈恨之日托臺事譛於帝言文用戇傲沮法欲罪之帝曰彼御史職也何罪之有二十六年十二月紹興路總管府判官白潔矩言宋宗室居江南非便宜悉遷京師僧格以聞擢潔矩為尚書省舍人遣詣江南發兼併户偕宋宗室至京師既而江淮行省言江南之民方患增課料民括馬之苦今此舉必致人心搖動宜且止從之時僧格專政法令苛急四方騷動程巨夫入朝上疏曰臣聞天子之職莫大於擇相宰相之職莫大於進賢茍不以進賢為急而惟以殖貨為心非為上為德為下為民之意也昔漢文帝以決獄及錢榖問丞相周勃勃不能對陳平進曰陛下問決獄責廷尉問錢榖責治粟內史宰相上理陰陽下遂萬物之宜外鎮撫四夷內親附百姓觀其所言可以知宰相之職矣今權姦用事立尚書鉤考錢榖以剝割生民為務所委任者率皆貪叨邀利之人江南盜賊竊發良以此也臣竊以為宜清尚書之政損行省之權罷言利之官行恤民之事於國為便僧格大怒羈留京師不遣奏請殺之凡六奏帝不許二十七年八月朔日食地大震武平尤甚九月武平地復大震地陷黑沙水涌出壞官署四百八十間民居不可勝計壓溺死傷者數十萬人帝深憂之時駐蹕龍虎臺遣阿哩衮薩里召集賢翰林兩院官詢致災之由議者畏僧格但泛引經傳五行災異之言莫敢指切時政時僧格遣錫都王巨濟等理算天下錢榖已徵者赦百萬未徵者尚數千萬民不聊生自殺者相屬逃山林者則發兵捕之於是集賢直學士趙孟俯因阿哩衮薩里入奏于帝謂須下詔蠲除庶幾天變可弭帝從之詔草已具僧格怒曰此必非帝意孟俯曰凡錢榖未徵者其人死亡已盡何所從取非及時除免之他日言事者倘以失陷錢榖數千萬歸咎尚書省豈不為丞相深纍耶僧格悟遂赦天下民賴稍蘇二十八年春正月僧格及鄂爾根薩里等以罪免先是帝嘗以葉李留夢炎優劣問趙孟俯孟俯對曰夢炎臣父執其人重厚篤于自信好謀能斷有大臣器葉李所讀之書臣皆讀之其所知所能臣皆知之能之帝曰汝以夢炎賢於李耶夢炎在宋為狀元位至丞相當賈似道誤國罔上夢炎阿附取容李布衣乃伏闕上書是賢于夢炎也孟俯退謂奉御徹爾曰上論賈似道誤國責留夢炎不言僧格罪甚于似道而我等不言他日何以辭其責然我疏逺之臣言必不聽侍臣中讀書知義理慷慨有大節又為上所親信無踰公者夫捐一日之命為萬姓除殘賊仁者之事也公必勉之時帝畋漷北徹爾乘間入言之詞語激烈帝怒謂其詆毁大臣命衛士批其頰血湧口鼻委頓地上少間復呼而問之辨愈力曰臣與僧格無讎所以力數其罪而不顧身者正為國家計耳茍畏聖怒而不言則姦臣何時除民害何時息帝大悟召博果密問之對曰僧格壅蔽聰明紊亂朝政有言者即誣殺之今百姓失業盜賊蜂起召亂在朝夕非亟誅之恐為陛下憂時廷臣言者益衆遂詔臺省相與辨駁之僧格詞屈帝曰僧格為惡始終四年臺臣豈不知之知而不言當得何罪御史杜思敬曰奪官追俸惟上所裁遂斥罷臺臣之久任者免僧格等官命徹爾帥衛士三百人籍僧格家得珍寶如內藏之半阿哩衮薩里以連坐亦籍其資二月罷徵理司詔下之日百姓相慶而各路鉤考猶未盡罷既而御史言鉤考錢榖自中統至今餘三十年更阿哈瑪特僧格當國設法已極而其黨公取賄賂民不能堪不如罷之便詔從之仍命取旨逋負錢榖文牘聚置一室非上命而竊視者罪之初僧格欲殺楊居寬郭祐刑部尚書博果密爭之不得僧格深忌之謂其妻曰他日籍我者必此人也因其退食責以不入曹治事欲加之罪遂以疾免至是帝欲用為相謂之曰朕過聽僧格致天下不安今雖悔之已無及朕識卿幼時使學從政欲備今日之用博果密曰朝廷勳舊齒爵居臣右者尚多今不次用臣無以服衆帝曰然則孰可曰太子詹事旺扎勒可嚮者籍阿哈瑪特家其賂遺近臣皆有簿籍惟無旺扎勒名又嘗言僧格為相必敗國事今果如其言是以知其可也乃拜旺扎勒右丞相博果密平章政事三月仆僧格輔政碑初帝命翰林學士閻復撰文復至是已改廉訪使亦坐免夏四月中書省臣敏珠爾丹崔彧言僧格當國四年中外百官鮮不以賄而得者昆弟故舊親族皆授要官美地惟以欺蔽九重朘削百姓為事宜令兩省嚴加考核凡入其黨者並除名為民從之湖廣平章政事約蘇穆爾者僧格妻黨也尤為不法逮至京師籍其家資黃金至四千兩遂詔下僧格獄復繫約蘇穆爾還湖廣誅之初約蘇穆爾因人言湖廣初附時郡縣長吏及吏胥富人比屋斂銀將輸之官銀已具而事中止即下令責民自實使者旁午隨地置獄株連蔓引備極慘酷民以拷掠瘐死者載道所獲不資約蘇穆爾悉掩有之使至永州判官烏克遜宛曲以利害曉之卒無所擾既見鉤考日急天下騷動嘆曰民不堪命矣即日上計行省約蘇穆爾怒曰郡國錢糧無不增羡永州何獨不然此直孫府判倚其才辨慢我亟拘繫之欲置于死至是因僧格敗始得釋秋七月揚州路學正李淦上言葉李本一黥徒方受上知即以舉僧格為第一事致以非罪誅貶大臣遣使四出鉤考錢榖民怨而盜發天怒而地震水災荐至人皆知僧格用羣小之罪而不知葉李妄舉僧格之罪宜斬葉李以謝天下召淦詣京師置對淦至而李卒除淦江陰路教授以旌直言給還行臺御史周祚妻子祚嘗劾僧格流祚于噶達蘇妻子家資入官至是還之是月僧格伏誅二十九年三月誅僧格黨尼雅斯拉鼎等初僧格既敗尼雅斯拉鼎摩哩錫都王巨濟等俱逮下獄至是御史臺言其黨比僧格恣為不法理算江南錢榖極其酷虐民嫁妻賣女殃及親鄰維揚錢塘受禍最慘無辜死者五百餘人天下之人莫不思食其肉今三人既已伏辜乞誅之以謝天下帝以錫都長於理財欲釋之博果密力爭不可日中凡七奏卒併誅之時敏珠爾多卜丹請復立尚書省專領右三部博果密曰阿哈瑪特僧格相繼誤國身誅家滅前鑒未逺奈何又欲效之乎事遂寢五月中書省臣言妄人馮子振嘗為詩譽僧格及僧格敗即告詞臣撰碑引諭失當國史院編修陳孚發其姦狀帝曰詞臣何罪必以譽僧格為罪則在廷諸臣誰不譽之朕亦嘗譽之矣是月詔以楊居寬郭祐死非其罪給還其身資成宗元順元年五月省臣阿哈瑪特僧格怙勢賣官不别賢否選法壞乃詔敏珠爾多卜丹與何榮祖等釐正之元史紀事本末卷一

body:
  text: 元史紀事本末卷二明陳邦瞻撰科舉學校之制世祖至元二十一年十一月詔議立科舉法不果行元自太宗下中原用耶律楚材議命朝臣厯諸路考試以論及經義詞賦分為三科作三日程專治一科能兼者聽得東平楊英等若干人皆一時名士而廷議或以為非便事復中止至元初丞相史天澤學士王鶚屢請帝以科舉取士詔令中書議定程式又請依前代立國學選蒙古人諸職官子孫百人教習俟其藝成然後試用皆未及施行至是丞相和爾果斯與留夢炎等復言天下習儒者少而由刀筆吏得官者多帝曰將若之何對曰惟貢舉取士為便凡蒙古之士及儒吏陰陽醫術皆令試舉則用心為學矣帝可其奏繼而許衡亦議學校科舉之法罷詩賦重經學定為新制會和爾果斯罷事遂止二十四年閏二月初置國子監以耶律有尚為祭酒初太宗設總教國子監之官至元初以許衡為祭酒而侍臣子弟就學者才十餘人衡既去教益廢而學舍未建師生寓居民舍國子司業耶律有尚屢以為言始立國子監設監官增廣弟子員遂以有尚為祭酒設江南各路儒學提舉司時江南諸縣各置教諭二人又用廷臣議諸道各置提舉司設提舉儒學二人統諸路府州縣學祭祀錢糧之事未幾復從僧格等言鉤考江南學田所入羡餘貯集賢院以給有才藝之士二十六年秋八月始置回回國子學二十七年春正月敕從臣子弟入國子學立興文署掌經籍版及江南學田錢榖二十八年春正月令江南諸路學及各縣學內設立小學選老成之士教之其他先儒過化之地名賢經行之所與好事家出錢粟贍學者並立為書院凡師儒之命於朝廷者曰教授路府上中州置之命於禮部及行省及宣慰司者曰學正山長學録教諭路州縣及書院置之成宗元貞元年三月增置蒙古學政以肅政廉訪司領之秋七月詔申飭中外有儒吏兼通者各路舉之廉訪司每道嵗貢二人省臺立法考試中程者用之所貢不公罪其舉者大德八年增蒙古國子生三百員選宿衛大臣子弟充之武宗至大元年召吳澄為國子監丞先是許衡為祭酒學者興起久之漸失其舊澄至諸生以次授業日昃退燕居之室執經問難者接踵而至澄各因其材質反覆訓誨之四年夏四月敕國子監師儒之職才才德者不拘品級選用初帝命李孟領國子學諭之曰國學人材所自出卿宜數課諸生勉其德業又嘗諭省臣曰昔世祖注意國學如博果密等皆蒙古人而教以成材朕今親定國子生為三百人仍增陪堂生二十人通一經者以次補伴讀著為式至是孟等言方今進用儒者而老成日以凋謝四方儒士有成材者請擢任國學翰林祕書太常或儒學提舉等職俾學者有所激勸帝從之仁宗皇慶元年二月以吳澄為司業澄用宋程皓學校奏疏胡瑗六學教法朱熹學校貢舉私議約之為教法四條一曰經學二曰行實三曰文藝四曰治事未及行又嘗為學者言朱子於道問學之功居多而陸子靜以尊德性為主問學不本於德性則其弊必偏於言語訓釋之末故學必以德性為本庶幾得之議者遂以澄為陛氏之學非許氏尊信朱子本意然亦莫知朱陸之為如何也澄一夕謝去諸生有不謁告而從之南者俄拜集賢直學士以疾不赴二年冬十月中書省臣上言科舉事世祖朝屢嘗命下成宗武宗尋亦有旨今不以聞恐或有沮其事者夫取士之法經學實修已治人之道詞賦乃摛章繪句之學自隋唐以來取人專尚詞賦故士習浮華今臣等所擬將律賦省題詩小賦皆不用專立德行習經科以此取士庶可得人帝然之十一月下詔曰惟我祖宗以神武定天下世祖皇帝設官分職徴用儒雅崇學校為育材之地議科舉為取士之方規模𢎞逺矣朕以眇躬獲承丕祚繼志術事祖訓是式若稽三代以來取士各有科目要其本末舉人宜以德行為首試藝則以經術為先詞章次之浮華過實朕所不取爰命中書參酌古今定其條制其以皇慶三年八月天下郡縣興其賢者能者充試有司次年二月會試京師中選者朕將親䇿焉科場每三嵗一次開試舉人從本貫官司於諸色户內推舉年及二十五以上鄉黨稱其孝弟朋友服其信義經明行修之士以次敦遣其或徇私濫舉併應舉而不舉者監察御史肅政廉訪司體察究治考試程式蒙古色目人第一場經問五條大學論語孟子中庸內設問用朱氏章句集注其義理精明文詞典雅者為中選第二場策一道以時務出題限五百字以上漢人南人第一場明經經疑二問大學論語孟子中庸內出題並用朱氏章句集注復以已意結之限三百字以上經義一道各治一經詩以朱氏為主尚書以蔡氏為主周易以程氏朱氏為主已上三經兼用古注疏春秋許用三傳及胡氏傳禮記用古注疏限五百字以上不拘格第二場古賦詔誥章表內科一道古賦詔誥用古體章表四六參用古體第三場䇿一道經史時務內出題不矜浮藻惟務直述限一千字以上蒙古色目人願試漢人南人科目中選者加一等注授蒙古色目人作一榜漢人南人作一榜第一名賜進士及第從六品第二名以下及第二甲皆正七品三甲皆正八品兩榜並同時朝廷方以科舉取士説者謂治平可立致集賢修撰虞集獨謂當治其源因會議學校乃上議曰師道立則善人多學校者士之所受教以至於成德達材者也今天下學官猥以資格授強加之諸生之上而名之曰師耳有司弗信之生徒弗信之於學校無益也如此而望師道之立可乎下州小邑之士無所見聞父兄所以導其子弟初無必為學問之實意師友之遊從亦莫辨其邪正然則所謂賢材者非自天降地出安有可望之理哉為今之計莫若使守令求經明行修成德者身師尊之至誠懇惻以求之其德化之及庶乎有所觀感也其次則求夫操履方正而不為詭異駭俗者確守先儒經義師説而不敢妄為奇論者衆所敬服而非鄉願之徒者延致之日諷誦其書使學者習之入耳著心以正其本則他日亦當有所發也其次則取鄉貢至京師罷歸者其議論文藝猶足以聳動其人非若泛泛莫知根抵者矣延祐七年十二月復以齊履謙為國子司業初履謙與吳澄俱在國學既罷去學制稍廢至是復以履謙為司業乃酌舊制議立升齋積分之法每季考其學行以次第升既升上齋踰再嵗始與私試辭理俱優者一分辭平理優者為半分嵗終積至八分者為髙等禮部集賢嵗選六人以貢帝從其議二年三月廷試進士賜呼都克托里張起巖等及第出身有差夏四月賜進士恩榮宴於翰林院又賜會試下第舉人七十以上從七品流官致仕六十以上府州教授餘並授山長學正泰定帝泰定二年閏正月詔以近嵗公卿大夫子弟與凡民之子入學者衆其學官及生員五十餘人已給廪膳者二十七人外助教一人生員二十四人廪膳並令給之學之建置在于國都凡百司庶府所設譯吏皆從本學取以充之順帝元統二年三月詔科舉取士國子學積分學校官選有德行學問之人以充至元元年十一月詔罷科舉初徹爾特穆爾為江浙平章會科舉驛請考官供張甚盛心不能平及復入中書省首議罷科舉及論學校莊田租可給宿衛士衣糧動當國者以發其機又欲損太廟四祭為一於是御史吕思誠等列其罪狀不報而思誠出為廣西僉事時罷科舉詔已書而未用璽參政許有壬爭之丞相巴延怒曰汝風臺臣言徹爾特穆爾耶有壬曰太師擢徹爾特穆爾在中書御史三十人不畏太師而聽有壬豈有壬權重於太師耶巴延意稍解有壬乃曰科舉若罷天下才人觖望巴延曰舉子多以贓敗有壬曰科舉未行時臺中贓無算豈盡出於舉子巴延曰舉子中可任用者惟參政耳有壬曰若張伯誠馬伯庸輩皆可任大事如歐陽玄之文章亦豈易及巴延曰科舉雖罷士之欲求美衣美食者自能向學有壬曰為士者初不事衣食巴延曰科舉取人實妨選法有壬曰今通事知印等天下凡三千三百餘名今嵗自四月至九月白身補官受宣者亦且七十三人而科舉一嵗僅三十餘人科舉於選法果相妨乎否也巴延不聽翊日宣詔特令有壬為班首以折辱之有壬懼禍不敢辭治書侍御史布哈誚有壬曰參政可謂過橋拆橋者矣有壬以為大恥移疾不出六年十二月詔復行科舉時科舉既輟翰林學士承旨庫庫從容言曰古昔取人才以濟世用必由科舉何可廢也帝納其言復詔行之國子監積分生員三年一次依科舉例入會試中者取一十八名初世祖下雲南以賽音迪延齊為行省平章政事時雲南俗無禮儀男女往往自相配合親死則火之不為喪祭子弟莫知讀書者賽音迪延齊始教民跪拜之節婚姻行媒死者為之棺槨奠祭創建孔子廟明倫堂購經史置學田其後賽音迪延齊子庫克新相繼為行省右丞復請下雲南諸路遍立孔子廟選經學之士為之教官而文風始興元世學校之盛逺被遐荒亦自昔所未有云史臣曰元初太宗始得中原輒用耶律楚材言以科舉選士世祖既定天下王鶚獻計許衡立法事未果行至仁宗延祐間始斟酌舊制而行之取士以德行為本試藝以經術為先士褎然舉首應上所求者皆彬彬輩出矣然當時仕進有多岐銓衡無定制其出身於學校者有國子監學有蒙古字學回回國學有醫學有陰陽學其䇿名於薦舉者有遺逸有茂異有求言有進書有童子其出於宿衛勳臣之家者待以不次其用於宣徽中政之屬者重為內官又廕敘有循常之格而超擢有選用之科由直省侍儀等入官者亦名清望以倉庾賦稅任事者例視冗職捕盜者以功敘入粟者以資進至于工匠皆入班資而輿隸亦躋流品諸王公主寵以投下俾之保任逺夷外徼授以長官俾之世襲凡若此類殆所謂吏道雜而多端與矧夫儒有嵗貢之名吏有補任之法曰椽吏令史曰書寫銓寫曰書吏典吏所設之名未易枚舉曰省臺院部曰路府州縣所入之途難以指計雖名卿大夫亦往往由是躋要階受顯爵而刀筆下吏遂至竊權勢舞文法矣故其銓選之備考核之精曰隨朝外任曰省選部選曰文官武官曰考數曰資格一毫不可越而或援例或借資或優升或回降其縱情破律以公濟私非至明者不能察焉是皆文繁吏弊之所致也郊議成宗大德六年三月合祭昊天上帝皇地祗五方帝于南郊遣左丞相哈喇哈遜行事先是國俗代有拜天之禮衣冠器用皆從其初憲宗二年秋始以衮冕拜天于日月山其冬又用孔氏子孫元措議合祭昊天后土始大合樂作牌位以太祖睿宗配世祖中統二年夏親征北方躬祀天于舊檀州之西北灑馬潼以為禮皇族外不得與盡如國俗至元十二年冬以受尊號遣使豫告天地下太常檢討唐宋金舊儀於國陽麗正門東南七里築臺設昊天上帝皇地祗位二行一獻禮自後國有大典禮皆即南郊告謝焉十三年夏以下江南遣使告天地中書下太常議定儀物以聞制曰其以國禮行事三十一年帝即位夏始為壇于都城南七里遣司徒諤都岱率百官為大行皇帝請諡南郊為告天請諡之始至是年三月乃合祭昊天皇地祗五方帝于南郊遣左丞相哈喇哈遜攝事是為攝事天地之始九年二月復定郊祀禮丞相哈喇哈遜等言祈天保民之事有天子親祀者三曰天曰祖宗曰社稷今宗廟社稷嵗時攝官行事祭天國之大事也陛下雖未及親祀宜如宗廟社稷遣官攝祭嵗用冬至有司豫備儀物至期以聞制下翰林集賢太常禮官皆會中書集議議曰周禮冬至圜丘惟祀昊天上帝至西漢元始間始合祭天地歷東漢至宋千有餘年分祭合祭迄無定論時既不同禮樂亦異王莽之制何足法也今當循唐虞三代之典惟祀昊天上帝其方丘祭地之禮續議以聞又按周禮壇壝三成近代增四成以廣天文從祀之位今宜去其一成以合陽奇之數每成髙八尺一寸以合乾之九九壇設丙巳之地以就陽位又古者器用陶匏席用藁秸以祀天唐宋而後禮樂玉帛日益繁縟宋金多循唐禮今欲修嚴非倉卒所能備舉宜取唐制損益而行之既而太常復議尊祖配天之儀省臣曰自古漢人有天下率尊祖以配天今宗廟已有時享郊祭止天為宜中丞何瑋曰嚴父配天不易之制也不從是嵗郊祀配位遂省武宗至大二年冬十月復議郊祀禮尚書省臣及太常禮官言郊祀者國之大禮今南郊之禮已行而未備北郊之禮尚未舉行今年冬至南郊請以太祖聖武皇帝配享明年夏至北郊以世祖皇帝配帝皆是之三年春正月議北郊從祀朝日夕月禮博士李之紹蔣汝礪議曰按方丘之禮夏以五月商以六月周以夏至其丘在國之北禮神之玉以黃琮牲用黃犢幣用黃繒配以后稷其方壇之制漢去都城四里為壇四陛唐去宫城北十四里為方壇北角三成宋至徽宗始定為再成歷代制雖不同然無出於三成之式今擬取坤數用六之議去都城北六里於壬地選善地於中為方壇三成四陛外為三壝仍依古制於外壝之外治四面稍低下以應澤中之制宫室墻垣器皿色並用黃其神州地祗以下從祀自漢以來厯代制度不一至唐始因隋制以嶽鎮海瀆山林川澤邱陵墳衍原隰各從其方從祀今盍參酌舉行九月太常禮院復下博士檢討儀物是年十一月有事於南郊以太祖配五方帝日月星辰從祀仁宗延祐元年夏四月太常寺復請立北郊帝不從北郊之議遂輟英宗至治二年九月韶議南郊祀事中書平章瑪魯御史中丞曹立禮部尚書張野學士蔡文淵袁桷鄧文原太常禮儀院使王緯田天澤博士劉致等會都堂議一曰年分按前代多三年一祀天子即位已及三年常有旨欽依二曰神位周禮大宗伯以禋祀祀昊天上帝冬至圜丘所祀天皇大帝也又蒼璧禮天注云此禮天以冬至謂天皇大帝也在北極謂之北辰又云北辰天皇耀魄寶也又名旲天上帝又名太一帝君以其尊大故有數名今按晉書天文志中宫鈎陳中一星曰天皇大帝其神耀魄寶周禮所祀天神正言昊天上帝鄭氏以星經推之乃謂即天皇大帝然漢魏以來名號亦復不一漢初曰上帝曰太一曰皇天上帝魏曰皇皇帝天梁曰天皇大帝惟西晉曰昊天上帝與周禮合唐宋以來壇上既設昊天上帝第一等復有天皇大帝其五大帝與太一天一等皆不經見本朝大德元年中書圓議止依周禮祀昊天上帝至大三年圓議五帝從享依前代通祭三曰配位孝經曰孝莫大於嚴父嚴父莫大於配天又曰郊祀后稷以配天此郊之所以有配也漢唐已下莫不皆然至大三年冬十月三日奉旨十一月冬至合祭南郊太祖皇帝配圓議取旨四曰告配禮器曰魯人將有事於上帝必先有事於頖宫注告后稷也告之者將以配天也告用牛一宋會要於致齋二日宿廟告配凡遣官犧尊豆籩行一獻禮至大三年十一月冬至日以質明行事初獻攝太尉同太常禮儀院官詣太廟奏告圓議取旨五曰大裘冕周禮司裘掌為大裘以共王祀天之服鄭司農云黑羊裘服以祀天尚質也辨師掌王之五冕注冕服有六而言五者大裘之冕蓋無旒不聯數也禮記郊特牲曰郊之祭也迎長日之至也祭之日王被衮以象天戴冕十有二旒則天數也陸佃曰禮不盛服不充蓋服大裘以衮襲之也謂冬祀服大裘被之以衮開元及開寶通禮鸞駕出宮服衮冕至大次質明改服大裘冕而出次宋會要紹興十三年車駕自廟赴青城服通天冠絳紗袍祀日服大裘衮冕圎議用衮冕取旨六曰匏爵郊特牲曰郊之祭也器用陶匏以象天地之性也注謂陶瓦器匏用酌獻酒開元禮開寶禮皆有匏爵大德九年正配位用匏爵有坫圓議正位用匏配位飲福用玉爵取旨七曰戒誓唐通典引禮經祭前期十日親戒百官及族人太宰總戒羣官唐前祀七日宋會要十日纂要太尉南向司徒亞終獻一品二品從祀北向行事官以次北向禮直官以誓文授之太尉讀今天子親行大禮止令禮直扄管勾讀誓文圓議令管勾代太尉讀誓刑部尚書蒞之八曰散齋致齋禮經前期十日唐宋金皆七日散齋四日致齋三日國朝親祀太廟七日散齋四日於别殿致齋三日於大明殿圓議依前七日九曰藉神席郊特牲曰莞簟之安而蒲越稿鞂之尚按蒲越稿鞂藉神席也漢舊儀高帝配天紺席祭天用六綵綺席六重成帝即位丞相衡御史大夫談以為天地尚質宜皆勿修詔從焉唐麟德二年詔曰自處以厚奉天以薄改用裀褥上帝以蒼其餘各視其方色宋以褥加席上禮官以為非禮元豐元年奉旨不設國朝大德九年正位稿鞂配位蒲越冒以青繒至大三年加青綾褥青錦方圓議合依至大三年於席上設褥各依方位十曰特牲郊特牲曰郊特牲而社稷太牢又曰天地之牛角繭栗秦用騮駒漢文帝五帝共一牲武帝三年一祀用大牢光武采元始故事天地共犢隋上帝配帝用犢二唐開元用牛宋正位用蒼犢一配位太牢一本朝大德九年蒼犢二羊豕各九至大三年馬純色肥腯一牲正副一鹿一十八野豬一十八羊一十八圓議依舊儀神位配位用犢外仍用馬其餘並依舊日已行典禮十一曰香鼎大祭有三始煙為歆神始宗廟則􅌊蕭裸鬯所謂臭陽達於墻屋者也後世焚香蓋本乎此而非禮經之正至大三年用陶瓦香鼎五十神座香鼎香盒案各一圓議依舊儀十二曰割牲周禮司士凡祭祀帥其屬而割牲羞爼豆又諸子大祭祀正六牲之體禮運云腥其爼熟其殽體其犬豕牛羊注云腥其爼謂豚解而腥之為七體也熟其殽謂體解而爓之為二十一體也體其犬豕牛羊謂分别骨肉之貴賤以為衆爼也七體謂脊兩肩兩拍兩髀二十一體謂肩臂臑膞骼正脊脡脊橫脊正脅短脅代脅并腸三胃三拒肺一祭肺三也宋元豐三年詳定禮文所言古者祭祀用牲有豚解有體解豚解則為七以薦腥體解則為二十一以薦熟蓋犬豕牛羊分别骨肉貴賤其解之為體則均也皇朝馬牛羊豕鹿並依至大三年割牲用國禮圓議依舊儀十二曰大次小次周禮掌次王旅上帝張氊按唐通典前祀三日尚舍直長施大次於外壝東門之內道北南向宋會要前祀三日儀鸞司帥其屬設大次于外壝東門之內道北南向小次於午階之東西向曲禮曰踐阼臨祭祀正義曰阼主階也天子祭祀履主階行事故云踐阼宋元豐詳定禮文所言周禮宗廟無設小次之文古者人君臨位於阼階蓋阼階者東階也惟人主得位主階行事今國朝太廟儀注大次小次皆在西蓋國家尚右以西為尊也圓議依祀廟儀注續具末議一曰禮神玉周禮太宗伯以禋祀祀昊天上帝注禋之言煙也周人尚臭煙氣之臭聞者積柴實牲體焉或有玉帛正義曰或有玉帛或不用玉帛皆不定之辭也崔氏云天子自奉玉帛牲體於柴上引詩圭璧既卒是燔牲玉也蓋卒者終也謂禮神既終當藏之也正經即無燔玉明證漢武帝祠太乙胙餘皆燔之無玉晉燔牲幣無玉唐宋乃有之顯慶中許敬宗等修舊禮乃云郊天之有四圭猶宗廟之有圭瓉也並事畢收藏不在燔列宋政和禮制局言古祭祀無不用玉周官典瑞掌玉器之藏蓋事已則藏焉有事則出而復用未嘗有燔瘞之文今後大祀禮神之玉時出而用無得燔瘞從之蓋燔者取其煙氣之臭聞玉既無煙又且無氣祭之日但當奠於神座既卒事則收藏之二曰飲福特牲饋食禮曰尸九飯親嘏主人少牢饋食禮尸十一飯尸嘏主人嘏長也大也行禮至此神明已饗盛禮俱成故膺受長大之福於祭之末也自漢以來人君一獻才畢而受嘏唐開元禮太尉未升堂而皇帝飲福宋元豐三年改從亞終獻既行禮皇帝飲福受胙國朝至治元年親祀廟儀注亦用一獻畢飲福三曰升煙禋之言煙也升煙所以報陽也祀天之有禋柴猶祭地之瘞血宗廟之裸鬯歷代以來或先燔而後祭或先祭而後燔皆為未允祭之日樂六變而燔牲首牲首亦陽也祭終以爵酒饌物及牲體燎於壇天子望燎柴用柏四曰儀注禮經出於秦火之後殘闕脫漏所存無幾至漢諸儒各執所見後人所宗惟鄭康成王子雍而二家自相矛盾唐開元禮杜佑通典五禮略完至宋開寶禮并會要與郊廟奉祠禮文中間講明始備金國大率依唐宋制度聖朝四海一家禮樂之興政在今日况天子親行大禮所用儀注必合講求大德九年中書集議合行禮儀依唐制至治元年已有祀廟儀注宜取大德九年至大三年并令次新儀與唐制參酌增損修之侍儀司編排鹵簿太史院具報星位分獻官員數及行禮并諸執事官合依至大三年儀制亞終獻官取旨是嵗太皇太后崩有旨冬至南郊祀事可權止文宗至順元年冬十月辛酉帝始服大裘衮冕親祀昊天上帝于南郊以太祖配蓋自世祖混一六合至是凡七世南郊親祀之禮始克舉行焉廟祀之制世祖至元十七年十二月甲午始遷太祖以下神主于太廟國俗祖宗祭享之禮割牲奠馬潼以蒙古巫祝致辭帝即位之元年設神主于中書省用登歌樂遣筆且齊致祭焉筆且齊譯言典書記者二年從中書署奉遷神主于聖安寺之瑞像殿四年詔建太廟于燕京至元元年冬奉安神主于太廟初定太廟七室之制皇祖皇祖妣第一室皇伯考伯妣第二室皇考皇妣第三室皇伯考伯妣第四室皇伯考伯妣第五室皇兄皇后第六室皇兄皇后第七室凡室以西為上以次而東二年冬享於太廟尊皇祖為太祖三年秋始作八室神主設祏室丞相安圖巴延言祖宗世數尊諡廟號配享功臣增祀四世各廟神主七祀神位法服祭器等事皆宜以時定乃命平章政事趙璧等集議製諡及廟號定為八室烈祖神元皇帝皇曾祖妣宣懿皇后第一室太祖聖武皇帝皇祖妣光獻皇后第二室太宗英文皇帝皇伯妣昭慈皇后第三室皇伯卓沁皇伯妣巴圖徹爾默色第四室皇伯考察罕台皇伯妣伊蘇婁第五室皇考睿宗景襄皇帝皇妣莊聖皇后第六室定宗簡平皇帝欽淑皇后第七室憲宗桓肅皇帝貞節皇后第八室是年奉安神主于祏室嵗用冬祀如初禮四年初定一嵗十二月薦新時物六年冬時享畢復命國師僧薦佛事于太廟七晝夜始造木質金表牌位十有六設大榻金椅奉安祏室前為太廟薦佛事之始十三年改作金主太祖主題曰成吉思皇帝睿宗題曰太上皇伊克諾延皇后皆題名諱十四年秋詔建太廟于大都博士言古者廟制率都宫别殿西漢亦各立廟東都以中興崇儉故七室同堂後世遂不能革非禮遂以古今廟制畫圖貼説以聞至是始告遷於太廟命承旨和爾果斯太常卿塔爾楚托果斯等以祏室內栗主八位併日月山板位聖安寺木主俱遷奉太祖睿宗二室金主於新廟奉安遂大享焉撤舊廟毁之十八年春博士李時衍等言歷代廟制俱各不同欲尊祖宗當從都宫别殿之制欲崇儉約當從同堂異室之制尚書段諾海及太常禮官奏曰始議七廟除正殿寢殿正門東西門已建外東西六廟不須更造餘依太常寺新圖建之遂為前廟後寢廟分七室二十一年三月太廟正殿成奉安神主三十年冬十月袝明孝太子主于廟先是皇太子珍戩卒太常博士議曰前代太子薨梁武帝諡統曰昭明齊武帝諡長懋曰文惠唐憲宗諡寧曰惠昭金世宗諡允恭曰宣孝又建别廟以奉神主準中祀從之遂諡曰明孝太子作主用金至是袝于太廟後追尊帝號廟號裕宗成宗大德元年制享太廟增用馬十一年武宗即位追尊皇考為皇帝廟號順宗太祖室居中睿宗西第一室世祖西第二室裕宗西第三室順宗東第一室成宗東第二室武宗至大二年正月以受尊號恭謝太廟為親祀之始十二月親享太廟奉玉册玉寶加上太祖聖武皇帝尊諡曰法天啓運光獻皇后曰翼聖睿宗景襄皇帝曰仁聖莊聖皇后曰顯懿其舊制金表神主以櫝貯兩旁自是主皆範金作之如金表之製英宗至治元年正月始以四孟月時享親祀太廟先是延祐七年冬十月帝命太常禮官與中書翰林集賢等議親祀禮制曰此追逺報本之道也無以朕勞而有所損焉其一遵典禮十一月帝躬謝太廟備法駕服衮冕以行禮至仁宗室輒欷㱆流涕左右莫不感動至是遂行四孟親享之禮謂羣臣曰朕纘承祖宗丕緒夙夜祗栗無以報稱嵗惟四祀使人代之不能致如在之誠實所未安自今以始嵗必親祀以終朕身五月中書省臣禮官上言前代廟式多寡不同晉則兄弟同為一室正室增為十四間東西各一間唐九廟後增為十一室宋增室至十八東西夾室各一間以藏祧主今太廟雖分八室然兄弟為世止六世而已世祖所建前廟后寢往嵗寢殿災請以今殿為寢作前殿十五間中三間通為一室以奉太祖神主餘以次為室庶幾情文得宜從之三年六月議定太廟夾室時以太廟夾室未有定制詔臺院禮官定議博士議曰按爾雅曰室有東西廂曰廟注夾室前堂同禮曰西夾南向注曰西廂夾室此東西夾室之正文也賈公彥曰室有東西廂曰廟其夾皆在序是則夾者猶今耳房之類也然其制度則未之聞東晉太廟正室一十六間東西儲各一間共十有八所謂儲者非夾室歟唐貞觀故事遷廟之主藏於夾室西壁南北三間又宋哲宗亦嘗於東夾室奉安後雖增建一室其夾室仍舊是唐宋夾室與諸室制度無大異也五帝不相沿樂三王不相襲禮今廟制皆不合古權宜一時宜取今廟一十五間南北六間東西二間凖唐南北三間之制壘至棟為三間壁以紅泥以凖東西序南向為門如今室户之制虛前以凖廂所謂夾室前堂也雖未盡合於古於今事為宜從之泰定帝泰定元年正月奉安仁宗及慈聖皇后神主先是盜入太廟盜仁宗及后金主命重作至是奉安太常禮官以失守議罪有差四月更定太廟室次初博士劉致建議周制天子七廟三昭三穆昭處於東穆處於西所以别父子親疏之序而使不亂也國朝取唐宋之制定為九世遂以舊廟八室而為六世昭穆不分父子並坐不合禮經新廟之制一十五間東西二間為夾室太祖室既居中則唐宋之制不可依惟當以昭穆列之父為昭子為穆則睿宗當居太祖之東為昭之第一世世祖居西為穆之第一世裕宗居東為昭之第二世兄弟共為一世則成宗順宗顯宗三室皆當居西為穆之第二世武宗仁宗二室皆當居東為昭之第三世昭之後居左穆之後居右西以左為上東以右為上也如此則昭穆分明秩然有序不違禮經可為萬世法若以纍朝定制依室次於新廟遷安則顯宗躋順宗之上順宗躋成宗之上以禮言之春秋閔公無子庶兄僖公代立其子文公遂躋僖公於閔公上史稱逆祀及定公正其序書曰從祀先公然僖公猶是有位之君尚不可居故君之上况未嘗正位者乎國家雖曰以右為尊然古人所尚或左或右初無定制古人右社稷而左祖宗國家宗廟亦居東方豈有建宗廟之方位既依禮經而宗廟之昭穆反不應禮經乎至是中書省臣以致議上言太廟太祖皇帝居中南向睿宗世祖裕宗以次祔西室順宗成宗武宗仁宗以次祔東室今議者言國家建太廟遵古制古尚左今尊者居右為少屈非所以示後世太祖居中南向睿宗宜袝左一室世祖祔右一室裕宗祔睿宗室之左顯宗順宗成宗兄弟也以次祔世祖室之右武宗仁宗亦兄弟也以次祔裕宗室之左英宗祔成宗室之右臣等以其議近是謹繪室次為圖以獻惟陛下裁擇從之文宗天厯元年詔毁顯宗室順帝元統二年十月始議以珍格皇后配饗武宗時議三朝皇后升祔未決巴延以問太常博士逯魯曾曰先帝朝既以珍格皇后無子不為立主今所當立者明宗母邪文宗母邪對曰珍格皇后自在武宗朝已膺寶册則文明二母皆妾今以無子之故不得立主而以妾母為正是為臣而廢先君之后為子而追封先父之妾於禮不可昔燕王慕容垂即位追廢其母后而立其生母為后以配享先王為萬世笑豈宜復蹈其失乎集賢學士陳皓素疾魯曾乃曰唐太宗册曹王王明之母為后是亦二后也奚為不可魯曾曰堯之母為帝嚳庶妃堯立為帝未聞册以為后而配嚳皇上為大元天子不法堯舜而法唐太宗邪衆服其議巴延亦是之遂以珍格皇后配武宗後至元六年詔毁文宗室至正三年冬十月親祀太廟帝行禮至寧宗室問曰朕寧宗兄也理當拜否太常博士劉聞對曰寧宗雖弟其為帝時陛下為臣春秋時魯僖公閔公兄也閔公先為君宗廟之祭未聞僖公不拜陛下當拜乃下拜按元世宗廟之事本末因革大槩如此凡大祭祀尤貴馬潼將有事勑太僕司挏馬官奉尚飲者革囊盛送焉其馬牲既與三牲同登于爼而割奠之饌復與籩豆俱設將奠牲盤酹馬潼則蒙古大祝詣第一座呼帝后神諱以致祭年月日數牲齋品物致其祝語以次詣列室亦如之禮畢則以割奠之餘撒於南櫺星門外名曰拋撒茶飯蓋以國禮行事尤其所重云律令之定補世祖至元二十八年夏五月頒行至元新格元初未有法守百司斷理獄訟循用金律頗傷嚴刻右丞何榮祖家世業吏習于律令乃以公規治民禦盜理財等十事緝為一書名曰至元新格上之帝命刻板頒行使百司遵守既而王暉上政事書首言議憲章以一政體曰法者輔治之具一日闕則不可君操於上永作成憲吏承於下遵為定式民曉其法易避而難犯若周之三典漢之九章是也今國家有天下六十餘年小大之法尚無定議內而憲臺天子之執法外而亷司州郡之法吏是皆司理之官而無所守之法猶有醫而無藥也至平刑議斷旋施為理未免有酌量準擬之差彼此輕重之異臣愚謂宜將纍朝聖訓與中統迄今條格通行議擬參而用之與百姓更始如是則法無二門輕重適當吏安所守民知所避而天下治矣帝曰善成宗大德三年春二月命何榮祖更定律令榮祖上書言臣所定者三十餘條一條有該三四事者帝曰古今異宜不必相沿但取宜于今者召元老大臣聚聽之未及頒行而榮祖卒既而鄭介夫上言律者至公大定之制也臯陶作士明于五刑穆王訓書罰屬三千綱舉目張井然不紊故百官奉法各知所守而不敢踰百姓視法各知所避而不敢犯自三代而下國家立政必以刑書為先厯觀古今未有無法而能一朝居者也今天下所奉以行者有例可援無法可守官吏因得以並緣為欺如甲乙互訟甲有力則援此之例乙有力則援彼之例甲乙之力俱到則無所可否遷調嵗月名曰撒放使天下黔首蚩蚩然狼顧鹿駭無所持循始之所犯不知終之所斷是陷之以刑也欲強其無犯得乎內而省部外而郡守抄寫格例至數十册遇事而難決則檢尋舊例或中無所載則旋行議擬是百官莫知所守也民間自以耳目所得之勑旨條令雜採類編刋行成帙曰斷例條章曰仕民要覽各家收置一本以為凖繩試閲二十年間之例校之三十年前半不可用矣更以十年間之例校之二十年前又半不可行矣是百姓莫知所避也孔子曰刑罰不中則民無所措手足今者號令不常有同兒戲或一年二年前後不同或綸音初降隨即泯沒遂致民間有一緊二慢三休之謡上無道揆下無法守不聞如是可以立國者京都為四方取則之地法且不行况四方之外乎如往年禁酒而私醖者比屋有之酒益薄價益髙而民益困又如禁牛而私宰者愈多輦轂之下十家而八又如姦盜殺人必不可赦而每嵗放圖嚕木以此人心輕於犯法又如婚姻聘財明有官庶高下折鈔之例而今之嫁女者重要財錢品官富人或索七十錠市庶之家不下二三十錠更要表裏頭面羊酒等物與估賣軀口無異又如買賣田宅舊有先親後鄰之例而今民業多歸勢要雖親與鄰不得占執告到官府無力與辨業在豪家終為所有推此數端天下槩可知矣今有司每視刑名為重而婚田錢債略不省察殊不知百姓負寃上無所訴是開官吏受贓之路也審囚決獄官每臨郡邑惟具成案行故事出斷一二便為盡職不知大辟以下刑名公事甚不少也路縣官吏未飽其欲每聞上司官至則將囚徒保候審録既畢仍復收禁此皆無法之弊也又兼衙門紛雜事不歸一十羊九牧莫之適從普天率土皆為王民豈可家自為政人自為國今正宫位下自立中政院匠人自𨽻金玉府校尉自歸拱衛司軍人自屬樞密院諸王位下自有宗正府內史府僧則宣政院道則道教所又有宣徽院徽政院都護府白雲宗所管户計諸司頭目布滿天下各自管領不相統攝凡有公訟並須約會或事涉三四衙門動是半年虛調文移不得一會或指日對問則各司所管互相隱庇至一年二年事無杜絶遂至於強凌弱衆暴寡貴抑賤無法之弊莫此為甚昔先帝時嘗命修律未及成書近議大德律所任非人訛舛尤多今宜於臺閣省部內選擇通經術明治體練達時宜者酌以古今之律文參以先帝建元以來制勑命令採以南北風土之宜修為一代令典使有司有所遵守生民知所畏避國有常科吏無敢侮永為定制子孫萬世之利也諸色衙門投下頭目除管領錢糧造作外無問大小詞訟俱涉約會者並令有司歸問庶使政歸一體獄無久淹可謂成物之簡能太平之要道矣仁宗皇慶元年三月詔以格例條畫有關于風紀者類集成書名曰風憲紀綱英宗至治二年十一月御史李端言世祖以來所定制度宜著為令使吏不得為姦治獄者有所遵守從之三年二月命完顔納丹曹伯啓等纂集纍朝格例而損益之凡為條三千五百三十有九名曰大元通制頒行天下其書之大綱有三一曰詔制二曰條格三曰斷例凡詔制為條九十有四條格為條一千一百五十有二斷例為條七百十有七其五刑之目凡七十至五十七謂之笞刑凡六十七至一百七謂之杖刑其徒法年數杖數相附麗為加減鹽徒盜賊既決而又鐐之流則南人遷于遼陽迤北之地北人遷於南方湖廣之鄉死刑則有斬而無絞惡逆之極者又有凌遲處死之法焉伯啓又言五刑者刑異五等今黥杖徒役于千里之外百無一生還者是一人身被五刑非五刑各底于一人也法當改丞相雖是之卒不果行運漕河渠海運世祖至元十七年二月浚通州運河十九年十二月始海運初朝廷糧運仰給江南者或自浙西涉江入淮由黃河逆流至中灤陸運至淇門入御河以至京師又或自利津河或由膠萊河入海勞費無成初宋季有海盜朱清者嘗為富家庸殺人亡命入海島與其徒張瑄乘舟抄掠海上備知海道曲折尋就招為防海義民巴顔平宋時遣清等載宋庫藏諸物從海道入京師授金符千户二人遂言海運可通乃命總管羅璧暨瑄等造平底船六十艘運糧四萬六千餘石由海道入京然創行海洋沿山求嶴風信失時逾年始至朝廷未知其利仍通舊運立京畿江淮都漕運司二各置分司以督綱運二十年復海運是年用王積翁議令阿巴齊等廣開新河然新河候潮以行船多損壞民亦苦之而蒙固岱言海運之舟悉至於是罷新河復事海運立萬户府二以朱清為中萬户張瑄為千户蒙固岱為萬户府達嚕噶齊未幾又分新河軍士水手及船於揚州平灤兩處運糧命三省造船二千艘於濟州河運糧蓋猶未專於海道也二十四年始立行泉府司專掌海運增置萬户府二總為四府是嵗遂罷東平河運糧二十五年內外分置漕運司二令在外者於河西務置司領接海運二十六年開會通河從夀張縣尹韓仲暉等言開河以通運道起項城縣安山渠西南由夀張西北至東昌又西北至臨清引汶水以達御河長二百五十餘里中建閘三十有一以時畜泄河成渠官張禮孫等言開魏博之渠通江淮之運古所未聞詔賜名會通河丘濬曰臣按會通河之名始見於此然當時河道初開岸狹水淺不能負重每嵗之運不過數十萬石非若海運之多也是故終元之世海運不罷國初會通河故道猶在今濟寧在城閘洪武三年曉諭往來船隻不許擠塞碑石故在北岸可考也二十四年河決原武漫過安山湖而會通河遂淤往來者悉由陸以至德州下河我太宗皇帝肇造北京永樂初運糧由江入淮由淮入黃河運至陽武發山西河南二處丁夫由陸運至衛輝下御河水運至北京厥后濟寧州同知潘叔正因州夫遞運之難請開會通舊河朝廷命工部尚書宋禮發丁夫十餘萬疏鑿以復故道又命刑部侍郎金純自汴城北金龍口開黃河故道分水下達魚臺縣塌場口以益漕河十年宋尚書請從會通河通運十三年始罷海運而專事河運矣明年平江伯陳瑄又請浚淮安安莊閘一帶沙河自淮以北沿河立淺鋪築牽路樹柳木穿井泉自是漕法通便百年于兹矣臣惟運東南粟以實京師在漢唐宋皆然然漢唐都關中宋都汴梁所漕之河皆因天地自然之勢中間雖或少假人力然非若會通一河前代所未有而元人始創為之非有所因也元人為之而未大成用之而未得其大利至國朝益修理而擴大之前元所運嵗僅數十萬而今日極盛之數則踰四百萬焉蓋十倍之矣昔宋人論汴水以為大禹疏鑿隋煬開濬終為宋人之用以為上天之意嗚呼夏至隋隋至宋中經朝代非一謂天意顓在宋臣不敢知若夫元之為此河河成而不盡以通漕蓋天假元人之力以為我朝用其意豈不彰彰然明矣哉二十七年五月省臣馬之貞言霖雨崩岸河道淤淺宜加修濬奏撥放罷輸運站户三千專供其役仍俾採伐木石等以充用嵗委都水監一官巡視且督工易閘以石而視所緩急為先後從之二十八年併海運四府為都漕運府一從朱清張瑄之請也止令清瑄二人掌之其屬有千戶百戶等官分為各翼以督嵗運二十九年開通惠河以郭守敬領都水監事初守敬言水利十有一事其一欲導昌平縣白浮村神山泉過雙塔榆河引一畝玉泉諸水入城滙於積水潭復東折而南入舊河每十里置一閘以時畜泄帝稱善復置都水監命守敬領之丞相以下皆親操畚鍤為之倡置閘之處往往於地中得舊時甎木人服其識逾年畢工自是免都民陸挽之勞公私便之帝自上都還過積水渾見舳艫蔽水大悅賜名曰通惠丘濬曰臣按通州陸挽至都城僅五十里耳而元人所開之河總長一百六十四里其間置閘壩凡二十處所費蓋亦不資况今廢墜已久慶豐以東諸閘雖存然河流淤淺通運頗難且積水潭即今海子在都城中禁城之北漕舟既集無停泊之所而又分流入大內然後南出其啓閉蓄泄非外人所得專者言者往往建請欲復元人舊規然亦未覩其果便利也成宗大德五年以畿內嵗飢增明年海運糧為百二十萬石八年增海運米為百四十五萬石十年中書省奏常嵗海漕糧百四十五萬石今江浙嵗儉不能如數請仍舊例湖廣江西輸五十萬石並由海道達京師從之武宗至大四年遣官至江浙議海運事時江東寧國池饒建康等處運糧率令海船從揚子江逆流而上江水湍急又多石磯石走沙漲糧船俱壞嵗嵗有之又湖廣江西之糧運至真州泊入海船船大底小亦非江水所宜於是以嘉興松江秋糧併江淮江浙財賦府嵗辦悉充運海漕之利蓋至是博矣先是江浙省臣言曩者朱清張瑄海漕米嵗四五十萬至百十萬時船多糧少顧直均平比嵗賦斂橫出漕户困乏逃亡者有之今嵗運三百萬漕舟不足遣人於浙東福建等處和雇百姓騷動本省左丞沙布迪音言其弟哈齊勒及瑪哈木丹德爾澉浦楊家等皆有舟且深知漕事乞以為海道運糧都漕萬户府官各以己力輸運官糧萬戶千戶並如軍官例承襲寬恤漕戶增給雇直庶有成效尚書省以聞請以瑪哈木丹德爾為遙授右丞海外諸畨宣慰使都元帥領海道運糧都漕運萬戶府事設千戶所十每所設達嚕噶齊千戶等官俱從之仁宗延祐二年二月省臣言江南行省起運諸物由會通河以達于都多踰期不至詰其故皆言始開河時止許行百五十料船近來權勢之人并富商大賈貪嗜貨利造三四百料或五百料船于此河行駕以致阻滯往來舟楫今宜于沽頭臨清二處各置小石閘一禁約二百料以上之船不許入河違者罪之順帝至正二年春正月開京師金口河時中書參議博囉特穆爾都水傅佐建言起自通州南高麗莊一百十餘里創開新河一道深五丈廣十五丈放西山金口水東流合御河接引海運至大都城內輸納是時托克托為中書右丞相奏行之廷臣多言其不可托克托排羣議務在必行左丞許有壬因條陳其利害言成宗大德二年渾河水發為民害大都路都水監將金口下閉閘板五年間渾河水勢浩大郭太史恐衝沒田薛二村南北二城又將金口以上河身用砂石雜土盡行堵閉文宗至順初因都水監郭道夀言金口引水通京城至通州其利無窮令工部官併河道提舉司及耆老相視皆言水由二城中多窒礙又盧溝河自橋至合流處從來未曾有漁舟上下此即不可行船之明驗也且通州去京城四十里盧溝止二十里若可行船當時何不于盧溝立馬頭百事近便却于四十里外通州為之又西山水勢高峻亡金時在都城之北流入曠野縱有衝決為害亦輕今則在都城西南與昔不同此水性本湍急若加以夏秋霖潦漲溢則不敢必其無虞宗廟社稷之所在豈容僥幸于萬一乎又地形高下懸絶若不作閘必致走水淺澀若作閘以節之則沙泥渾濁必致淤塞每年每月專人淘洗是終無窮盡之時也且郭太史作通惠河時何不用此水而逺取白浮之水引入都城以供閘壩之用蓋白浮之水澄清而此水渾濁不可用也此議方興傳聞于外萬口一辭以為不可若謂為成大功者不謀于衆人言不足聽則是商鞅王安石之法當今不宜有此議上托克托終不納興工四閲月而畢起閘放金口水流湍勢急沙泥壅塞船不可行而開挑之際毁民廬舍墳塋夫丁死傷甚衆又費用不資卒以無功既而御史糾劾建言者博囉特穆爾傅佐俱伏誅是年令江浙行省及中正院財賦總管府撥賜諸人寺觀之糧盡數起運僅得二百六十萬石及汝頴倡亂湖廣江右相繼陷沒而方國珍張士誠竊據浙東西之地貢賦不供海運之舟不至京師至正十九年遣巴延特穆爾徵海運于江浙詔張士誠輸粟方國珍具舟二賊互相猜疑巴延特穆爾與行省丞相多方開諭之始從命得粟十有一萬石後三年復遣官往徵拒命不與初海運之道自平江劉家港入海經揚州路通州海門縣黃連沙頭萬里長灘開洋沿山隩而行抵淮安路鹽城縣厯西海州海寧府東海縣密州膠州界月餘始抵成山計其水程自上海至楊村馬頭凡一萬三千三百五十里後朱清張瑄等言其路險惡復開生道自劉家港開洋至撑腳沙轉沙觜至三沙洋子江過大洪又過萬里長灘放大洋至青水洋又經黑水洋過成山過劉島至芝罘放萊州大洋抵界河口其道差為徑直最後殷明略又開新道從劉家港入海至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島又至登州沙門島於萊州大洋入界河當舟行風信有時自浙西至京師不過旬日而已視前二道為最便云然風濤不測糧船漂溺者無嵗無之間亦有船壞而棄其米者然視漕河之費則其所得蓋多矣嵗運之數至元二十年四萬六千五十石至者四萬二千一百七十二石二十一年二十九萬五百石至者二十七萬五千六百一十石二十二年一十萬石至者九萬七百七十一石二十三年五十七萬八千五百二十石至者四十三萬三千九百五十石二十四年三十萬石至者二十九萬七千五百四十六石二十五年四十萬石至者三十九萬七千六百五十五石二十六年九十三萬五千石至者九十一萬九千九百四十三石二十七年一百九十五萬五千石至者一百五十一萬二千八百五十六石二十八年二百五十三萬七千二百五十石至者二百二十八萬一千六百一十五石二十九年一百四十萬七千四百石至者一百三十六萬一千五百一十三石三十年九十萬八千石至者八十八萬七千五百九十一石三十一年五十一萬四千五百三十三石至者五十萬三千五百三十四石元貞元年三十四萬五百石二年三十四萬五百石至者三十三萬七千二十六石大德元年六十五萬八千三百石至者六十四萬八千一百三十六石二年七十四萬二千七百五十一石至者七十萬五千九百五十四石三年七十九萬四千五百石四年七十九萬五千五百石至者七十八萬八千九百一十八石五年七十九萬六千五百二十八石至者七十六萬九千六百五十石六年一百三十八萬三千八百八十三石至者一百三十二萬九千一百四十八石七年一百六十五萬九千四百九十一石至者一百六十二萬八千五百八石八年一百六十七萬二千九百九石至者一百六十六萬三千三百一十三石九年一百八十四萬三千三石至者一百七十九萬五千三百四十七石十年一百八十萬八千一百九十九石至者一百七十九萬七千七十八石十一年一百六十六萬五千四百二十二石至者一百六十四萬四千六百七十九石至大元年一百二十四萬一百四十八石至者一百二十萬二千五百三石二年二百四十六萬四千二百四石至者二百三十八萬六千三百石三年二百九十二萬六千五百三十二石至者二百七十一萬六千九百十三石四年二百八十七萬三千二百一十二石至者二百七十七萬三千二百六十六石皇慶元年二百八萬三千五百五石至者二百六萬七千六百七十二石二年二百三十一萬七千二百二十八石至者二百一十五萬八千六百八十五石延祐元年二百四十萬三千二百六十四石至者二百三十五萬六千六百六石二年二百四十三萬五千六百八十五石至者二百四十二萬二千五百五石三年二百四十五萬八千五百一十四石至者二百四十三萬七千七百四十一石四年二百三十七萬五千三百四十五石至者二百三十六萬八千一百一十九石五年二百五十五萬二千七百一十四石至者二百五十四萬三千六百一十一石六年三百二萬一千五百八十五石至者二百九十八萬六千一十七石七年三百二十六萬四千六石至者三百二十四萬七千九百二十八石至治元年三百二十六萬八千七百六十五石至者三百二十三萬八千七百六十五石二年三百二十五萬一千一百四十石至者三百二十四萬六千四百八十三石三年二百八十一萬一千七百八十六石至者二百七十九萬八千六百一十三石泰定元年二百八萬七千二百三十一石至者二百七萬七千二百七十八石二年二百六十七萬一千一百八十四石至者二百六十三萬七千五十一石三年三百三十七萬五千七百八十四石至者三百三十五萬一千三百六十二石四年三百一十五萬二千八百二十石至者三百一十三萬七千五百三十二石天厯元年三百二十五萬五千二百二十石至者三百二十一萬五千四百二十四石二年三百五十二萬二千一百六十三石至者三百三十四萬三百六石史臣曰元都于燕去江南極逺而百司庶府之繁衛士編民之衆無不仰給於江南自巴延獻海運之䇿而江南之粟分為春夏二運蓋至於京師者嵗多至三百萬餘石民無挽輸之勞國有儲畜之富豈非一代良法與丘濬曰臣按海運之法自秦已有之而唐人亦轉東吳粳稻以給幽燕然以給邊方之用而已用之以足國則始于元焉史稱當舟行風信有時自浙西至京師不過旬日而已雖有風濤漂溺之虞然視河漕之費所得蓋多故終元之世海運不廢我朝洪武三十年海運糧七十萬石給遼東軍餉永樂初海運七十萬石至北京至十三年會通河通利始罷海運臣考元史食貨志論海運有云民無挽輸之勞國有儲畜之富以為一代良法又云海運視河漕之數所得蓋多作元史者皆國初史臣其人皆生長勝國時習見海運之利所言非無徵者臣竊以為自古漕運所從之道有三曰陸曰河曰海河漕視陸運之費省什三四海運視陸運之費省什七八蓋河漕雖免陸行而人挽如故海運雖有漂溺之患而省牽率之勞較其利害蓋亦相當今漕河通利歲運充積固無資於海運也然善謀國者恆於未事之先而為意外之慮今於國家無事之秋尋元人海運故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙西東瀕海一帶由海道運使人習知海道一日漕渠少有滯塞此不來而彼來是亦思患預防之先計也治河窮河源附世祖至元三十三年十月河決開封祥符陳留杞太康通許鄢陵扶溝洧川尉氏陽武延津中牟原武睦州十五處調民夫二十餘萬分築隄防二十五年五月河決汴梁太康通許杞三縣陳潁二州皆被其害成宗元貞元年七月河決把縣蒲口先是河決汴梁發丁夫三萬塞之至是蒲口復決乃命廉訪使尚文相度形勢為久利之䇿文言長河萬里西來其勢湍猛至盟津而下地平土疏移徙不常失禹故道為中國患不知幾千百年矣自古治河處得其當則用力少而患遲事失其宜則用力多而患速此不易之定論也今陳留抵睢東西百有餘里南岸舊河口十一已塞者二自涸者六通川者三岸髙於水計六七尺或四五尺北岸故堤其水比田高三四尺或髙下等大槩南高於北約八九尺則堤安得不壞水安得不北也蒲口今決千有餘步迅疾東行得河舊瀆二百里至歸德橫堤之下復合正流或強湮遏上決下潰功不可成揆今之計河西郡縣宜順水性逺築長垣以禦泛濫歸德徐邳民避衝潰聽從安便被患之家量於河南退灘地內給付頃畝以為永業異時河決他所者亦如之亦一時救患之良䇿也蒲口不塞便時河朔郡縣及山東憲部爭言不塞則河北桑田盡化魚鱉之區塞之便帝從之是後蒲口復決障塞之役無嵗無之而水北入河復故道竟如文言二年七月汴梁等處大雨河決漂歸德數縣田廬禾稼詔免田租一年遣尚書諾海御史劉賡等塞之自蒲口首事凡築七十六所大德十年正月發河南民十萬築河防武宗至大二年七月河決歸德又決封丘仁宗皇慶二年六月河決陳亳雎三州開封陳留等縣沒民田廬泰定帝泰定二年二月以河水屢決立行都水監于汴梁倣古法備捍仍命瀕河州縣正官皆兼知河防事五月河溢汴梁七月河決陽武漂民居萬二千五百餘家尋復壞樂利隄發丁夫六萬四千人築之三年四月修夏津陽武河堤三十三所役丁夫七千五百人順帝至元元年十二月河決封丘至正四年正月河決曹州發丁夫萬五千八百修築之是月河又決汴梁五月大霖雨黃河溢平地水二丈決白茅堤金堤曹濮濟兗皆被災十月議修黃河淮河堤堰五年七月河決濟陰八年二月立行都水監于鄆城以賈魯為大監魯修河道察地形備得要害為圖上二䇿其一議修築北隄以制橫潰則用工省其二議疏塞並舉挽河東行使復故道其工數倍會魯遷中書右司郎中不果行九年正月立山東河南等處行都水監專治河患五月白茅河東注沛縣遂成巨浸十一年四月開黃河故道初黃河決丞相托克托集羣臣廷議言人人殊賈魯復申前議以為必塞北河疏南河使復故道役不大興害不能已於是遣工部尚書成遵與大司農圖嚕行視河議其疏塞之方以聞遵等自濟濮汴梁大名行數千里掘井以量地之髙下測岸以究水之淺深博采輿論以為河之故道斷不可復且曰山東連嵗飢饉民不聊生若聚二十萬衆於此地恐他日之憂又有重於河患者時托克托先入賈魯之言聞遵等議怒曰汝謂民將反耶自辰至酉論辨終莫能入明日執政謂遵曰修河之役丞相意已定且有人任其責公勿多言幸為兩可之議遵曰腕可斷議不可易遂出遵為河間鹽運使詔開黃河故道命賈魯以工部尚書充河防使發河南北兵民十七萬自黃陵岡南達白茅放於黃固哈濟等口又自黃陵西至楊清村合于故道凡二百八十里自其興功凡五閲月諸掃隄成河復故道超授魯集賢大學士賜金帶銀幣詔賜托克托世襲達爾罕之號以淮安路為其食邑命立河平碑其諸都水監有司官皆以功遷賞有差先是河南北童謡云石人一隻眼挑動黃河天下反及魯治河果於黃陵岡得石人一眼而汝頴之兵起時命翰林學士承旨歐陽玄制河平碑既成玄又自以為司馬遷班固記河渠溝洫僅載治水之道不言其方使後世任事者無所考信乃從魯訪問方略及詢過客質吏牘作至正河防記欲使來世罹河患者按而求之其言曰治河一也有疏有濬有塞三者異焉釃河之流因而導之謂之疏去河之淤因而深之謂之濬抑河之暴因而扼之謂之塞疏濬之别有四曰生地曰故道曰河身曰減水河生地有直有紆因直而鑿之可就故道故道有髙有卑高者平之以趍卑高卑相就則高不壅卑不瀦慮夫壅生潰瀦生堙也河身者水雖通行身有廣狹狹難受水水溢悍故狹者以計闢之廣難為岸岸善崩故廣者以計禦之減水河者水放曠則以制其狂水隳突則以殺其怒治隄一也有創築修築補築之名有刺水隄有截河隄有護岸隄有縷水隄有石船隄治掃一也有岸掃水掃有龍尾欄頭馬頭等掃其為掃臺及掃卷牽制薶挂之法有用土用石用鐵用草用木用杙用絙之方塞河一也有缺口有豁口有龍口缺口者已成川豁口者舊常為水所豁水退則口下於隄水漲則溢出於口龍口者水之所會自新河入故道之潨也此外不能悉書因其用功之次第而就述於其下焉其濬故道深廣不等通長二百八十里百五十四步而強功始自白茅長百八十二里繼自黃陵岡至南白茅闢生地十里口初受廣百八十步深二丈有二尺已下停廣百步高下不等相折深二丈及泉曰停曰折者用古算法因此推彼知其勢之低昻相凖折而取勻停也南白茅至劉莊村接入故道十里通折墾廣八十步深九尺劉莊至専固百有二里二百八十步通折停廣六十步深五尺專固至黃固墾生地八里面廣百步底廣九十步高下相折深丈有五尺黃固至哈濟口長五十一里八十步相折停廣墾六十步深五尺乃治凹里減水河通長九十八里百五十四步凹里減水河口生地長三里四十步面廣六十步底廣四十步深一丈四尺自凹里生地以下舊河身至張贊店長八十二里五十四步上三十六里墾廣二十步深五尺中三十五里墾廣二十八步深五尺下十里二百四十步墾廣二十六步深五尺張贊店至楊青村接入故道墾生地十有三里六十步面廣六十步底廣四十步深一丈四尺其塞專固缺口修隄三重并補築凹里減水河南岸豁口通長二十里三百十有七步其創築河口前第一重西隄南北長三百三十步面廣二十五步底廣三十三步樹置椿橛實以土牛草葦雜稍相兼高丈有三尺隄前置龍尾大掃言龍尾者伐大樹連稍繫之隄旁隨水上下以破囓岸浪者也築第二重正隄并補兩端舊隄通長十有一里三百步缺口正隄長四里兩隄相接舊隄置樁堵閉河身長百四十五步用土牛草葦稍土相兼修築底廣三十步修髙二丈其岸上土工修築者長三里二百十有五步有竒高廣不等通高一丈五尺補築舊隄者長七里三百步表裏倍薄七步增卑六尺計高一丈築第三重東後隄并接修舊隄高廣不等通長八里補築凹里減水河南岸豁口四處置樁木草土相兼長四十七步於是塞黃陵全河水中及岸上修隄長三十六里百三十六步其修大堤刺水者二長十有四里七十步其西復作大隄刺水者一長十有二里百三十步內創築岸上土隄西北起李八宅西隄東南至舊河岸長十里百五十步顛廣四步趾廣三之高丈有五尺仍築舊河岸至入水隄長四百二十步趾廣三十步顛殺其六之一接修入水西岸掃隄並行作西掃者夏人水工徵自靈武作東掃者漢人水工徵自近畿其法以竹絡實以小石每掃不等以蒲葦綿腰索徑寸許者從鋪廣可一二十步長可二三十步又以曳掃索綯徑三寸或四寸長二百餘尺者衡鋪之相間復以竹葦麻檾大繂長三百尺者為管心索就繫綿腰索之端於其上以草數千束多至萬餘勻布厚鋪於綿腰索之上稿而納之丁夫數千以足踏實推卷稍高即以水工二人立其上而嚙於衆衆聲力舉用小大推梯推卷成掃高下長短不等大者高二丈小者不下丈餘又用大索或五為接索轉致河濱選健丁操管心索順掃以立踏或挂之臺中鐵貓大橛之上以漸縋之下水掃後掘地為渠陷管心索渠中以散草厚覆築之以土覆其上復以土牛雜草小掃稍土多寡厚薄先後隨宜修疊為掃臺務使牽制上下縝密堅壯互為掎角掃不動搖日力不足火以繼之積纍既畢復施前法卷掃以厭先下之掃量水淺深制掃厚薄疊之多至四掃而止兩掃之間置竹絡髙二丈或三丈圍四丈五尺實以小石土牛既滿繫以竹纜其兩旁並掃密下大樁就以竹絡上大竹腰索繫於樁上東西兩掃及其中竹絡之上以草土等物築為掃臺約長五十步或百步再下掃即以竹索或麻索長八百尺或五百尺者一二雜厠其餘管心索之間俟歸入水之後其餘管心索如前薶挂隨以管心長索逺置五七十步之外或鐵貓或大樁曳而繫之通管束纍日所下之掃再以草土等物通修成隄又以龍尾大掃密挂於護隄大樁分折水勢其隄長二百七十步北廣四十二步中廣五十五步南廣四十二步自顛至趾通高三丈八尺其截河大隄高廣不等長十有九里百七十七步其在黃陵北岸者長十里四十一步築岸上土隄西北起東西故隄東南至河口長七里九十七步顛廣六步趾倍之而強二步高丈有五尺接修入水施土牛小掃稍草雜土多寡厚薄隨宜修疊及下竹絡安大樁繫龍尾掃如前兩隄法唯修疊掃臺增用白闌小石并掃上及前遊修掃隄一長百餘步直抵龍口稍北欄頭三掃並行掃大隄廣與刺水二隄不同通前列四掃間以管結成一大隄長二百八十步北廣百一十步其顛至水面高丈有五尺水面至澤腹高二丈五尺通高三丈五尺中流廣八十步其顛至水面高丈有五尺水面至澤腹高五丈五尺通高七丈並創築縷水橫隄一東起北截河大隄西底西刺水大隄又一隄東起中刺水大隄西抵西刺水大隄通長二里四十三步亦顛廣四步趾三之高丈有二尺修黃陵南岸長九里百六十步內創岸上隄東北起新補白茅故隄西南至舊河口高廣不等長八里二百五十步乃入水作石船大隄蓋由是秋八月二十九日乙巳道故河流先所修北岸西中刺水及截河三隄猶短約水尚少力未足恃決河勢大南北廣四百餘步中流深三丈餘益以秋漲水多故河十之八兩河爭流近故河口水刷岸北行洄漩湍激難以下掃且掃行或遲恐水盡湧入決河因淤故河前功遂隳魯乃精思障水入故河之方以九月七日癸丑逆流排大船二十七艘前後連以大桅或長樁用大麻索竹絙絞縛綴為方舟又用大麻索竹絙用船身繳繞上下令牢不可破乃以鐵貓於上流硾之水中又以竹絙絶長七八百尺者繫兩岸大橛上每絙或硾二舟或三舟使不得下船腹略鋪散草滿貯小石以合子板釘合之復以掃密布合子板上或二重或三重以大麻索縛之急復縛橫木三道於桅皆頭以索維之用竹編笆夾以草石立之桅前約長丈餘名曰水簾桅復以木榰拄使簾不偃仆然後選水工便捷者每船各二人執斧鑿立船首尾岸上捶鼓為號鼓鳴一時齊鑿須臾舟穴水入并沈遏決河水怒溢故河水暴增即重更水簾令後復布小歸土牛白闌長稍雜以草土以物隨宜填垜以繼之石船下詣實地出水基趾漸高復卷大掃以壓之前船勢略定尋用前法沈餘船以竟後功昏曉百刻役夫分番甚勞無少間斷船隄之後草掃三道並舉中置竹絡盛石並掃置樁繫纜四掃及絡一如修北截水隄之法第以中流水深數丈用物之多施功之大數倍他隄船隄距北岸才三四十步勢迫東河流峻若自天降深淺叵測於是先卷下大掃約高二丈者或四或五始出水面修至河口一二十步用工尤難薄龍口喧豗猛疾勢撼掃基陷裂欹傾俄逺故所觀者股栗衆議騰沸以為難合然勢不容已魯神色不動機解捷出進官吏工徒十餘萬人日加奬諭辭旨懇至衆皆感激赴功十一月十一日丁巳龍口遂合決河絶流故道復通又於隄前通卷欄頭掃各一道多者或三或四前掃出水管心大索繫前掃硾後欄頭掃之後後掃管心大索亦繫小掃硾前欄頭掃之前後先羈縻以錮其勢又於所交索上及兩掃之間壓以土石白闌土牛草土相半厚薄多寡相勢措置掃隄之後自南岸復修一隄抵已閉之龍口長二百七十步船隄四道用農家場圃之具曰轆軸者穴石立木如比櫛薶前掃之旁每步置一轆軸以橫木貫其後又穴石以徑二寸餘麻索貫之繫橫木上密挂龍尾大掃使夏秋􅀈水冬春凌􅑉不得肆力於岸此隄接北岸截河大隄長二百七十步南廣百二十步顛至水面高丈有七尺水面至澤腹高四丈二尺中流廣八十步顛至水高丈有五尺水面至澤腹高五丈五尺通高七丈四尺南岸護隄掃一道通長百三十步南岸護岸馬頭掃三道通長九十五步修築北岸隄防高廣不等通長二百五十四里七十一步白茅河口至板城補築舊隄長二十五里二百八十五步曹州板城至英賢村等處高廣不等長一百三十三里二百步稍岡至錫山縣增倍舊隄長八十五里二十步歸德府哈濟口至徐州路三百餘里修完缺口一百七處高廣不等積修計二里二百五十六步亦思刺店縷水月隄高廣不等長六里三十步其用物之凡樁木大者二萬七千榆栁雜稍六十六萬六千帶稍連根株者三千八百藁桔蒲葦雜草以束計者七百一十三萬五千有奇竹竿六十二萬五千葦席十有七萬二千小石二千艘繩索小大不等五萬七千所沈大船百有二十鐵纜三十有二鐵貓三百三十有四竹篾以斤計者十有五萬硾石三千塊鐵鑽萬四千二百有奇大釘三萬三千二百三十有二其餘若木龍蠶椽木麥楷扶樁鐵乂鐵吊枝麻搭火鈎汲水貯水等具皆有成數官吏俸給軍民衣糧工錢醫藥祭祀賑恤驛置馬乘及運竹木沈船渡船下樁等工鐵石竹木繩索等匠傭資兼以和買民地為河併應用雜物等價通計中統鈔百八十四萬五千六百三十六錠有奇魯嘗有言水工之功視土工之功為難中流之功視河濱之功為難決河口視中流又難北岸之功視南岸為難用物之效草雖至柔柔能狎水水漬之生泥泥與草併力重如碇然維持夾輔纜索之功實多蓋由魯習知何事故其功之所就如此玄之言曰是役也朝廷不惜重費不吝高爵為民辟害托克托能體上意不憚焦勞不恤浮議為國拯民魯能竭其心思智計之巧乘其精神膽氣之壯不惜劬瘁不畏譏評以報君相知人之明宜悉書之使職史氏者有所考證也史臣曰議者往往謂天下之亂皆由賈魯治河之役勞民動衆之所致殊不知元之所以亡者紀綱廢弛風俗偷薄其致亂之階非一朝一夕之故使魯不興是役天下之亂詎無從而起乎二十六年二月黃河北徙先是河決小流口達于清河壞民居傷禾稼至是復北徙自東明曹濮下及濟寧民皆被害河源古無所見禹貢導河止自積石漢使張騫持節道西域度玉門見二水交流發蔥嶺趍于闐滙鹽澤伏流千里至積石而再出唐薛元鼎使吐蕃訪河源得之於穆穆哩山然皆歷嵗月涉艱難而其所得不過如此世之論河源者又皆推本二家其説怪迂總其實皆非本真意者漢唐之時地方未盡臣服而道未盡通故其所往每迂回艱阻不能直抵其處而究其極也元有天下薄海內外人迹所及皆置驛傳使驛往來如行國中至元十七年命都實為招討使佩金虎符往求河源都實既受命是嵗至河州州之東六十里有寧河驛驛西南六十里有山曰殺馬關林麓穹隘舉足浸高行一日至巔西去愈高四閲月始抵河源是冬還報并圖其城傳位置以聞其後翰林學士潘昻霄從都實之弟庫庫楚得其説撰為河源志臨川朱思本又從巴爾濟蘇家得帝師所藏梵字圖書而以華文譯之與昻霄所志互有詳略今取二家之書考定其説有不同者附注于下按河源在土蕃朵甘斯西鄙有泉百餘泓洳散渙弗可逼視方可七八十里履高山下瞰燦若列星以故名鄂端諾爾鄂端譯言星宿也思本曰河源在中國西南直四川馬湖蠻部之正西三千餘里雲南麗江宣撫司之西北二千五百餘里帝師薩斯嘉地之西南二千餘里水從地涌出如井其井百餘東北流百餘里滙為大澤曰鄂端諾爾羣流奔輳近五七里滙二巨澤名為鄂楞諾爾自西而東連屬吞噬行一日迤邐東騖成川號齊必勒河又二三日水西南來名伊爾齊與齊必勒河合又三四日水南來名呼蘭又水東南來名伊拉齊合流入齊必勒其流浸大始名黃河然水猶清人可涉思本曰呼蘭河源出自南山其地大山峻嶺綿亘千里水流五百餘里出伊爾齊河伊爾齊河源亦出自南山西北流五百餘里始與黃河合又一二日岐為八九股名伊遜鄂羅木譯言九度通廣五七里可度馬又四五日水渾濁土人抱革囊騎過之聚落紏木斡象舟傳髦革以濟僅容兩人自是兩山峽東廣可一里二里或半里其深叵測朵甘斯東北有大雪山名伊拉瑪博囉其山最高譯言騰格哩哈達即崑崙也山腹至頂皆雪冬夏不消土人言逺年成氷時六月見之自八九股水至崑崙行二十日思本曰自渾水東北流二百餘里與和囉海圖河合和囉海圖河源自南山水正北偏西流八百餘里與黃河合又東北流一百餘里過瑪拉噶之地又正北流一百餘里乃折而西北流二百餘里又折而正北流一百餘里又折而東流過崑崙山下畨名伊拉瑪博囉其山高峻非常山麓綿亘五百餘里河隨山足東流過薩斯嘉庫濟克特地河行崑崙南半日又四五日至地名庫濟及克特二地相屬又一處地名哈喇伯勒齊爾四達之衝也多寇盜有官兵鎮之近北二日河水過之思本曰河過克特與伊實巴沁河合伊實巴沁今河源自鐵豹嶺之北正北流凡五百餘里而與黃河合崑崙以西人簡少多處山南山皆不穹峻水亦散漫獸有髦牛野馬狼狍􅀈羊之類其東山益高地亦漸下岸狹隘有狐可跳躍而越之處行五六日有水西南來名納琳哈喇譯言細黃河也思本曰哈喇河自白狗嶺之北水西北流五百餘里與黃河合又兩日水南來名奇爾穆蘇二水合流入河思本曰自哈喇河與黃河合正共流二百餘里過鄂勒博站又西北流經崑崙之北二百餘里與竒爾穆蘇河合奇爾穆蘇河源自威成之西北岷山之北水北流即古當州境正北流四百餘里折而西北流五百餘里與黃河合河水北行轉西流過崑崙北一向東北流約行半月至貴德州地名必齊勒始有州治官府州𨽻吐蕃等處宣慰司司治河州又四五日至積石州即禹貢積石五日至河州安鄉關一日至達魯坑東北行一日洮河水南來入河思本曰自竒爾穆蘇河與黃河合又西北流與彭贊河合彭贊河源自彭贊山之西北水正西流七百餘里過扎薩克逹實與黃河合折而西北流三百餘里又折而東北流過西寧州貴德州馬嶺凡八百餘里與邈水合邈水源自清唐宿軍谷正東流五百餘里過阿勒巴站與黃河合又東北流過土橋站古積石州來羌城廓州溝米站界羌城凡五百餘里過河州與頁彭河合頁彭河源自西傾山之北水東北流凡五百餘里與黃河合又東北流一百餘里過塔布城銀川站與湟水浩亹河合湟水源自祈連山下正東流一千餘里注浩亹河浩亹河源自刪丹州之南山山下水東南流一百餘里注湟水然後與黃河合又東北流一百餘里與洮河合洮河源自羊撒嶺北東北流過臨洮府凡八百餘里與黃河合又一日至蘭州過北卜渡至鳴沙河過應吉里州正東行至寧夏府南東行即東勝州𨽻大同路自發源至漢地南北澗溪細流傍貫莫知紀極山皆草石至積石方林木暢茂世言河九折彼地有二折蓋奇爾穆蘇及貴德州必齊勒也思本曰自洮水與黃河合又東北流過達勒達地凡八百餘里過豐州西受降城折而正東流過達勒達地古天德軍中受降城東受降城凡七百餘里折而正南流過大同路雲內州東勝州與黑河合黑河源自漢陽嶺之南水正西流凡五百餘里與黃河合又正南流過保德州葭州及興州境又過臨州凡一千餘里與察納河合察納河源自古宥州東南流過陜西省綏德州凡七百餘里與黃河合又南流三百里與延安河源自陕西蘆子關亂山中南流三百餘里過延安府折而正東流三百里與黃河合又南流三百里與汾河合汾河源自河東朔武州之南亂山中西南流過管州冀寧路汾州霍州晉寧路綘州又西流至龍門凡一千二百餘里始與黃河合又南流二百里過河中府過潼關與太華大山綿亘水勢不可復南乃折而東流大槩河源東北流所歷皆西畨地至蘭州凡四千五百餘里始入中國又東北流過達勒達地凡二千五百餘里始入河東境內又南流至河中凡一千八百餘里通計九千餘里官制之定世祖中統元年四月初定官制初太祖特穆津起自朔土統有其衆部落野處諸事草創設官甚簡以斷事官為至重之任位三公上丞相謂之大筆且齊掌兵柄則左右萬戶而已後以西域漸定始置達嚕噶齊於各城監治之達嚕噶齊華言掌印官也及取中原太宗諤格德依始立十路宣課司選儒臣用之金人來歸者因其故官若行省若元帥則以行省元帥授之世祖即位始大新制作乃命劉秉忠許衡酌古今之宜定內外官制其總政務者曰中書省秉兵柄者曰樞密院司黜陟者曰御史臺體統既立其次在內者則有寺有監有衛有府在外者則有行省有行臺有宣慰司有廉訪司其牧民者則曰路曰府曰州曰縣官有常職位有常員食有常祿其長則蒙古人為之而漢人南人二焉於是一代之制始備五月立十路宣撫司置宣撫使并副使至元七年春正月立尚書省初議三省並建侍御史高鳴上言曰臣聞三省設自近古其法由中書出政移門下議不合則有駁正或封還詔書議合則還移中書中書移尚書尚書乃下六部郡國方今天下大於古而事益繁取決一省猶曰有壅况三省乎且多置官者求免失政也但使賢俊萃于一堂連署參決自免失政豈必别官異坐而後無失政乎故曰政貴得人不貴得官不如一省便帝深然之九年春正月罷尚書省十五年秋七月詔定武官承襲之制凡有功升秩者原職令他有功者居之不得令子姪復代陳亡者始得襲病死者降一等把總百戶老死者不襲著為令十九年十二月詔御史臺得自選其屬初御史唯用漢人至是崔彧請參取蒙古人用之又言臺察之選止申中書寧無偏黨之弊今宜令本臺得自選任既而江淮省臣有欲專恣而忌臺察之言者上議欲以行臺𨽻行省詔廷臣雜議兵部尚書董文用曰御史臺譬之臥虎雖未噬人人猶畏其虎也今虗名僅存而紀綱猶不振更加抑之則風采薾然無復可望此不可行也從之二十年六月增給官吏俸初詔定官吏贓罪法自五十貫以上皆決杖除名不敘百貫以上者死崔彧謂今百官月俸不能副贍養之資難責以廉勤之操宜更議增庶官月俸所增俸鈔唯賦之於民官吏不貪民必受惠其有以貪抵罪又復何辭遂詔內外官吏俸以十分為差增給五分三十三年秋七月詔中書省銓定省院臺部官屬自中書令左右丞相而下各有定員仍諭安圖曰中書省朕當親擇其餘諸司並從中書增減安圖曰比聞聖意欲倚近侍為耳目如臣所行非法從其舉奏今近臣乃伺隙援引非類曰某居某官某居某職以所署奏目付中書施行銓選之法自有定制其尢無事例者臣嘗廢格不行慮其黨有短臣者帝曰卿言良是後若此者其勿行之三十年春正月汰冗官先是趙天麟上䇿曰臣聞設計張網莫如清簡建官置吏切戒繁多夫爵者官之尊也階者官之次也品者官之序也職者官之掌也位者官之居也祿者官之給也吏者官之佐也雖則事非位立而不辦亦有事因位多而益生此聖王所以貴寡不貴衆欲靜不欲動也唐虞稽古建官惟百夏商官倍亦克用乂周卿分職各率其屬厥後職員愈多而治愈不及古矣是以漢光廢四百縣而下民業定隋文廢五百部而天下政行皆以官不用多而在乎得賢政不在煩而貴乎省事也今國家立制自王及國王郡王國公以下為爵自特進崇進至將軍大夫校尉郎為階自正一至從九為品掌典當行為職各職所居為位各位養廉之資為祿各司贊佐行文之史為吏其制亦已詳矣然而文武二等分部中外本欲圖寧而似乎難寧也臣伏見京師不急之司院無用之署局及隨朝臺省院部以下諸有司官吏可兼不兼可併不併亦已有之矣畿外行省隨省諸有司宣慰廉訪等司路府州縣倉庫局監等諸衙門及各衙門內官吏亦有冗者矣武臣萬戶所管不滿萬人千戶所管不滿千人之類亦已有之矣臣竊以冗官之大弊有三一曰選法之弊二曰政事之弊三曰軍民之弊夫文武官吏員數既多當考滿之時近春秋之選資格之簿擾攘紛紜保薦之文交錯旁午有司行文猶且未暇奚暇顧孰果有才孰果有德而考校之也哉既不遑考校則取凖于籍文薦書之所陳布者矣于是雜流之人進貨賄之竇開遂致員多闕少無如之何經營者早得遷除養高者坐淹嵗月此選法之弊也夫文武官吏員數既多有當決之事而不決有當行之事而不行問其職則曰我此職也問其施為則曰僚屬非一豈我之所能獨主混齊竽而難辨受王命而自安及乎朝廷聞之遂立稽違期限之罰不亦甚歟此政事之弊也夫國家用人路廣浮濫得升使之臨蒞在下必不能敷宣政化如是則刻剝之苦役使之煩為害良多此軍民之弊也三弊不絶而徒立法以防之不知法立而懼法之人姦欺之計亦益生矣伏望陛下察此三弊凡京師不急之司院無用之局署及天下諸衙門可罷者悉罷之凡行省隨省諸有司宣慰廉訪等司路府州縣等一切諸衙門及萬戶千户所管不及數之類可併者悉併之凡省臺院部以下有諸司之官吏及天下諸衙門之官吏可減者悉減之然後以慎名器之法擇人而用之又以考幽明之法順理而考之則典選者易見其人易程其效而選法清矣臨政者事有所歸職有所主而政績成矣在下者省于煩役免于苦刻而民業定矣民者天下之本民業定而天下不太平者未之有也上嘉納之于是省內外官府二百五十五所官六百六十九員尚書省之復武宗至大二年八月復置尚書省以奇塔特布濟克為右丞相托克托為左丞相三寶努約希為平章政事本巴為右丞孟克特穆爾為左丞王羆參知政事初帝從托克托嘉琿帕哈哩鼎言欲復置尚書省分理財用御史臺臣言至元中阿哈瑪特僧格相繼立尚書省綜理財用事敗併入中書今四方地震水災嵗仍不登百姓重困又復立之則必增置有司濫設官吏殆非益民之事且綜理財用在人為之若止命中書未見不可帝曰卿言良是此二人者願任其事姑聽其行焉至是約希又與本巴言其事帝命與塔斯布哈集議本巴言政事得失皆前日中書省臣所為今欲舉正彼懼有纍孰願行者臣請乞舊事從中書新政從尚書其尚書省官請以奇塔特布濟克托克托等為之帝並從其議塔斯布哈言此大事遽爾更張乞與諸老臣更議之帝不從三寶努言尚書省既立更新庶政變易鈔法用官六十四員其中宿衛之士有之品秩未至者有之未歷仕者有之此皆素習於事既已任之乞勿拘例授以宣敕仍改各行中書省為行尚書省以尚書條畫頒示天下敢有沮撓者罪之九月帝從約希言鈔法大壞乃改造至大銀鈔凡十三等每一兩準至元鈔五貫白銀一兩黃金一錢隨路立平凖行用庫買賣金銀倒換緡鈔或民間絲綿布帛赴庫回易依驗時估給價隨處路府州縣設立常平倉以權物價豐年收糴粟麥米榖值青黃不接之時比附時估減價出糴以遏沸湧金銀私相買賣及海舶興販金銀銅錢絲棉布帛下海者並禁之尚書省言古者設官分職各有攸司方今地大民衆事益繁冗若使省臣總挈綱領庶官各盡厥職其事豈有不治頃嵗省務壅塞朝夕惟署押文案事皆廢弛天災民困職此之由自今以始省部一切皆令從宜處置大事或須上請得旨即行用成至治上順天道下安民心又言國家地廣民衆古所未有纍朝格例前後不一執法之吏輕重任意請自太祖以來所行政令九千餘條刪除繁冗使歸於一編為定制並從之時又立資國院於大都山東河南遼陽江淮湖廣四川立泉貨監六産銅之地設提舉司十九鑄錢曰至大通寶者準至大錢十文與歷代錢通用其當五當三折二並以舊數用之既而御史言至大銀鈔始行品目繁多民猶未悟而又兼行銅錢慮有相妨今民間拘收銅器甚急民殊不便乞與省臣詳議不報尚書省上言三宫內降之旨曩中書奏請勿行臣等謂宜仍舊行之儻於大事有害則復奏請中書之務乞以盡歸臣等至元二十四年凡宣敕亦以尚書省掌之今臣議乞從尚書省任人而以宣敕省官委中書從之三年六月詔尚書省右丞相托克托左丞相三寶努盡總百司庶務三寶努言省部官不肯恪勤署事敕自今晨集暮退茍或怠弛不必以聞便宜罪之其到任者或一再月辭以病者杖罷不敘四年正月帝崩皇太子罷尚書省托克托三寶努約希本巴王羆等皆伏誅初皇太子以托克托等變亂舊章流毒百姓凡誤國欲悉按誅之延慶使楊多爾濟諫曰為政而首尚殺非帝王治也太子感其言特誅其尤者既而御史言托克托等既正典刑而黨附之徒布在列司若博囉孟克特穆爾庫哩濟蘇烏瑪喇等姦貪害政今中書方欲用為各省平章參政等官宜加罷黜遂流孟克等于海南尋復以行尚書省為行中書省有司百務復歸中書四月罷行至大銀鈔銅錢資國院及各處泉貨監提舉司俱罷應尚書省已發各處至大鈔本及至大銅鈔截日封貯民間行使者赴行用庫倒換楊多爾濟曰法有便否不當視立法之人為廢置銅錢與楮幣相權而用古之道也何可遽廢耶言雖不用時論是之陳邦瞻曰元世尚書省之設凡三阿哈瑪特僧格托克托三人相終始初皆以言利當人主意尚書省蓋專為理財用設也中書何不可理財而必别設一省與之並哉由元世任用勳舊諸人皆新進若與之同官勢必出其下不可得志惟别立尚書省而中書之權遂奪權奪而諸勳舊束手擁虛位矣此阿哈瑪特諸人之謀也元史紀事本末卷二

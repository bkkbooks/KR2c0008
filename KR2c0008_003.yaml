body:
  text: 元史紀事本末卷三明陳邦瞻撰諸儒出處學問之槩世祖至元十八年三月許衡卒衡自辭國子祭酒歸懷孟至是病革家人祀先衡曰吾一日未死敢不躬祀扶而起奠獻如儀既徹家人餕怡怡如也已而卒年七十三懷人無貴賤少長皆哭于其門四方學士大夫聞訃皆為位而哭衡嘗語其子曰我平生為虛名所纍竟不能辭官死後慎勿請諡勿立碑但書許某之墓四字使子孫識其處足矣後贈司徒封魏國公諡文正虞集曰南北未一許衡先得朱子之書伏讀而深信之持其説以事世祖儒者之道不廢衡實啓之衡學問始末與姚樞竇默趙復等出處俱附見宋編十九年十二月徴處士劉因因字夢吉容城人天資絶人日記數千言過目成誦初為經學究訓詁注釋之説嘆曰聖人精義殆不止此及得周邵程朱之書一見即曰我固謂當有是也及論其學之所長曰邵至大也周至精也程至正也朱子極其大盡其精而貫之以正也愛諸葛孔明靜以修身之語表所居曰靜修至是以博果密薦詔徴之擢右贊善大夫尋以繼母老辭歸俸給一無所受後復以集賢學士徵因上宰相書力辭帝聞之曰古有所謂不召之臣其斯人之徒歟遂不強三十年卒于家成宗大德七年夏四月蘭溪處士金履祥卒履祥字吉父幼敏睿及長從學同郡王柏及何基之門基則學于黃幹而幹則親得朱熹之傳者宋將亡遂絶意進取屏居金華山中訓迪後學諄切無倦及何基王柏之喪履祥率其同門之士以義制服觀者始知師弟之繫于彛倫也履祥嘗謂司馬文正公作資治通鑑劉恕為外紀以記前事不本于經而信百家之説是非謬于聖人不足以傳信乃用邵氏皇極經世厯胡氏皇王大紀之例損益折𠂻一以尚書為主下及詩禮春秋旁採舊史諸子表年繫事斷自唐堯以下接于通鑑之前勒為一書名曰通鑑前編以授門人許謙曰二帝三王之盛其微言懿行宜後王所當法戰國申商之術其苛法亂政亦後王所當戒則是編不可以不著也謙嘗序其論孟考證曰聖賢之心盡在四書而四書之義備於朱子顧其立言詞約意廣讀者咸得其粗而不能悉究其義或以一偏之致自異而初不知未離其範圍世之詆訾貿亂務為新奇者其弊正在此耳此金先生考證之所由作也始余三四讀自以為瞭然已而不能無惑久若有得覺其意初不與己異愈久而所得愈深與已意合者亦大異於初矣童而習之白首不知其要領者何限其可以易心求之哉當時以基之清介純實似尹和靖柏之高明剛正似謝上蔡履祥則親得之二氏而並克於己者也居仁山之下學者稱為仁山先生十二年十二月徵處士蕭㪺為太子諭德㪺字惟斗陜西奉元人初出為府吏與上官語不合即引退讀書南山者三十年不求進取博極羣書及門受業者甚衆鄉人有暮行遇盜詭曰我蕭先生也盜驚愕釋去世祖時辟為陜西儒學提舉不赴後纍授集賢直學士國子司業改集賢侍讀學士俱不赴至是徵拜太子右諭德扶病至京師入覲東宫書酒誥為獻以朝廷時尚酒故也尋以病請解職或問之則曰禮東宫東面師傅西面此禮今可行乎俄擢集賢直學士國子祭酒依前右諭德固辭而歸卒諡貞敏同時有韓擇字從善侯均字伯仁同恕字寬甫恕弟子第五居仁字士安皆奉元人以學行名振關中學者宗之文宗天厯二年春正月贈緱山處士杜瑛為翰林院學士諡文獻瑛字文其先霸州信安人至瑛遂避地河南緱山中搜訪諸書盡讀之世祖中統初詔徴為懷孟提舉學校官不赴杜門著書優遊道藝以終其身所著書曰春秋地里原委十卷語孟旁通八卷皇極引用八卷皇極疑事四卷極學十卷律吕律厯禮樂雜志三十卷文集十卷其於律則究其始研其義長短清濁周徑積實各以類分取經史之説以實之而折𠂻其是非其於厯則謂造厯者皆從十一月甲子朔夜半冬至為厯元獨邵子以為天開於子取日甲月子星甲辰子為元會運世之數無朔虛無閏餘率以三百六十為嵗而天地之盈虛百物之消長不能出乎其中矣論閉物開物則曰開於已閉於戊五天之中也六地之中也戊巳月之中星也又分卦配之紀年金之大定庚寅交小過之初六國朝之甲寅三月二十有三日寅時交小過之九四其説多先儒所未發云至順三年六月吳澄卒澄字幼清撫州崇仁人自幼用力聖賢之學嘗著説曰道之大原出於天神聖繼之堯舜而上道之元也堯舜而下其亨也洙泗鄒魯其利也濓洛關閩其貞也分而言之上古則羲皇其元堯舜其亨禹湯其利文武周公其貞乎中古之統仲尼其元顔曽其亨子思其利孟子其貞乎近古之統周子其元程張其亨也朱子其利也孰為今日之貞乎未之有也然則可以終無所歸哉具早以斯文自任如此宋末舉進士不第隱居布水谷讀書著述遂不復出至元中召至京師欲官之以母老辭歸朝廷命有司即其家録所著書置于國子監除江西儒學副提舉以疾去尋為翰林學士泰定間謝病歸士大夫皆迎請執業而四方之士不憚數千里躡履負笈來學山中者常不下千數百人少暇即著書至將終猶不置也於易書詩春秋禮記各有纂言盡破傳注穿鑿以發其藴條歸紀敘精明簡潔卓然成一家言作學基學統二篇使人知學之本與為學之序尤有得於邵堯夫陸子靜之學校定皇極經世書又校正老子莊子太玄經樂律及八陳圖郭璞葬書初澄所居草屋數間程巨夫題曰草廬故學者稱之為草廬先生卒年八十五有大星墜其舍東北贈臨川郡公諡文正順帝元統二年夏四月休寧處士陳櫟卒櫟字夀翁少有異質宋亡科舉廢櫟慨然發憤致力於聖賢之學以朱熹氏為宗延祐初詔科舉取士櫟不欲就試有司強之試中選遂不赴禮部教授于家不出門户者數十年所居堂曰定宇學者稱為定宇先生至是卒年八十三揭徯斯志其墓與吳澄並稱曰澄居通都大邑又數登用于朝天下學者四面而歸之故其道逺而章尊而明櫟居萬山間與木石居而足迹未嘗出鄉里故其學必待其書之行天下乃能知之及其行也亦莫之禦是可謂豪傑之士矣世以為知言櫟同郡胡一桂胡炳一桂字庭芳婺源人初德興沈貴寶受易於董夢程夢程受朱熹之易於黃幹一桂父方平及從貴寶夢程學嘗著易學啓蒙通釋一桂之學出於方平得朱熹氏源委之正所著書有周易本義附録纂疏本義啓蒙翼傳朱子詩傳附録纂疏並行于世學者稱雙湖先生炳字仲虎亦以易名家作易本義通釋而於朱熹所著四書用力尤深餘干饒魯之學本出於朱熹而其為説多與熹抵牾炳文深正其非作四書通凡詞異而理同者合而一之辭同而指異者析而辨之往往發其未盡之藴東南學者因其所自號稱雲峯先生至正三年冬十月金華處士許謙卒謙字益之父觥宋淳祐七年進士謙少孤甫能言母陶授以孝經論語入耳輒不忘既長遭國亡而家亦破自力於學借書於人以四部分讀之所涉向博而有疑無所從質聞鄉先生金履祥深明道學之要遂委已而學焉履祥告之曰吾儒之學理一而分殊理不患其不一所難者分殊耳又曰聖人之道中而已矣謙由是致其辨於分之殊而要其歸於理之一每事每物求夫中者而用之蓋自其登金氏之門即以聖賢之學為已任師弟子間口授指畫盡得其相傳之奧履祥沒謙益加充闡自得者為多於書無所不觀窮探聖微有不可通即不敢強於儒先之説所未安者亦不敢茍同也謙學於天文地理典章制度食貨刑法字學音韻醫經數術靡不該貫一事一物可為博聞多識之助者必謹志之而異端之説必洞究其藴奧其教學者以立性人倫為本以開明心術變化氣質為先以為己為立心之要以分别義利為處事之制至誠諄切內外殫盡為學者師四十年部使者數列其行義于朝郡舉茂才又舉遺逸以應詔皆固辭江浙鄉闈嘗請持文衡亦辭不就所著述甚衆尤深於易嘗謂伏羲之經廣大悉備文王周公孔子之詞乃其傳注六爻之義特發凡舉例耳學者稱為白雲先生後諡文懿王褘曰堯舜禹湯文武周公相傳之道至孔子乃集其大成宋周程氏者作復續斯道之統而道南之學由楊時氏一再傳為羅從彥氏李侗氏至朱熹氏又集其大成者也然孔門羣弟子惟曾氏之傳得其宗曽氏以其所傳傳之子思子思以傳之孟子一出於正焉朱氏之徒亦衆矣得其宗者惟黃幹氏幹傳何基氏基傳王柏氏柏之傳為履祥為謙其授受之淵源如御一車以行大逵如執一籥以節衆音推原統緒必以四氏為朱學之正適亦何其一出於正粹然如此也程氏之道至朱氏而始明朱氏之道至金氏許氏而益著使百年以來學者有所宗鄉不為異説所遷而道術必出於一可謂有功於斯道者矣大抵儒者之功莫大於為經經者斯道之所載焉者也有功於經即其所以有功於道也金氏許氏之為經其為力至矣其於斯道謂之有功非耶五年十二月資州處士黃澤卒澤字楚望生有異質自少以明經學道為志好為苦思久之如有所見作顔淵仰高鑽堅論大德中江西行省聞其名授江州景星書院山長既久又為山長于洪州東湖書院受學者益衆秩滿即歸閉門授徒不復言仕嘗以為去聖久逺經籍殘闕傳注家率多傅會近世儒者又各以才識求之故議論雖多而經旨愈晦必積誠研精有所悟入然後可以窺見聖人之本真既乃盡悟經傳之旨自言每於幽間寂寞顛沛流離疾病無聊之際得之及其久也則豁然無不貫通於是六經傳注之失未決之疑凡數十年苦思而未通者皆渙然氷釋作十翼舉要三傳義例翼經罪言吳澄嘗觀其書以為平生所見明經士未有能及之者謂人曰能言距楊墨者聖人之徒也楚望真其人乎然澤雅自慎重未嘗輕與人言李泂使過九江請北面為弟子授一經且將經紀其家澤謝之曰以君之才何經不可明然亦不過筆授其義而已若余則於艱苦之餘乃能有見吾非邵子不敢以二十年林下期君也泂嘆息而去或問澤自閟如此寧無不傳之懼澤曰吾道興廢上關天運豈區區人力所致門人惟新安趙汸為高弟得其春秋之學為多郭守敬授時厯世祖至元十七年十一月甲子行授時厯先是至元初劉秉忠言大明厯自遼金承用二百餘年浸以後天宜在所立改未及用其議而秉忠沒至十三年江南略平天下混一上思其言遂議改修新厯立局以庀事詔郭守敬與王恂率南北日官分掌測驗而張文謙張易領其事前中書左丞許衡亦參預焉守敬乃言厯之本在於測驗而測驗之器莫先於儀表今司天渾儀宋皇祐中汴京所造與此處天度不符比量南北二極差約四度表石年深亦復欹側宜盡考其失更置之及擇高塏之所造木為重棚創簡儀高表用相比覆又以為天樞附極而動昔人嘗展管望之未得其的作候極儀極辰既得天體斯正作渾天象象雖形似莫適所用作玲瓏儀以表之矩方測天之正圓莫如以圓求圓作仰儀古有經緯結而不動改之作立運儀日有中道月有九行合而作證理儀表高景虛其象非真作景符月雖有明測景則難作窺凡厯法之驗在於交會作日食月食儀天有赤道輪以當之兩極低昂標以指之作星晷定時儀其器凡十有三又作正方按九表懸正儀凡四等為四方行測者所用又作仰規覆矩圖異方渾蓋圖月出入永短圖凡五等與上諸儀互相參考十六年改局為太史院以恂為太史令守敬同知太史院事乃進所造儀表式於榻前指陳理致一一周悉自朝及夕上不為倦因奏唐開元間僧一行令南宫説測景天下其可考者今十三處今疆宇比唐尤廣必多方測驗而後日月交會分數時刻之不同晝夜長短之不同日月星辰去天高下之不同可得周知上可其奏乃置監候官十四人
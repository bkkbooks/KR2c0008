小餘之下增損各一以之上推往古下驗方來無不吻合乃積年日法演積分換之説皆所不用其所為厯測驗既精設法詳具今且九十年無分毫差者舊儀悉多蔽礙且距齒有度刻而無細分以管望星漸外則所見漸展尤難取的守敬所為儀但用天常赤道四遊三環三距設四遊於赤道之上而附直距於四遊之外與雙環兩間同結環距端測日月星則以兩線相望取其正中所當之刻之度之分之秒至為切密八尺之表夏至景長尺有五寸千里為差一寸其説見於周官周髀唐一行雖嘗疑之而未之有改守敬乃為表比古制加五倍上施橫梁每日中以符竅夾測橫梁之景折取中數視舊法但取表端之景者加審矣佛教之崇世祖至元十九年帝師額琳沁死達爾瑪巴拉實哩嗣初土番人帕克斯巴者相傳自其祖多爾濟以其法佐國主霸西域十餘世帕克斯巴生七嵗誦經數十萬言能約通其大義國人號之聖童年十五謁帝于潛邸與語大悅日見親幸中統元年帝即位尊為國師授玉印命製蒙古新字字成上之其字僅千餘其母凡四十有一其相關紐而成字者則有韻關之法其以二合三合四合而成字者則有語韻之法而大要則以諧聲為宗至元六年詔頒行天下凡璽書頒降並用蒙古新字各以其國字副之遂升號帕克斯巴曰大寶法王十一年請告西還乃以其弟額琳沁嗣焉十六年帕克斯巴死詔贈皇天之下一人之上宣文輔治大聖至德普覺真智佑國如意大寶法王西天佛子大元帝師自額琳沁嗣凡六嵗至是死復以達爾瑪巴拉實哩嗣立自是每帝師一人死必自西域取一人為嗣終元世無改焉文宗天厯二年帝師輩年札克策喇實至上命朝廷一品以下咸郊迎大臣俯伏進觴帝師不為動惟國子祭酒富珠哩翀舉觴立進曰帝師釋迦之徒天下僧人師也豫孔子之徒天下儒人師也請各不為禮帝師笑而而起舉觴卒飲衆為之栗然按元自太祖起朔方時已崇尚釋教及得西域世祖以其地廣且險逺俗獷好鬭思有以柔服其人乃郡縣土番之地設官分職盡領之於帝師乃立宣政院其為使位居第二者必以僧為之帥臣以下亦僧俗並用軍民盡屬統理於是帝師之命與詔勑並行西土百年之間朝廷所以敬禮而尊信之者無所不用其至雖帝后妃主皆因受戒而為之膜拜正衙朝會百官班列而帝師亦或専席於坐隅且每帝即位之始降詔褒護必勑章佩監絡珠為字以賜蓋其重之如此其未至而迎之則中書大臣馳驛纍百騎以往所過供億送迎比至京師則勑大府假法駕半仗以為前導詔省臺院官以及百司庶府並服銀鼠濟遜用每嵗二月八日迎佛威儀往迓且命禮部尚書郎中専督迎接及其卒而歸葬舍利又命百官出郭祭飢大德九年専遣平章政事特穆爾乘傳護送賻金五百兩銀千兩幣帛萬匹鈔三千錠皇慶二年加至賻金五千兩銀一萬五千兩錦綺雜綵共一萬七千匹雖其昆弟子姓之往來有司亦供億無乏泰定間以帝師弟恭噶伊實戩將至詔中書持羊酒郊勞而其兄索諾木藏布遂尚公主封白蘭王賜金印給圓符其弟子之號司徒司空國公佩金玉印章者前後相望為其徒者怙勢恣睢日新月盛氣𦦨熏灼延于四方為害不可勝言有嘉木揚喇勒智者世祖用為江南釋教總統發掘故宋趙氏諸陵之在錢塘紹興者及其大臣塜墓凡一百十所戕殺平民四人受人獻美女寶物無算且攘奪盜取財物計金一千七百兩銀六千八百兩玉帶九玉器大小百一十有一雜寶貝百五十有二大珠五十兩鈔一十一萬六千二百錠田二萬三千畝私庇平民不輸公賦者二萬三千戶他所藏匿未露者不論也又至大元年上都開元寺西僧強市民薪民訴諸留守李璧璧方詢問其由僧已率其黨持白挺突入公府隔案引璧髮捽諸地捶朴交下拽之以歸閉諸空室久乃得脫奔訴于朝遇赦以免二年復有僧龔柯等十八人與諸王哈喇巴爾妃呼圖克齊德濟爭道挺妃墮車歐之且有犯上等語事聞詔釋不問而宣政院臣方奏取旨凡民歐西僧者截其手詈之者斷其舌時仁宗居東宫聞之亟奏寢其令泰定二年西臺御史李昌言嘗經平涼府靜會定西等州見西番僧佩金字圖符絡繹道途馳騎纍百傳舍至不能容則假館民舍因迫逐男子姦汚女婦奉元一路自正月至七月往返者百八十五次用馬至八百四十餘匹較之諸王行省之使十多六七驛戶無所控訴臺憲莫得誰何且國家之製圓符本為邊防警報之虞僧人何事而輒佩之乞更正僧人給驛法且令臺憲得以糾察不報必嚕匝納實哩之誅也有司籍之得其人畜土田金銀貨貝錢幣邸舍書畫器玩以及婦人七寶裝具價直巨萬萬云若嵗時祝釐禱祠之常號稱好事者其目尤不一有曰辰類阿索勒華言慶讚也有曰斯滿拉華言藥師壇也有曰綽克絅華言護城也有曰多爾沁華言大施食也有曰多爾濟埓克多爾華言美妙金剛回遮施食也有曰齊爾多克巴華言回遮也有曰隆科爾華言風輪也有曰贊多爾華言作施食也有曰楚多爾華言出水濟六道也有曰當喇克多爾華言回遮施食也有曰登多爾華言常川施食也有曰坐靜有曰嚕綽華言師子吼道場也又有曰雅滿達噶華言黑獄帝主也有曰吹思絅多爾瑪華言護江神施食也有曰齊特古朗絅華言自受主戒也又有曰辰類坐靜有曰尼古察坐靜華言袐密坐靜也有曰札木揚華言文殊菩薩也有曰衮布多爾華言至尊大黑神回遮施食也有曰赫巴匝爾華言大喜樂也有曰璸匝雅華言無量夀也有曰都克噶爾華言白傘蓋呪也有曰班匝喇克察華言五護陀羅尼經也有曰阿斯達薩達實哩華言八十頌般若經也有曰薩斯納總華言大理天神呪也有曰科爾羅普爾普總華言大輪金剛呪也有曰策巴克默特總華言無量夀經也有曰斯羅克巴華言最勝王經也有曰薩思納總華言護神呪也有曰納木卓木總華言懷相金剛也有曰卜嚕卜巴華言呪法也又有作攃攃者以泥作小浮屠也又有作多爾康者其作多爾康或一所二所以至七所作攃攃者或十萬二十萬以至三十萬又嘗造浮屠二百一十有六實以七寶珠玉半置海畔半置水中以鎮海災延祐四年宣徽使會每嵗內廷佛事所供其費以斤數者用麵四十三萬九千五百油七萬九千酥二萬一千八百七十蜜二萬七千三百自至元三十年間醮祠佛事之日僅百有二大德七年再立功德司遂增至五百有餘僧徒貪利無已交結近侍欺昧奏請布施莽齋所需非一嵗費千萬較之大德不知幾倍又每嵗必因好事奏釋輕重囚徒以為福利雖大臣如阿里閫帥如必實哷勒莫不假是以逭其誅宣政院參議李良弼受賕鬻官直以帝師之言縱之其餘殺人之盜作姦之徒寅緣幸免者多至或取空名宣勑以為布施而任其人可謂濫矣凡此皆有關乎一代之治體者故今備著焉若夫天下寺院之領于內外宣政院曰禪曰教曰律則固各守其業惟所謂白雲宗白蓮宗者亦或頗通姦利云武仁授受之際成宗大德三年十二月命懷寧王哈尚出鎮漠北哈尚帝兄達爾瑪巴拉之長子母曰鴻吉哩氏同母弟曰阿裕爾巴里巴特喇九年六月立子德夀為皇太子十月帝不豫皇后秉政詔出阿裕爾巴里巴特喇與其母鴻吉哩氏出居懷州十二月太子德夀卒十年十二月阿裕爾巴里巴特喇至懷州所過郡縣供帳華侈悉令撤去嚴飭扈從毋擾於民民皆感悅十一年正月丙辰朔帝大漸免朝賀癸酉崩于玉德殿皇后布爾罕以已嘗謀出阿裕爾巴里巴特喇及其母居懷州至是恐其兄哈尚立必報前怨乃命召安西王入京師欲立之左丞相阿固台平章賽音迪延齊瑪克新巴延及諸王穆爾特穆爾陰左右之謀斷哈尚歸路奉皇后垂簾聽政立安西王輔之於是阿固台以祔廟及攝位事集廷臣議太常卿田忠良博士張升曰制祔廟必書嗣皇帝名今將何書御史中丞何瑋亦執不可阿固台變色曰制自天降耶公等不畏死敢沮大事瑋曰死畏不義耳茍死於義何畏議遂寢時右丞相哈喇遜收百司符印封府庫稱疾守宿掖門內旨日數至皆不聽衆欲害之未敢發懷寧王適遣喀喇托克托計事京師哈喇哈孫令亟還報復遣使南迎阿裕爾巴里巴特喇于懷州使至阿裕巴爾巴里巴特喇疑未行其傅李孟曰支子不嗣世祖之典訓也今宫車晏駕大太子逺在萬里殿下當急還宫庭以安人心阿裕爾巴里巴特喇乃奉其母行先遣孟趨哈喇哈遜覘之適后使問疾哈喇哈遜所孟入長揖引其手診之衆謂孟醫也竟不疑既而知安西之變有日還報曰事急矣不可不早圖之阿裕爾巴里巴特喇曰當以卜決之孟召卜者謂曰大事待爾而決第云其吉及入筮果吉孟曰筮不違人是謂大同阿裕爾巴里巴特喇喜振袖而起衆翼之登騎諸司皆步從至漳河值大風雪田叟有以盂粥進者近侍却不受阿裕爾巴里巴特喇曰漢光武嘗為寇兵所迫食豆粥大丈夫不備嘗艱難罔知稼穡以致驕惰命取食之賜叟綾一匹慰遣之二月辛亥阿裕爾巴里巴特喇至大都與母鴻吉哩氏入內哭盡哀復出舊邸安西之黨見阿裕爾巴里巴特喇既至遂謀以三月三日偽賀其生辰因以舉事哈喇遜聞之夜遣人啓阿裕爾巴里巴特喇曰懷寧王逺不能猝至恐變生不測當先事而發阿裕爾巴里巴特喇復遣都萬户囊嘉特詣諸王圖喇定計囊嘉特力贊之乃先二日三月丙寅率衛士入內稱懷寧王遣使召安西計事至即并諸王穆爾特穆爾執之鞫問詞服械送上都收阿固台巴圖瑪克新賽音迪延齊巴延等誅之諸王庫庫楚雅克呼都克進曰今罪人斯得太子實世祖之孫宜早正大位阿裕爾巴里巴特喇曰王何為出此言也彼姦人潛結宫闈亂我家法故誅之豈欲作威福以覬望神器耶懷寧王吾兄也宜正大位已遣使奉璽北迎之矣遂自監國與哈喇哈遜日夜居禁中以備變俾李孟參知政事孟損益庶務裁抑僥幸羣小多不樂既而曰執政大臣當自天子親用今鑾輿在道孟未見顔色誠不敢冒大任固辭弗許遂逃去不知所之五月乙丑懷寧王哈尚至大都初哈尚聞帝崩自阿勒坦山至和琳諸王勳戚合詞勸進王曰吾母及弟在大都俟宗戚畢會議之阿裕爾巴里巴特喇既平內難其母鴻吉哩妃惑於日者言欲哈尚讓位於阿裕爾巴里巴特喇海桑聞之語喀喇托克托曰我捍邊陲十年又胤次居長王命之言茫昧難信設我即位後所行上合天心下副民望則雖一日之短亦足埀名萬年何可以陰陽家言而乖祖宗之托哉此殆用事之臣檀權専殺恐他日或治其罪故為是姦謀耳汝為我往察事機疾歸報我乃親帥大軍由西道諸王鄂爾和由中道成格勒由東道各以徑卒一萬從而徘徊不進托克托馳至大都入道哈尚言妃愕然曰修短之説雖出術家為太子周思逺慮乃我深愛今貪憝已除宗王大臣議已定太子不速來何為汝所致言殆有讒間汝歸為我彌縫之而趣其來先是妃以哈尚不至復遣阿實克布哈迎之備道安西謀變始末及大弟監國與諸王羣臣推戴之意至是托克托繼往行至中道哈尚輿中望見之趣使同載托克托具述妃言懷寧王大感悟至是至上都即以阿實克布哈為平章政事遣還報兩宫阿裕爾巴里巴特喇即侍其母來會於上都廢皇后巴約特氏居東安殺之誅安西王阿南達及諸王穆爾特穆爾甲申懷寧王即位詔曰昔我太祖皇帝以武功定天下世祖皇帝以文德洽海內列聖相承丕衍無疆之祚朕自先朝肅將天威撫軍朔方殆將十年親御甲胄力戰却敵者屢矣方諸蕃內附邊事以寧遽聞宫車晏駕乃有宗室諸王貴戚元勳相與定策於和林咸以朕為世祖曽孫之嫡裕宗正𣲖之傳以功以賢宜膺大寶朕謙讓未遑至於再三還至上都宗親大臣復請於朕間者姦臣乘隙謀為不軌賴祖宗之靈母弟阿裕爾巴里巴特喇稟命太后恭行天罰內難既平神器不可久虛宗祧不可乏嗣合詞勸進誠意益堅朕勉徇輿情於五月二十八日即皇帝位任大守重若涉淵氷屬嗣服之云初其與民更始可大赦天下追尊考曰順宗皇帝尊母鴻吉哩氏為皇太后加哈喇哈遜為逹爾罕並太傅阿實克布哈太尉以塔海罕為丞相成格勒竒塔特布濟克穆爾布哈並平章事六月立弟阿裕爾巴里巴特喇為皇太子受金寶七月封圖喇為越王左遷右丞相哈喇哈遜為和琳左丞相初皇太子入定內難阿固台有勇力人莫能近圖喇實手縛之以功封越王哈喇哈遜力爭以為舊制非親王不得加一字之封圖喇疏屬豈可以一日之功廢萬世之制帝不聽圖喇因譛于帝曰安西謀干大統時丞相亦嘗署其牘由是罷為和琳行省左丞相武宗至大二年八月置太子右衛率府命右丞相托克托御史大夫布琳尼敦領府事取河南蒙古軍萬人𨽻之詹事王約曰左衛率府舊制有之今置右府何為諸公深思之不可以纍儲宫也太子又命取安西兵器給宿衛士約謂詹事旺扎勒曰詹事移文千里取兵器人必驚疑主上聞之奈何旺札勒愧曰實慮不及此家令薛居言陜西分地五事命往理之約不為署行語之曰太子潛龍也當勿用之時為飛龍之事可乎遂止太子喜諭羣下曰事未經王彥博者勿啓一日約方啓事二宧官侍側太子問曰自古宧官壞人家國有諸對曰宧官善惡皆有之但恐處置失宜耳太子深然其言三年正月徴李孟入見以為平章政事同知樞密院事初孟既逃去有譖于帝者曰內難初定時孟嘗勸皇太子自取帝弗之信一日太子侍宴忽戚然改容帝曰吾弟何不樂太子從容起謝曰賴天地祖宗神靈神器有歸然成今日母子兄弟之歡者李道復之功居多適思之不自知其變於色也帝即命搜訪之得於許昌陘山召見謂宰臣曰此皇祖妣命為朕賔師者宜速任之至是乃授中書平章事集賢大學士同知樞密院事四年正月癸酉朔帝不豫免朝賀庚辰帝崩于玉德殿三月庚寅皇太子即位詔曰惟昔先帝事皇太后撫朕眇躬孝友天至由朕得托順考遺體重以母弟之嫡加有削平內難之功於其踐祚曽未踰月授以皇太子寶領中書令樞密院百揆機務聽所總裁于今五年先帝奄棄天下勳戚元老咸謂大寶之承既有成命非與前聖賔天而始徵集宗親議所宜立者比當稽周漢晉唐故事正位宸極朕以國恤方新誠有未忍是用經時今則上奉皇太后勉進之命下徇諸王勸戴之勤三月十八日於大都大明殿即皇帝位可大赦天下初帝在東宫宦者李邦寧乘間言於武宗曰陛下富於春秋皇子漸長父作子述古之道也未聞有子而立弟者武宗不悅曰朕志已定汝自往東宫言之邦寧慙懼而退及帝即位左右咸請誅之帝曰帝王厯數自有天命其言何足介懷加邦寧開府儀同三司特們德爾之姦武宗至大三年雲南行省左丞相特們德爾擅離職赴闕尚書省奏奉旨詰問尋以皇太后旨赦之仁宗皇慶元年三月中書右丞相特們德爾以病免先是武宗崩帝在東宫以丞相三寶努等變亂舊章誅之用旺札勒及李孟為中書平章政事鋭欲更張政事而皇太后在興聖宫已有旨召特們德爾為中書右丞相踰月帝即位因遂相之及幸上都命特們德爾居守大都至是以病去職延祐元年九月復以特們德爾為中書右丞相時右丞相哈克繖自言非世勳族姓不可獨當國因舉特們德爾自代遂拜開府儀同三司録軍國重事居數月復進右丞相以哈克繖為左丞相特們德爾奏言往時富民往諸蕃商販率獲厚利蕃貨日重請遣官置綱以征其貸私往者沒官又請預買山東河間運使來嵗鹽引及各冶鐵貨以足用又江南田糧雖嘗經理多未核實可始自江浙以及江東西宜先事嚴限格令田主自實仍禁勢豪毋得沮撓帝皆從之尋遣使者分行各省括田增稅苛急煩擾江右為甚明年􅀈民蔡五九作亂南方騷動詔罷其事五九尋伏誅三年三月中書平章政事張圭罷時帝如上都皇太后以張圭嘗劾特們德爾不可使為太師召圭切責杖之圭創甚輿歸時圭子景元宿衛左右以父病篤辭還帝驚問故殊不懌遣使賜圭酒進拜大司徒遂謝病歸四年六月特們德爾罷以哈克繖為右丞相特們德爾之再入相恃勢貪虐凶穢滋甚中外切齒羣臣不知所為平章政事蕭拜珠稍牽制之中丞楊多爾濟慨然以糾正其罪為己任上都富民張弼殺人繫獄特們德爾使家奴脅留守賀勝使出之勝不可多爾濟亷得特們德爾受弼賂巨萬萬乃與拜珠及勝奏之而內外御史凡四十餘人共劾其桀黠姦貪欺上罔下占據晉王田及衛兵牧地竊食郊廟供祀馬受諸王人等珍玉之賄動以萬計誤國之罪又在阿哈瑪特僧格上四方憤嫉咸願車裂斬首以快人心奏上帝震怒特們德爾懼逃匿太后宫多爾濟持之益急太后召多爾濟責之帝不忍傷太后意但罷其相位而遷多爾濟為集賢學士六年四月特們德爾復起為太子太師中丞趙世延論其不法數十事併內外臺劾其不可輔導東宫者又四十餘人帝以太后故皆不聽七年正月帝崩太后以特們德爾為中書右丞相二月殺平章蕭拜珠御史中丞楊多爾濟特們德爾既相以二人嘗攻其姦惡必欲報之遂以太后旨召二人至徽政院與徽政使實勒們御史大夫圖圖爾布哈雜問之罪以違太后旨多爾濟曰中丞之職恨不及斬汝以謝天下果違太后旨爾豈有今日耶特們德爾又引同時御史二人證其罪多爾濟唾之曰汝等備員風憲為是狗彘事耶坐者皆慙俯首特們德爾即起入奏未幾傳旨執二人載諸國門外殺之並籍其家是日風沙晦冥都人洶洶道路相視以目後欲奪多爾濟妻劉氏與人劉剪髮毁容自誓乃免時特們德爾日思報復讎怨誅戮不已左丞張思明謂曰山陵甫畢新君未立丞相恣行殺戮人皆謂陰有不臣之心萬一諸王駙馬疑而不至奈何不可不熟慮也衆皆危之特們德爾稍悟曰非左丞言幾誤吾事三月太子即位特們德爾進開府儀同三司上柱國太師左遷前中書平章李孟為集賢侍講學士特們德爾以孟初不附已欲因其不就陰中之孟拜命欣然帝謂特們德爾子巴爾濟蘇曰爾輩謂孟不肯為是官今如何由是無敢言五月殺上都留守賀巴延特們德爾怨巴延嘗發張弼之獄乃奏其便服迎詔為不敬殺之籍其家八月下四川平章政事趙世延獄初世延既解中丞出為四川平章特們德爾猶以世延劾其姦誣怨之不已屬其黨誘世延從弟索約爾哈呼誣告之逮世延置對既遇赦猶煆鍊成獄請置極典并究省臺諸臣帝不允謂近侍曰頃特們德爾必欲置趙世延於死地朕素聞其忠良故每奏不納左右咸稱萬嵗英宗至治二年八月特們德爾死特們德爾自復相以來恃其權寵乘間肆毒睚眥之私無有不報帝覺其所譖毁者皆先帝舊人滋不悅其所為乃任左丞相拜珠委以心腹由是特們德爾漸見疏外因稱疾不出及聞拜珠奉旨往立其祖安圖碑於范陽將復涖省事入朝至內帝聞其來遣人止之遂怏怏而死三年五月監察御史蓋繼元宋翼言特們德爾姦貪負國生逃顯戮死有餘辜乃命毁所立碑併追奪官爵籍沒其家晉邸之立英宗至治三年八月御史大夫達實弒帝於南坡及右丞相拜珠初特們德爾既奪爵籍産達實等以姦黨不自安帝在上都夜寐不寧命作佛事拜珠以國用不足諫止之既而懼誅者復隂誘羣僧言國當有厄非作佛事大赦無以禳之拜珠叱曰爾輩不過圖得金帛而已又欲庇而罪耶姦黨聞之益懼乃生異謀至是帝自上都南還駐蹕南坡是夕達實與知樞密院事額森鐵穆爾諸王諳達布哈等謀逆以達實所領阿蘇衛兵為外應達實先與前平章政事齊勤特穆爾殺右丞相拜珠而達實直犯禁幄手弒帝於卧所時年二十一帝性剛明嘗以地震避殿徹樂減膳近臣有稱觴賀者叱曰朕方修德不暇汝為大臣不能匡輔反為諂耶拜珠進曰咎在臣等宜求賢自代帝曰無多遜朕之過也嘗謂宰執曰中書選人署事旬日御史臺即改除之臺除者中書亦然今山林儒逸良多卿等不能盡心求訪惟以親戚故舊更相引用耶其明斷多類此然以果於刑戮姦黨畏誅遂搆大變云諸王諳達布哈及額森特穆爾奉璽綬迎晉王伊蘇特穆爾於北邊伊蘇特穆爾者裕宗之孫晉王噶瑪拉長子也襲封晉王仍鎮北邊初王府內史都爾蘇得幸於王嘗偵伺朝廷事機以其子哈克繖事丞相拜珠得入宿衛久之哈克􅓫知達實欲傾害拜珠遂脫歸是年三月宣徽使塔坦來王邸為都爾蘇言主上將不利於晉王由此二人深相要結八月二日達實密遣烏魯斯來告曰我與哈克􅓫額森特穆爾實達爾謀已定事成推立王為皇帝又以告都爾蘇曰汝與瑪蘇庫知之勿令舒瑪爾節得聞也於是王命烏魯斯遣布琳默色赴上都以密謀告變未至帝遇弒於是諸王諳達布哈及額森特穆爾奉皇帝璽綬來迎九月晉王即皇帝位於龍居河大赦天下以額森特穆爾為右丞相都爾蘇為中書平章政事達實知樞密院事時諸王瑪努勒言於帝曰不誅元凶則陛下善名不著天下後世何由而知陛下心帝深然之十月遣使至大都以即位告天地宗廟社稷誅逆賊額森特穆爾旺扎勒圖們等於行在所以舒瑪爾節為中書右丞相寧珠為御史大夫遣入京師收達實及其黨齊勤特穆爾等悉誅之戮其子孫籍沒家産為特們德爾子索諾木議逺流張圭曰索諾木從逆賊親斫丞相拜珠臂乃欲活之耶十一月帝至大都十二月御史臺經歷多爾濟巴勒御史徹爾達罕烏德美額森呼圖克並坐黨達實免官於是監察御史趙成慶等言特們德爾在先朝包藏禍心離間親藩誅戮大臣使先帝孤立卒罹大禍其子索諾木親與逆謀久逃天憲乞正其罪以快元元之心伊喇圖圖爾哈布薩敦皆達實之黨不宜寬宥遂並伏誅流諸王伊埒特穆爾于雲南諳達布哈于海南吹布哈于尼嚕罕博囉烏魯斯布哈於海島並坐與達實逆謀時舒瑪爾節等言南坡之變諸王瑪努勒逃匿潛邸願效死力且請誅戮元凶上契宸𠂻嘗蒙奬諭今臣等議宗戚之中能自拔逆黨盡忠朝廷者惟有瑪努勒請加封賞以示激勸遂以泰寧縣三千户封瑪努勒為泰寧王議討逆功以都爾蘇為左丞相寧珠索多並加光祿大夫賜舒瑪爾節等金有差詔改明年元為泰定三帝之立明宗文宗順帝仁宗延祐二年十二月立武宗子和實拉為周王出鎮雲南初武宗既立帝為太子後丞相三寶努復勸立和實拉召喀喇托克托言之托克托曰太弟定宗社居東宫已久兄弟權侄世世相承孰敢紊其序乎三寶努曰今日兄已授弟異日能保叔授其侄乎托克托曰在我不可渝彼失其信天實鑒之至是議立太子特們德爾欲固位取寵乃請立皇子碩迪巴拉又與太后幸臣實勒們譛和實拉於兩宫遂封為周王遣出鎮雲南三年三月置周王常侍府官屬以圖古勒鄂爾多尚嘉努博囉嘉琿等為之十一月周王和實拉次延安其臣圖古勒尚嘉努及武宗舊臣喇實沙卜丹哈巴爾圖等皆來會嘉琿謀曰天下者我武宗之天下也王之出鎮本非上意由左右讒搆致然請以其故白行省俾聞之朝廷庶可杜塞離間不然事變叵測遂與數騎馳去先是阿斯罕為太師特們德爾奪其位出之為陜西行省丞相及嘉琿等至即與平章政事塔齊爾行臺御史大夫圖嚕卜中丞托歡悉發關中兵分道自河中府入已而塔齊爾托歡襲殺阿斯罕嘉琿于河中和實拉遂西行至北邊金山西北請王察克台等聞和實拉至咸率衆來附和實拉至其部與定約束每歲冬居扎延夏居阿嚕噶克察山春則命從者耕於野泥十餘年間邊境寧謐英宗至治元年五月遷武宗第二子圖卜特穆爾於瓊州時右丞相特們德爾懷私固寵搆釁骨肉諸王大臣莫不自危中政使約爾珠告托歡徹爾等交通親王於是徙圖卜特穆爾居海南因禁日者毋交通諸王駙馬掌隂陽五科者毋泄占候泰定帝泰定元年正月召圖卜特穆爾於瓊州十月封圖卜特穆爾為懷王居建康致和元年是年九月文宗即位改元天厯三月徙懷王圖卜特穆爾於江陵七月帝崩於上都年三十六葬起輦谷稱為泰定帝王禕曰武宗以兄弟相及約繼世子孫迭居大位而仁宗惑於憸言不守宿諾傳位英宗仍使武宗二子明宗文宗出居於外及英宗遇弒而明宗在北文宗在南晉邸乘間入繼大統或謂晉邸非所宜立雖然晉王於世祖孫也於次為長雖守藩服嘗有盟書今而國統之弗繼則求所當立者舍晉王之系將誰屬耶然則謂晉邸非所宜立者亦過也舊傳英宗之弒晉邸與聞之故其殁不舉請諡升祔之典明其為賊也然考之實録皆不得其實傳聞之謬烏可信哉初帝由晉邸立而和實拉兄弟以武宗子播越南北人心念之僉樞密院事雅克特穆爾自以身受武宗寵拔之恩謀欲立其二子乘帝有疾與諸王滿都等隂圖其事至是帝崩皇后皇太子遣使詣大都命平章政事額卜德哷勒收掌百司印章及諭安百姓八月甲午百官集興聖宫雅克特穆爾率阿拉克特穆爾博囉齊等十七人兵皆露刃號於衆曰武宗皇帝有子二人天下正統當歸之敢有不順者死遂手縳平章額卜德哷勒巴延徹爾分命勇士執中書左丞托多參政王士熙參議托克托吳秉道侍御史特默格丘世傑太子詹事丞王桓等皆下獄雅克特穆爾與西安王喇特納實哩共守內庭推前湖廣行省左丞相拜布哈為中書左丞相詹事達實哈雅為中書平章蘇蘇為左丞王布琳濟達為樞密副使與中書右丞趙世延等分典庶務調兵守禦關隘徵諸衛兵屯京師下郡縣造兵器出府庫犒軍士雅克特穆爾直宿禁中達旦不寐一夕再徙人莫知其處是時周王和實拉逺在沙漠猝未能至慮生他變乃遣前河南參政明埒克棟阿迎懷王圖卜特穆爾於江陵密以意諭河南行省平章巴延令簡兵以備扈從且令達實特穆爾矯為南使言懷王已次近郊使民無驚疑己亥明埒克棟阿至汴梁與巴延合謀執行省臣皆下之獄癸卯巴延殺平章竒嚕及右丞拜特穆爾是日明埒棟阿等至江陵甲辰懷王發江陵遣使召鎮南威順髙昌諸王來會執湖廣行省左丞瑪哈謀送京師以博索代之河南行省出府庫金銀鈔錠分給官吏將士又命有司造乘輿供張儀仗等物平章巴延勒兵以俟參政圖卜台獨曰今蒙古軍與宿衛之士俱在上都而令特默齊軍守諸隘吾恐此事之不可成也是夜圖卜台將手刃殺巴延巴延覺遂拔劔殺圖卜台而奪其所部軍器馬匹丁未雅克特穆爾遣其弟薩敦守居庸關子騰吉斯屯古北口戊申雅克特穆爾又令奈曼台矯為使者北來言周王亦整兵南行聞者皆悅懷王命巴延為河南行省左丞相遣博囉等將兵守潼關己酉丞相都爾蘇殺諸王滿都於上都滿都時與阿穆爾台宗正札爾固齊庫庫楚平章瑪魯集賢學士烏魯斯布哈太常禮儀院使哈克齊等十八人同附雅克特穆爾事覺被殺庚戌懷王至汴梁巴延等扈從北行以前翰林學士鄂博哈雅為河南行省平章事辛亥以雅克特穆爾知樞密院事壬子托克托穆爾帥其軍自上都來歸即命守古北口癸丑上都諸王以兵分道攻大都乙卯托克托穆爾及上都諸王實喇平章奈曼台詹事奇徹戰於宜興斬奇徹於陳禽奈曼台送京師戮之實喇敗走丁巳懷王入京師居大內以明埒克棟阿庫庫台蘇蘇並為平章政事曹立為右丞巴延為御史大夫趙世延為御史中丞髙昌王特穆爾布哈知樞密院事己未上都梁王旺沁右丞相達實特穆爾太尉布哈平章政事瑪魯御史大夫寧珠等兵次榆林隆鎮衛指揮海哈謀附上都坐棄市是月道拉實立泰定帝子喇實晉巴為帝於上都年九歲改元天順九月庚申朔雅克特穆爾督師居庸關遣薩敦以兵襲上都兵於榆林擊敗之追至懷來而還隆鎮衛指揮烏德美以兵襲上都諸王穆爾特穆爾特默齊於陀羅臺執之歸於京師壬戌懷王遣使祭五嶽四瀆命蘇蘇宣諭中外曰昔在世祖以及列聖臨御咸命中書省綱維百司總裁庶政凡錢榖銓選刑罰興造罔不司之自今除樞密院御史臺其餘諸司及左右近侍敢有隔越中書奏請者以違制論監察御史其糾言之賜上都將士來歸者鈔各有差召雅克特穆爾赴闕上都諸王額森特穆爾等自遼東以兵入遷民鎮丁卯雅克特穆爾率請王大臣請懷王早正大位以安天下王以兄周王和實拉在漠北欲虛位俟之雅克特穆爾曰人心向背之機間不容髮一或失之噬臍無及王曰必不得已當明吾志播告天下己巳上都諸王呼喇台等引兵入崞州遣薩敦拒遼東兵於薊州東流沙河敖拉守居庸關以伊蘇岱爾知行樞密院事將兵行視太行諸關西擊河中潼關軍辛未殺額卜德哷勒流托多王士熙巴延徹爾托歡等於逺州並籍其家壬申懷王即皇帝位於大都詔曰洪惟我太祖皇帝混一海宇爰立定制以一統緒宗親各受分地勿敢妄生覬覦此不易之成規萬世所共守者也世祖之後成宗武宗仁宗英宗以公天下之心以次相傳宗王貴戚咸遵祖訓至於晉邸具有盟書願守藩服而與賊臣達實額森特穆爾等潛通隂謀冒干寶位使英宗不幸罹於大故朕兄弟播越南北備歷艱險臨御之事豈獲與聞朕以叔父之故順承惟謹於今六年災異迭見權臣都爾蘇額卜德哷勒等專權自用疏逺勳舊廢棄忠良變亂祖宗法度空府庫以私其黨類大行上賓利於立幼顯操國柄用成其姦宗王大臣以宗社之重統緒之正協謀推戴屬於眇躬朕以菲德宜俟大兄固讓再三百僚耆老以為神器不可以久虛天下不可以無主周王遼隔朔漠民庶遑遑已及三月誠懇迫切朕姑從其請謹俟大兄之至以遂朕固讓之心已於致和元年九月十三日即皇帝位於大明殿其以致和元年為天厯元年可大赦天下於戲朕豈有意於天下哉重念祖宗開創之艱恐隳大業是以勉徇輿情尚賴爾中外文武臣僚協心相與輯寧億兆以成治功咨爾多方體豫至意癸酉封雅克特穆爾為太平王乙亥上都旺沁兵襲破居庸關將士皆潰雅克特穆爾還軍次榆河帝出齊化門視師丁丑雅克特穆爾來見曰乘輿一出民心必驚軍旅之事臣請以身任之帝即日還宫戊寅雅克特穆爾與旺沁前軍戰於榆河敗之追奔紅橋北其樞密副使阿拉克特穆爾指揮使呼圖克特穆爾復以兵會旺沁來戰又敗之辛巳雅克特穆爾與上都軍大戰於白浮之野敗之明日大霧旺沁等遁崑山收集散亡復來戰雅克特穆爾列陳白浮西敵不敢犯至夜薩敦托克托穆爾前後夾攻敗走之追及於昌平北斬首數千級降者萬餘人帝遣使諭雅克特穆爾曰丞相每臨陳躬冒矢石脫有不虞奈何自今第以大將旗鼓督戰可也雅克特穆爾對曰凡戰臣必以身先之敢後者論以軍法若委之諸將萬一失利悔將何及乙酉上都兵入古北口將士皆潰其知樞密院事凖台以兵掠石槽雅克特穆爾先遣薩敦倍道趣石槽掩其不備擊之自將大軍繼其後轉戰四十餘里至牛頭山擒駙馬博囉特穆爾政事蒙古達實特穆爾等殺之將校降者萬人餘軍奔竄夜遣薩敦出古北口逐之托克托穆爾與遼東兵戰薊州南殺獲無算丁亥遼東軍抵京城雅克特穆爾引兵拒之令京城召募壯丁乘城拒守戊子上都諸王呼喇台等兵入紫荆關將士皆潰陜西行臺御史大夫額森特穆爾兵從大慶關渡河擒河中府官殺之萬戶徹爾特穆爾軍潰而遁河東官吏皆棄城走十月己丑雅克特穆爾引兵至通州擊遼東軍敗之遣托克托穆爾將兵四千西援紫荆關癸巳上都諸王呼喇台遊兵進逼南城雅克特穆爾及湯翟王太平國王多羅台等戰於檀子山之棗林殺太平死者蔽野餘皆宵遁乙未雅克特穆爾等帥軍循北山而西趣良鄉時諸將與呼喇台阿拉克特穆爾等戰於盧溝橋聲言雅克特穆爾大軍至敵兵皆遁丙申中書省臣言上都諸王大臣不思祖宗成憲惑於都爾蘇之言輒以兵犯京畿賴陛下神武旺沁遂致潰亡生擒諸王博囉特穆爾及諸用事臣蒙古達實等既已明正典刑宜傳首四方以示衆從之戊戌諸將追阿拉克特穆爾等至紫荆關獲之送京師皆棄市己亥特們德爾軍復入古北口雅克特穆爾引兵禦之大戰於檀州南敗之特們德爾走還遼東辛丑齊王伊埒特穆爾蒙古元帥布哈等以兵圍上都道拉實等奉皇帝璽出降梁王旺沁遁遼王托克托為齊王伊埓特穆爾所殺遂收上都諸王符印喇實晉巴不知所終丘濬曰泰定帝乃裕宗之嫡孫噶瑪拉之長子於屬為宗子非不當立也英宗為達實所弒諸王迎立之初不與其謀武宗二子次雖當立然既為英宗所據則非其有矣泰定初立之年即立喇實晉巴為太子至是五年名分已定圖卜特穆爾遣兵攻之以致於死他史不明言其所以致死之由然所以致之死地者圖卜特穆爾也律以春秋趙盾之法非弒而何丁未陜西兵至鞏昌縣黑石渡遂據虎牢復入武關庚戌帝御興聖殿諸王大臣奉上皇帝寶分遣使者檄行省內郡罷兵甲寅元帥伊遜代爾執湘寧王巴拉實哩送京師初巴拉實哩及趙王滿濟勒罕諸王呼喇台承上都之命各起所部兵南侵冀寧還次馬邑至是被執十一月辛酉額森鼐兵至武安額森特穆爾以軍降甲子陜西兵進逼汴梁聞朝廷傳檄罷兵乃解去甲戌遷泰定后翁吉喇特氏於安東州庚辰遣使奉迎周王和實拉於漠北癸未都爾蘇旺沁茂穆蘇寧珠薩勒迪默色額森特穆爾等俱棄市十二月甲寅復遣治書侍御史薩勒迪等迎周王時諸王皆勸周王南遷京師周王遂發北邊諸王察克台元帥圖烈納等咸帥師扈行舊臣博囉尚嘉努哈瑪爾圖皆從至金山嶺北命博囉如京師二年正月庚申遣前翰林學士承旨布達實哩北還周王行在所仍命太府太監實喇卜奉金帛以往乙丑復遣中書左丞伊埒特穆爾迎周王壬午周王遣博囉至京師乙酉薩勒迪等見周王於行幄勸進丙戌周王即皇帝位於和寧之北遣薩勒迪還京師命之曰朕弟曩嘗觀書史邇者得無廢乎聽政之暇宜親賢士大夫講論史籍以知古今治亂得失卿等至京師當以朕意諭之舊臣及兩宫之人聞北使至皆歡呼曰吾天子真自北來矣爭先迎謁所至成聚二月辛卯立妃鴻吉哩氏為皇后辛丑追尊周王母伊奇哩氏母唐古氏並為皇后辛亥帝勑羣臣曰薩勒迪還言大兄已即皇帝位凡二月二十一日以前除官者速與制勑後凡銓選其詣大兄行在以聞三月辛酉帝遣雅克特穆爾奉皇帝寶於行在所四月癸巳雅克特穆爾見於行在所行在嘉其功拜為太師復諭之曰凡京師百官朕弟所用者並仍舊其諭以朕意雅克特穆爾因奏陛下君臨萬方國家大事所繫者中書省臣樞密院御史臺而已宜擇人居之遂以武宗舊人哈瑪爾圖為中書平章政事拜特穆爾知樞密院事博囉為御史大夫甲午立行樞密院命昭武王知院事和斯賽音特穆爾瑪努勒同知院事是日宴諸王大臣於行殿因諭臺臣曰太祖有訓美色名馬人皆悅之然方寸一有係纍即能壞名敗德卿等居風紀之司亦嘗念及此乎世祖初立御史臺首命塔齊爾博克逹濟二人協司其政天下國家譬如一人之身中書則右手也樞密則左手也左右手有疾治之以良醫省院闕失不以御史臺治之可乎凡諸王百司違法越禮一聽舉劾風紀重則貪墨懼猶斧斤重則入木深其勢然也朕有闕失卿等亦宜以聞朕不爾責癸卯行在遣使立帝為皇太子己未皇太子遣翰林學士承旨阿拉克特穆爾覲于行在乙亥行在勑大都省臣鑄皇太子寶時求故太子寶不知所在乃命更鑄之丁丑皇太子發京師北迎行在六月丁亥行在次琨都楞鄂布爾遣近侍拜布哈至京師庚戌皇太子次於上都之六十店辛亥行在次哈喇哈納圖詔諭中書省臣凡國家錢榖銓選諸大政事先啓皇太子然後以聞八月乙酉行在次于翁果察圖丙戌皇太子入見是日行在宴皇太子及王大臣于行殿庚寅帝暴崩于行在皇太子入臨哭盡哀雅克特穆爾以行在皇后之命奉皇帝寶授于皇太子胡粹中曰聞之故老言雅克特穆爾奉上璽綬明宗從官有不為之禮者雅克特穆爾且怒且懼既而帝暴崩雅克特穆爾聞哭聲即奔入帳中取寶璽扶文宗上馬南馳本史乃言皇太子入哭盡哀雅克特穆爾以皇后命奉皇帝寶授於太子其説不合豈當時忌諱有不敢明言者歟癸巳皇太子至上都己亥皇太子復即位於上都大赦天下以巴延為左丞相竒徹台阿爾斯蘭哈雅趙世延並為平章政事達哩為右丞鄂允趙世安並參知政事達實特穆爾知樞密院特穆爾布哈特穆爾圗並御史大夫九月丁巳帝還大都十月丙申上大行皇帝尊諡廟號明宗至順元年三月封皇子喇特納逹喇為燕王四月皇后鴻吉哩氏殺明宗皇后班布爾實五月廢明宗子托歡特穆爾時帝將立其子喇特納逹喇為皇太子乃以托歡特穆爾乳母夫言明宗在日素謂太子非其子黜之江南驛召翰林學士阿拉克特穆爾奎文閣大學士和塔拉都哩默色書其事於托卜齊雅又召虞集使書詔播告中外十二月立燕王喇逹納逹喇為皇太子二年正月皇太子喇特納逹喇卒八月詔太子古嚕逹喇出居於雅克特穆爾家十一月詔養雅克特穆爾之子塔喇海為子三年八月帝崩於上都廟號文宗十月庚子鄜王伊埒哲伯即皇帝位鄜王明宗第二子也帝始崩時雅克特穆爾請皇后立皇子雅克特穆爾后不從命立鄜王時年甫七歲百司庶務咸啓皇后取進止十一月戊寅尊皇后為皇太后壬辰鄜王薨廟號寧宗皇太后遣右丞竒爾濟蘇迎托歡特穆爾于靜江初托歡特穆爾既廢徙高麗使居大青島後又徙靜江至是鄜王薨雅克特穆爾復請立雅克托果斯皇太后曰吾子尚幼托歡特穆爾在廣西今年十三矣且明宗長子於理當立乃遣竒爾濟蘇往迎之三年六月順帝元統元年三月雅克特穆爾死雅克特穆爾自秉權以來肆行無忌一宴或宰十三馬取泰定后為夫人前後尚宗室女四十人有交禮三日遽遣歸者後房充斥不能盡識一日宴趙世延宅男女列坐見座隅一婦甚麗意欲與俱歸顧左右曰此為誰對曰太師家人也自後荒淫日甚體羸溺血而死六月己巳托歡特穆爾即皇帝位於上都初帝自廣西迎至百官具鹵簿迎于良鄉雅克特穆爾既見並馬徐行具陳迎立之意帝畏之一無所答雅克特穆爾疑其意不可測故至京久不得立適太史亦言其立則天下亂用是議未能決遷延者數月至是雅克特穆爾死皇太后乃與大臣定議立之且約後當傳於雅克托果斯若武宗仁宗故事七月立雅克特穆爾女巴約特氏為皇后八月奎章閣侍書學士虞集謝病歸帝之將立也召諸老臣赴上都議集亦預焉中丞馬祖常使人告集曰御史有言矣蓋以文帝嘗命集書詔言帝非明宗子故祖常以此諷集使去集乃謝病歸集既去侍臣有以舊詔言者帝不懌曰此我家事豈由彼書生耶不問後至元元年六月左丞相騰吉斯伏誅遂殺皇后巴約特氏騰吉斯雅克特穆爾子也時右丞相巴延獨秉政騰吉斯忿曰天下本我家天下巴延何人而位吾上遂與其叔父句容郡王達蘭達哩潛蓄異心謀立諸王鴻和特穆爾帝數召達蘭達哩不至郯王蘇蘇勒圖發其謀騰吉斯伏兵東郊率勇士突入宫巴延及旺扎勒特穆爾等掩捕獲之并殺其弟塔喇海時塔喇海走匿皇后座下后蔽以衣左右曳出斬之血濺后衣巴延使人併執后后呼帝曰陛下救我帝曰汝兄弟為逆豈能相救乃遷后出宫巴延殺之於開平民舍鴻和特穆爾亦自殺詔曰曩者文宗皇帝以雅克特穆爾嘗有勞伐父子兄弟顯列朝廷而輒造事釁出朕逺方文皇尋悟其妄有旨傳次於朕雅克特穆爾貪利幼弱復立朕弟伊埒哲伯不幸崩殂今丞相巴延追奉遺詔迎朕於南既至大都雅克特穆爾猶懷兩端遷延數月天殞厥躬巴延等同辭翊戴乃正宸極後薩敦達哩騰吉斯等相襲用事交通宗王鴻和特穆爾圖危社稷阿齊雅齊亦嘗與謀賴巴延等以次掩捕明正其罪元凶搆難貽我皇太后震驚朕用兢愓永惟皇太后後其所生之子一以至公為心親挈大寶界余兄弟迹其定䇿兩朝功德隆盛近古罕比雖嘗奉上尊號揆之朕心猶為未盡已命大臣特議加禮巴延為武宗捍禦北邊翊戴文皇兹又克清大憝明勑國憲爰賜達爾罕之號至于子孫世世永賴可大赦天下八月尊皇太后為太皇太后六年六月詔廢文宗廟主遷太皇太后鴻吉哩氏于東安州安置放雅克托果斯于髙麗詔曰昔武帝升遐太后惑於憸慝俾皇考出封雲南英宗遇害我皇考以武宗之嫡逺居沙漠親王大臣同心翊戴於時以地近先迎文宗暫總機務繼知天理人倫所在假讓位之名以寶璽來上皇考推誠不疑即立為皇太子文宗當躬迓之際乃與其臣伊埒布哈額哩葉明埒克棟阿等謀為不軌使我皇考飲恨上賓歸而再御宸極又私圖傳子乃搆邪言嫁禍於布爾錫皇后謂朕非明宗之子遂俾出居遐陬內懷愧嫌則殺額哩葉以杜口上天不祐遂降殞罰叔嬸布達實哩怙其勢熖不立明考之冢嗣而立朕幼稚之弟伊埓哲伯奄復不年諸王大臣以賢以長扶朕踐祚賴天之靈權姦屏黜永惟鞠育罔極之恩忍忘不共戴天之義其命太常撤去圖卜特穆爾在廟之主布達實哩削去太皇太后之號徙東安州安置雅克托果斯放諸高麗當時賊臣伊埒布哈額哩葉已死其以明埒克棟阿等明正典刑時監察御史崔敬言文皇獲不軌之愆已撤廟祀叔母有階禍之罪亦削鴻名盡孝正名斯亦足矣惟念皇弟雅克托果斯年方在幼罹此播遷天理人情有所不忍方明皇上賓皇弟方在襁褓未有知識義當矜憫伏望陛下迎歸太后母子以盡骨肉之義不報未幾太后殂於東安州雅克托果斯遇害於中道元史紀事本末卷三

body:
  text: 元史紀事本末卷四明陳邦瞻撰托克托之貶哈瑪爾附順帝至元六年二月黜中書大丞相巴延為河南行省左丞相巴延既誅騰吉斯獨秉國鈞遂專權自恣變亂成憲虐害天下漸有異謀帝患之巴延欲以所養弟之子托克托宿衛偵帝起居懼涉物議乃以知樞要汪嘉努翰林學士承旨實喇卜同侍禁近實屬意托克托托克托政令日修衛士拱聽約束巴延自領諸衛精兵以揚珠布哈為屏蔽導從之盛填溢街衢而帝儀衛反落落如晨星勢熖薰灼天下之人知有巴延而已托克托深憂之私請於父瑪札爾台曰伯父驕縱已甚萬一天子震怒則吾族赤矣曷若於未敗圖之其父亦以為然托克托復質於師吳直方直方曰大義滅親大夫但知忠於國耳餘復何顧焉一日見帝乘間自陳忘家徇國之意帝猶未之信時帝前後左右皆巴延之黨獨沙克嘉巴勒阿嚕為帝腹心乃遣二人與托克托遊日以忠義之言相與往復論辨益悉其心靡他遂聞於帝帝始信之無疑及巴延搆陷剡王徹辰圖奏賜死帝未允輒殺之又擅貶宣讓威順二王帝不勝其怒決意逐之一日泣語托克托托克托亦泣下歸復與直方謀直方曰此大事議論之際左右為誰曰阿嚕及托克托穆爾直方曰子之伯父挾震主之威此輩茍利富貴其語一泄則主危身戮矣托克托乃延二人於家置酒張樂晝夜不令出遂與沙克嘉巴勒等謀欲候巴延入朝擒之戒衛士嚴宫門出入螭坳皆為置兵巴延見之大驚召托克托責之對曰天子所居防禦不得不爾然遂疑托克托亦增兵自衛至是巴延以所領衛兵請帝出田托克托勸帝稱疾不往巴延固請乃命太子雅克托郭斯出次柳林托克托遂與阿嚕等合謀悉拘京城門鑰命所親信列布城門下是夜奉帝居玉德殿召省院大臣先後入見出午門聽命夜二鼓遣集賽伊克察喇率三十騎扺營中取太子入城又召楊瑀范匯入草詔數巴延罪狀出為河南行省左丞相命平章事珠爾噶岱賫赴栁林黎明巴延遣騎士至城下問故托克托倨城上宣言有旨黜丞相一人諸從官皆無罪可各還本衛巴延奏乞陛辭不許道出真定父老奉觴酒以進巴延曰爾曾見有子殺父事乎對曰不曾見子殺父惟聞有臣弒君巴延俯首有慚色以瑪札爾台為太師右丞相托克托知樞密院詔托克托之外諸侯王不得懸帶弓箭及環刀輒入內府十月瑪札爾台辭右丞相仍為太師以托克托為中書右丞相托克托既秉政悉更巴延所行復科舉取士行太廟四時祭雪剡王之寃召還宣讓威順二王禁減鹽額蠲負逋開經筵中外翕然稱賢相焉至正三年十二月以伯勒齊爾布哈為左丞相四年五月托克托罷以阿嚕圖為中書右丞相托克托固辭相位帝問誰可代者以阿嚕圖對遂召用之封托克托為鄭王七年六月詔免太師瑪札爾台官安置於西寧時阿嚕圖罷伯勒齊爾布哈為右丞相以宿憾譛瑪札爾台故有是詔托克托力請與父俱行時相欲傾之因有告變者復移於西域察蘇之地御史大夫額琳沁巴勒曰托克托父子無大過奈何迫之於險遂召還甘肅瑪札爾尋卒九年七月復以托克托為中書右丞相初瑪札爾台卒左丞相太平請令托克托歸葬左右以為難太平固請托克托得還及拜太傅托克托不知太平之有德於己也因汝中柏讒間成隙欲中傷之是時中書參政孔思立等皆一時名人太平所拔用者悉誣以罪黜去太平既罷又誣劾之托克托母聞之謂托克托兄弟曰太平何害於汝而欲去之汝兄弟若違吾言非吾子也遂止太平故吏田復勸之自裁太平曰吾無罪當聽於天若自殺則誠有歉矣遂還奉元杜門不出十二年八月托克托自請出師伐徐州賊李二詔許之兵部尚書穆爾瑪哈穆特等言大臣天子之股肱中書庶政之根本不可一日離乞留托克托以弼亮天工庶內外有兼治之宜不報遂詔托克托以達爾罕太傅右丞相分省於外總制諸路軍馬凡爵賞誅殺悉聽便宜從事托克托尋破賊於徐州即軍中加拜太師趣還朝先是托克托弟額森特穆爾出師討劉福通駐沙河軍夜潰西臺御史范文劉希曾等劾其喪師辱國托克托庇之詔不問中臺御史周伯琦阿附托克托劾文等越分干譽乃左遷西臺御史大夫多爾濟巴勒為湖廣平章而盡出文等由是人不敢言事汝中柏等復言於托克托曰不殺多爾濟巴勒丞相終不安乃命給軍餉總兵者希指數侵辱之不為動托克托復遣助教旺扎勒至軍中諷使害之旺扎勒至謂人曰平章國家耆勳舊德吾茍害之人將不食吾餘矣多爾濟巴勒竟卒於黃州十三年正月以哈瑪爾為中書平章政事先是托克托西行也伯勒齊爾布哈為相以宿怨每欲中傷之賴哈瑪爾在上前營護得免伯勒齊爾布哈又與太平韓嘉納克圖們岱爾等十人結為兄弟及托克托復相謫太平陜西出伯勒齊爾布哈般陽圖們岱爾四川右丞誣以罪追至中途殺之而深德哈瑪爾復召用至是拜平章十四年九月托克托總制諸軍出討高郵賊張士誠尋破賊于高郵城外十二月詔削托克托官爵安置淮安以台哈布哈等代總其軍初托克托之再相信用汝中柏由左司郎中參議中書省平章以下見其議事莫敢異同惟哈瑪爾以有德於托克托不為之下汝中柏因譛之托克托改為宣政院使哈瑪爾深銜之至是嗾御史袁賽音布哈等劾托克托出師三月略無寸功傾國家之財以為己用半朝廷之官以為己隨其弟御史大夫額森特穆爾庸材鄙器玷汚清臺紀綱之政不修貪淫之心益著章三上詔以托克托老師費財已逾三月坐視冦盜恬不為意削去官爵淮安安置額森特穆爾安置寧夏以台哈布哈伊克察喇蘇蘇代將其兵詔至軍中龔伯遂曰將在軍君命有所不受且丞相出師時嘗受密旨一意進討可也詔書且勿開開則大事去矣托克托曰天子詔我而我不從是我與天子抗也君臣之義何在既受詔即出名甲名馬分賜諸將俾各帥所部以聽伊克察喇等節制客省副使哈喇岱曰丞相此行我輩必死他人之手今日寧死丞相前遂拔刀自刎而死十五年三月竄托克托於雲南初安置托克托於淮安既又移置額齊訥路至是臺臣尤論其謫輕故再徙雲南之鎮西其弟額森特穆爾徙四川碉門長子哈喇章肅州次子三寶努蘭州仍籍其家産十二月哈瑪爾矯詔殺托克托於雲南托克托既貶雲南行次大理騰衝知府髙惠欲以女事之托克托曰吾罪人也安敢念及此巽詞拒絶惠銜之至是再徙阿恰齊之地惠發軍圍之哈瑪爾又矯詔遣使賜之鴆遂卒年四十二史臣曰托克托始終不失臣節惟惑於羣小急復私怨君子病焉哈瑪爾者喀喇人與其弟蘇蘇備宿衛帝深寵眷之而哈瑪爾有口才尤為帝所嬖幸纍遷官殿中侍御史帝每即內殿與哈瑪爾以雙陸為戲一日哈瑪爾服新衣侍側帝方啜茶即噀茶於其衣哈瑪爾視帝曰天子固當如是耶帝一笑而已其被愛幸無與為比太平為左丞相深惡之與御史大夫韓嘉納克謀出哈瑪爾諷監察御史沃哷海夀列其惡劾奏之其小罪則受宣讓王等駝馬諸物其大者則設帳御幄後無君臣禮又恃以提調徽寧寺為名出入托果斯皇后宫闈無間犯分之罪尤大徽寧寺者主托果斯皇后錢糧而托果斯皇后帝庶母也章再上帝僅奪哈瑪爾蘇蘇官爵居之草地而太平等三人俱罷頃之復以托果斯皇后言奪海壽官禁錮之謫太平居陜西加韓嘉納克贓罪杖流尼嚕罕以死哈瑪爾復用初哈瑪爾嘗進西天僧以運氣術媚帝帝習為之號延徹爾法延徹爾華言大喜樂也哈瑪爾之妹壻集賢學士圖嚕特穆爾故有寵於帝與婁達實巴朗達爾瑪濟達巴勒斡爾密等俱號伊納克圖嚕特穆爾性姦狡帝愛之亦薦西番僧且琳沁於帝且琳沁善祕密法謂帝曰陛下雖尊居萬乘富有四海不過保有見世而已人生幾何當受此祕密大喜樂禪定帝又習之其法亦名雙修曰延徹爾曰祕密皆房中術也帝乃詔以西天僧為司徒西番僧為太元國師其徒皆取良家女或四人或三人奉之謂之供養於是帝日從事於其法廣取婦女惟淫戲是樂又選采女為十六天魔舞每宫中讃佛則按舞奏樂宫官受祕密戒者得入餘不與又為龍舟自後宫至前宫山下海子內遊戲八郎者帝諸弟與其所謂伊納克者皆在帝前相與褻狎甚至男女裸處號所出室曰色濟克烏格依華言事事無礙也君臣宣淫而羣僧出入禁中無所禁止醜聲著聞雖市井之人亦惡聞之皇太子年日長尤深疾圖嚕特穆爾等所為然欲去之未能也哈瑪爾既譛殺托克托遂拜中書左丞相蘇蘇亦由知樞密院拜御史大夫由是國家大柄盡歸其兄弟二人矣哈瑪爾既相自以前所進番僧為恥告其父圖嚕曰我兄弟位居宰輔宜導人主以正今圖嚕特穆爾專媚上以淫褻天下士大夫必譏笑我我將除之且上日趨昏暗皇太子年長聰明過人不若立以為帝而奉上為太上皇其妹聞之歸告其夫圖嚕特穆爾恐皇太子為帝則已必誅即以聞于帝然不敢斥言淫褻事苐曰哈瑪爾謂陛下年老故耳帝大驚曰朕頭未白齒未落遽謂我為老耶帝即與圖嚕特穆爾謀去哈瑪爾蘇蘇計已定圖嚕特穆爾走匿尼寺中明日帝遣使傳旨哈瑪爾蘇蘇毋入朝御史大夫吹斯絅因奏劾其罪帝猶不忍右丞相鼎珠等論奏不已始詔哈瑪爾惠州安置蘇蘇肇州安置臨行俱杖死仍籍其家小明王之立順帝至正十一年五月頴州妖人劉福通蕭縣李二兵起先是四方羣盜蜂起有司不能制及發丁夫開河民心益愁怨思亂有韓山童者欒城人自其祖父以白蓮會燒香惑衆謫徙永平至山童倡言天下大亂彌勒佛下生河南及江淮愚民翕然信之福通與杜遵道羅文素盛文郁王顯忠韓咬兒復鼓妖言言山童實宋徽宗八世孫當為中國主福通等乃刑白馬黑牛誓告天地遂同起兵以紅巾為號縣官捕之急山童就擒其妻楊氏及其子韓林兒逃之武安惟福通黨盛不可制朝廷乃命同知樞密院圖沁以兵擊之福通既破潁州遂據朱臯攻羅山上蔡真陽確山諸縣尋犯武陽葉縣陷汝寧府及光息二州衆至十萬李二號芝麻李亦以燒香聚衆與其黨趙均用彭早住攻陷徐州據之九月劉福通兵勢日盛右丞相托克托乃奏以其弟御史大夫額森特穆爾知樞密院事及衛王庫齊格爾總帥諸衛軍十餘萬討之復上蔡擒其黨韓咬兒誅之十二年二月定逺郭子興見汝潁兵起列郡騷動遂與其黨孫德崖等舉兵自稱元帥攻拔濠州據之徹爾布哈率兵欲復濠城憚不敢進惟日掠良民指稱為盜以邀賞由是人皆洶洶不安訛言日甚三月額森特穆爾軍潰於沙河時額森特穆爾駐軍沙河軍中夜驚盡棄軍械北奔汴梁收散卒退屯朱仙鎮朝廷以額森特穆爾不知兵遣平章曼濟代之九月右丞相托克托自出軍至徐州攻其西門賊出戰奮擊破之芝麻李遁去趙均用彭早住走濠州追擒其將數十人遂屠其城尋召托克托還朝十五年二月劉福通自碭山夾河迎韓林兒至立為皇帝又號小明王建都亳州國號宋改元龍鳯以其母楊氏為皇太后杜遵道盛文郁為丞相劉福通羅文素為平章劉六知樞密院事拆太清宫材建宫闕福通疾遵道專權命甲士撾殺之遂自為丞相十一月達實巴圖爾進擊劉福通戰於長葛大敗將士皆奔潰至中牟收散卒屯聚會劉哈喇引兵來援大破福通兵復駐汴梁十二月達實巴圖爾大破劉福通於太康遂圍亳州小明王遁安豐十七年二月劉福通遣其黨毛貴陷膠州倪文俊陷陜州李武崔德等破商州攻武關直趨長安分掠同華諸州三輔震恐俄為察罕特穆爾所敗乃退六月劉福通攻汴梁其兵分三道關先生破頭潘馮長舅沙劉二趨晉兾白不信大刀敖李喜喜趨關中毛貴據山東其勢大振十二月太尉達實巴圖爾卒于軍時劉福通攻陷曹濮大名衛輝諸路達實巴圖爾引兵擊之詔遣知樞密院事達爾瑪實哩來援分兵于雷澤濮州以禦福通達爾瑪實哩戰沒諸軍大潰達實巴圖爾退駐石村朝廷疑其玩冦失機使者趣戰相踵敵覘知之詐為達實巴圖爾通好書遺諸路使者果得之以進達實巴圖爾聞之憂憤死十八年五月劉福通攻汴梁守將珠展出走福通入據其城乃自安豐迎其主韓林兒居之以為都秋七月懷慶路守將周全叛附于劉福通時察罕特穆爾駐軍洛陽遣拜特穆爾以兵守碗子城周全來戰拜特穆爾為其所殺遂盡驅懷慶民入汴梁福通遣全攻洛陽守將登城以大義責全全愧謝退兵福通殺之十九年八月察罕特穆爾克汴梁劉福通復以其主韓林兒走據安豐二十三年二月張士誠將吕珍入安豐殺劉福通據其城二十六年十二月小明王韓林兒卒察罕特穆爾克復之功順帝至正十二年十二月以察罕特穆爾為汝寧府達嚕噶齊先是汝潁盜起江淮諸郡皆殘破朝廷徵兵致討卒無成功潁州沈邱人察罕特穆爾奮起義兵沈邱子弟願從者數百人與羅山李思齊同設竒計襲破羅山事聞朝廷授察罕特穆爾汝寧府達嚕噶齊思齊知府事於是所在義士俱將兵來會得萬人自成一軍屯沈邱數與賊戰輒克捷十五年汝潁賊勢滋盛由汴以南陷鄧許嵩洛等州察罕特穆爾引其兵轉戰而北遂戍虎牢以遏鋒賊乃北渡孟津焚掠至覃懷河北震動察罕特穆爾進戰大敗之餘黨立柵河洲殱之無遺類河北遂定朝廷竒其功除中書刑部侍郎苗軍以滎陽叛察罕特穆爾夜襲之虜其衆遂營中牟已而淮右賊衆三十萬掠汴以西來搗中牟營察罕特穆爾結陳待之以死生利害諭士卒士卒賈勇決死戰無不以一當百會大風揚沙自率猛士鼓譟從中起奮擊賊中堅賊勢披靡不能支棄旗鼓遁走追殺十餘里斬首無算軍勢大振十六年汝潁賊李武崔德等陷陜州遂斷殽函勢欲趨秦晉知樞密院事達實巴圖爾方節制河南軍調察罕特穆爾及李思齊往攻之察罕特穆爾即鼓行而西夜拔殽陵立柵交口陜城堅賊轉南山粟給食固守攻之猝不可拔察罕特穆爾乃焚馬矢營中如炊煙狀以疑賊而夜提兵拔靈寶城賊始覺不敢動渡河掠安邑察罕特穆爾追襲以鐵騎蹙之賊回扼下陽赴水死者甚衆賊勢窮遁去以功加河北行樞密院事十七年劉福通遣其黨毛貴陷膠州倪文俊陷陜州李武等破商州攻武關遂直趨長安掠同華諸州三輔震恐其時行臺豫王喇特納錫哩及省院官皆洶懼計無所出侍御史王思誠曰察罕特穆爾之名賊素畏之宜遣使求援此上䇿也守將恐其軋已論久不決思誠曰吾兵弱朝夕失守咎將安歸乃移書察罕特穆爾曰河南陜西二省互為唇齒陜西危則河南豈能獨安察罕特穆爾新復陜州得書大喜遂提輕兵五千與李思齊倍道赴援遇賊轉戰殺掠無算賊遂潰捷聞朝廷以察罕特穆爾為陜西行省左丞未幾賊自巴蜀陷秦隴據鞏昌遂窺鳯翔察罕特穆爾即先分兵入守鳯翔城而遣諜者誘賊圍鳯翔察罕特穆爾自將鐵騎晝夜馳二百里赴之分軍張左右翼掩擊城中軍亦開門鼓譟而出內外合擊呼聲動天地賊大亂自相踐蹂斬首數萬級餘黨皆遁關中遂定十八年賊毛貴等陷山東遂分道犯京畿朝廷徵諸道兵入衛詔察罕特穆爾以兵屯涿州察罕特穆爾即留兵戍清湫義谷屯潼關塞南山口以備他盜而自將鋭卒赴召時曹濮賊方分道踰太行焚上黨掠晉冀陷雲中鴈門上郡烽火數千里復大掠南還察罕特穆爾先遣兵伏南山阻隘自勒重兵屯聞喜絳陽賊果出南山縱伏兵橫擊之賊皆棄輜重走山谷遂分兵屯澤州塞碗子城屯上黨塞吾兒谷屯並州塞井陘口以杜太行諸道賊屢至守將數血戰擊却之河東遂定進陜西行省右丞兼行臺侍御史同知河南行樞密院事於是朝廷乃詔察罕特穆爾守禦關陜晉冀撫鎮漢沔荆襄便宜行事察罕特穆爾益務練兵訓農以平定四方為己責是年劉福通陷汴梁造宫闕易正朔號召羣盜自巴蜀荆楚江淮齊魯遼西至甘肅所在兵起勢相聯結察罕特穆爾乃北塞太行南守鞏洛自將中軍軍沔池將謀取汴會叛將周全以賊軍攻洛陽察罕特穆爾以竒兵出宜陽破之進陜西行臺平章政事仍兼同知行樞密院事十九年察罕特穆爾以大軍次虎牢先發遊騎南道出汴南略歸亳陳蔡北道出汴東戰船浮于梁水陸並下略曹南據黃陵渡乃大發秦兵出函谷過虎牢晉兵出太行踰黃河俱會汴城下首奪其外城察罕特穆爾自將鐵騎屯杏花營諸將環城而壘賊屢出戰輒敗遂嬰城以守乃夜伏兵城南旦日遣苗軍跳梁者略城而東賊傾城出追伏兵鼓譟起邀擊敗之又令弱卒立柵外城以餌賊賊出爭之佯走薄城西因縱鐵騎突擊悉擒其衆賊由是不敢復出自五月至八月諜知城中計窮食且盡乃與諸將關思孝等議各分門而攻至夜將士賈勇登城斬關入遂拔之劉福通挾其偽主從數百騎出東門遁去捷聞進河南平章政事兼樞密陜西行臺御史中丞詔告天下先是中原亂江南海漕不復通京師屢告飢至是河南既定檄書達江浙海漕乃復至二十一年察罕特穆爾克山東先是察罕特穆爾既定河南乃以兵分鎮關陜荆襄河洛江淮而重兵屯太行營壘旌旗相望數千里乃日修車船繕兵甲務農積榖訓練士卒謀大舉以復山東至是諜知山東羣盜自相攻殺而濟寧田豐亦降于賊六月察罕特穆爾乃輿疾自陜扺洛大會諸將與議師期發並州軍出井陘遼沁軍出邯鄲澤潞軍出磁州懷衛軍出白馬及汴洛軍水陸俱下分道並進而自率鐵騎建大將旗鼓渡孟津踰覃懷鼓行而東復冠州東昌八月師至鹽河遣其子庫庫特穆爾及諸將以精兵五萬搗東平與東平賊遇兩戰皆敗之斬首萬餘級直抵其城下察罕特穆爾以田豐據山東久軍民服之乃遣書諭以順逆之理豐及王士誠皆降遂克東平濟寧時大軍猶未渡羣賊皆聚于濟南而出兵齊河禹城拒戰察罕特穆爾分遣竒兵取間道出賊後南略泰安逼益都北徇濟陽章邱中循濵海郡邑乃自率大軍渡河與賊將戰于分齊大敗之進逼濟南城而齊河禹城俱來降南道諸將亦報捷再敗益都兵于好石橋東至海濵郡邑皆聞風送欵攻圍濟南三月城乃下詔拜中書平章政事知河南山東行樞密院事陜西行臺中丞如故察罕特穆爾遂進兵圍益都環城列營凡數十大治攻具百道並進賊悉力拒守復掘重塹築長圍遏南洋河以灌城中仍分守要害收輯流亡郡縣户口再歸職方號令煥然二十一年察罕特穆爾為田豐所殺時山東俱平獨益都孤城猶未下六月田豐王士誠陰結賊復圖叛豐之降也察罕特穆爾推誠待之不疑數獨入其帳中豐既謀變乃請察罕特穆爾行觀營壘衆以為不可往察罕特穆爾曰吾推心待人安得人人而防之左右請以力士從又不許乃從輕騎十有一人行至王信營又至豐營遂為王士誠所刺先是有白氣如索長五百餘丈起危宿掃太微垣太史奏山東當大水帝曰不然山東必失一良將即馳詔戒察罕特穆爾勿輕舉未至而已及於難詔贈潁川王諡忠襄命其子庫庫特穆爾為平章政事兼知山東河南行樞密院事代總其兵庫庫特穆爾既襲父職身率將士誓必復讐而賊城守益堅乃遣壯士穴地通道以入十一月遂拔其城執賊首陳猱頭等二百餘人取田豐王士誠之心以祭其父餘黨皆就誅復遣兵取莒州山東平東南喪亂順帝至正八年十一月台州黃巖民方國珍兵起初國珍與蔡亂頭等相讐殺遂入海為亂劫掠漕運詔江浙參政多爾濟巴勒討捕之追至福州國珍知事危焚舟將遁我兵自相驚潰多爾濟巴勒遂被執國珍迫其上招降之狀朝廷從之授國珍兄弟以官將治多爾濟巴勒之罪樞密參議歸暘曰將之失利其罪固當然所部皆北方步騎不習水戰是驅之死地耳宜募海濱之民習水利者擒之今國珍遣人請降決不當從國珍已敗我王師又拘我王臣力屈而來非真降也必討之以令四方時朝廷方事姑息卒從其請國珍兄弟不肯赴勢益猖獗十一年六月方國珍兄弟入海燒掠沿海州郡朝廷遣江浙行省左丞博囉特穆爾往擊之兵至大閭洋國珍夜率徑卒縱火鼓譟官軍不戰皆潰赴水死者過半博囉特穆爾被執反為國珍飾詞上聞朝廷復遣達實特穆爾等至黃巖招國珍國珍兄弟皆登岸羅拜退止民間紹興總管台哈布哈欲命壯士襲殺之達實特穆爾曰我受詔招降公等欲擅命耶乃止仍檄台哈布哈至海濱散其徒衆授國珍兄弟官有差十月蘄州人徐夀輝等兵起攻陷蘄水縣及黃州路夀輝自稱皇帝國號天完改元治平以鄒普勝為太師攻陷饒州執魏中立陷信州執于大本二人不屈並死之十二年正月徐夀輝兵陷漢陽遂陷武昌行省丞相威順王科綽布哈等棄城走夀輝兵復陷安陸府知府綽羅戰不勝死之攻沔陽推官俞述祖戰敗被執不屈夀輝怒支解之二月徐夀輝兵攻九江右丞博囉特穆爾方駐兵于江聞風宵遁總管李黼檄鄉落聚木石于險處遏其歸路黃梅主簿伊遜特穆爾願出擊賊黼與之出戰大敗賊兵殺獲二萬餘人黼曰賊不利於陸必以舟薄我乃令以長木數千冒鐡椎于杪暗植沿岸水中賊舟數千艘順流鼓譟而至遇木樁不得動黼發火箭射之焚溺無算時東際淮甸西自荆湖守臣往往棄城遁獨黼守孤城中外援絶而賊勢益熾進兵薄城分省平章托卜堅布哈自北門出走黼引兵登埤賊已焚西門張弩射之轉攻東門黼急往救城已破賊兵入矣猶與之巷戰力不能敵乃揮劍叱之曰殺我無殺百姓賊刺之墮馬與兄冕子秉昭俱死州民聞之哭聲震地具棺葬之時冕居潁亦死于賊事聞贈黼隴西公諡文忠三月台州路達嚕噶齊台哈布哈與方國珍戰于澄江死之時朝廷方征徐州命江浙募舟師北守大江國珍懷疑復劫其黨入海台哈布哈遣義士王大用往諭國珍拘留不遣而令其黨陳仲達往來議降台哈布哈具舟張受降旗乘潮下澄江觸沙不行垂與國珍遇呼仲達申前議仲達目動氣索台哈布哈覺其心異手斬之即前摶賊船奮擊之賊羣至欲抱持入其船台哈布哈嗔目叱之奪刀殺賊賊攢槊刺之中頸死猶植立不仆投其尸海中事聞追贈魏國公諡忠介七月徐夀輝遣項普略引兵掠徽饒諸州遂犯昱嶺關攻杭州城城中猝無備參政樊執敬遽上馬率衆出中途與賊遇乃奮力斫賊中鎗而死時董搏霄從江浙平章嘉琿征安豐乘勝攻濠州會朝廷命移軍援江南遂渡江至德清而杭州已陷嘉琿問計摶霄曰賊見杭城子女玉帛必縱欲不暇為備宜急攻之若退保湖州使賊乘鋭出京口則江南不可為矣嘉琿猶豫未決諸將亦難其行搏霄曰公江浙相君方面既陷而及今不取誰任其咎復拔劍顧諸將曰相君在此敢有慢令者斬遂進兵薄杭州賊迎敵麾壯士突前諸軍相繼夾擊凡七戰追殺至清河坊賊奔接待寺塞其門而焚之賊皆死遂復杭州已而餘杭武康德清亦次第平搏霄亦受代去徽饒賊復自昱嶺關冦於濳行省乃假摶霄為參政復提兵討之搏霄即日引兵扼新溪追殺至於潛復其縣又復昱嶺關賊兵復大至陷千秋關摶霄按軍不動伏兵城下授以火炮約曰見旗動即發已而視賊稍懈進兵擊之伏兵見旗動盡發遂奪千秋關賊復攻獨松百丈幽嶺三關搏霄先以兵守要路分三道會兵搗賊巢乘勝復安吉尋克廣德賊復犯徽州有道士能作十二里霧搏霄伏兵擊之已而妖霧開伏兵皆起賊大潰斬首數萬級徽州復平九月以余闕為淮西宣慰副使守安慶時冦兵日盛闕扺官十日而賊至拒却之乃集有司諸將議屯田戰守䇿環境築堡寨選精甲外捍而耕稼於中浚湟增陴隍外環以大防深塹三重南引江水注之環植木為柵城上四面起飛樓表裏完固俄升都元帥廣西苗軍五萬從元帥阿爾斯蘭沿江下抵廬州闕移文謂苗蠻不當使窺中國詔阿爾斯蘭引還苖兵有暴于境者即收戮之凛凛莫敢犯時羣盜環布四外闕居其中左提右挈屹為江淮一保障十一月江西行省平章政事桑節擊趙普勝戰于湖口兵敗死之桑節初為南臺御史大夫執政惡之出為湖廣平章至是移江西桑節馳赴任比至江東復有詔令守江州時江州已陷趙普勝周驢等據池陽太平諸郡號百萬桑節募兵得三千人趨銅陵克之擒驢奪其船六百艘軍聲大振遂復池州分兵攻石埭諸縣進據清水灣又大破之賊久圍安慶聞風燒營遁去遂進復湖口縣克江州留兵守之命王惟恭樹柵小孤山桑節自據番陽口綴江西要衝以圖恢復日久援不至賊乘大艦來攻編葦篾塞上下流火之桑節率兵力戰衆死且盡桑節獨堅坐不動中流矢而仆賊素聞其名不忍害舁至密室乃蘇羅拜餽食桑節叱之七日乃自力而起北向再拜曰臣力竭矣遂絶桑節河西人楚斯結之子十三年五月泰州白駒場亭民張士誠及其弟士德士信起兵陷泰州淮南行省遣知府李齊招降被留久之賊酋自相戕始縱齊來歸士誠尋殺參政趙璉陷興化縣行省以左丞偰哲篤鎮高郵出齊守甓社湖會數賊呼譟入城省憲官皆遁齊還城門已閉士誠遂據高郵稱誠王國號大周建元天祐已而有詔赦之使至不得入賊紿言請李知府來乃受命行省強齊往至則下齊于獄齊雖辨説百端而士誠本無降意士誠呼齊使跪齊叱曰吾膝如鐵豈為賊屈士誠怒使拽倒椎碎其膝而咼之時論大科三魁若李黼台哈布哈及齊皆不負科名云十月以方國珍兄弟為各路治中不受先是遣江浙左丞托里特穆爾及南臺侍御史尊達實哩復招諭國珍既而二人報國珍已降乞授以五品流官令納其船散遣徒衆遂以國珍為徽州路治中國章廣德路治中國英信州路治中國珍等疑懼不受命仍擁船千艘據海道阻絶糧運復遣江浙右丞阿哩衮實克等率兵討之十二月江浙行省布延特穆爾及西寧王雅克哈尚等合軍討徐壽輝于蘄水壽輝敗走獲其官屬四百人初徐壽輝將王善既陷羅源遂攻福州連江縣巡檢劉濬募壯士與其子健數與力戰濬中箭墜馬健下馬掖之俱被執濬罵賊而死健亦以死拒賊善義而釋之使瘞父尸健歸請帥府兵以復讐弗聽因盡散家資結死士百人詐為工商流丐入賊中半夜發火大譟賊驚擾自相殺健手斬殺其父者並擒善獻于帥府事聞贈濬行省檢校授健古田令十四年六月張士誠冦楊州達實特穆爾兵敗諸軍皆潰士誠尋陷盱𣅿及泗州十五年春正月徐壽輝遣其將倪文俊復破沔陽威順王科綽布哈令其子報恩努等同元帥阿爾斯蘭水陸並進討之至漢川水淺文俊用火篾燒船兵遂敗報恩努被殺三月徐壽輝兵破襄陽五月倪文俊自沔陽復破中興路元帥多爾濟巴勒戰死十六年正月倪文俊建都于漢陽迎徐壽輝據之未幾復陷常德澧州諸路二月張士誠陷平江路據之改為隆平府遂陷湖州松江常州諸路初或傳士誠有降意朝廷遣烏瑪喇孫撝持詔往諭之士誠拘之一室迫使降撝詬斥不絶及士誠徙平江撝與士誠部將張茂先者謀遣人約鎮南王刻日進兵復髙郵事泄被害三月方國珍復降命為海道漕運萬戶其兄國璋為衢州路總管七月張士誠遣兵破杭州江浙丞相達實特穆爾遁平章尊逹實哩力戰死先是達實特穆爾兵屢敗議者以為苗軍可用遂自寶慶招土官楊旺扎勒至淮南殺賊以功屢官江浙行省參政至是士誠兵破杭州達實特穆爾兵入富陽旺扎勒乃自嘉興引苗軍及萬户普賢努擊敗士誠兵復其城達實特穆爾乃還然苗軍素無紀律肆為鈔掠所過蕩然無遺達實特穆爾方倚旺扎勒為重莫敢禁遏旺扎勒益恣凡事皆決于旺扎勒達實特穆爾僅署成案而已是年淮安城陷亷訪使楮布哈死之楮布哈居羣盜間守淮安者五年大小數百戰糧盡食草木螺蛤魚蛙烏燕及靴皮鞍韂革廂弓之筋俱盡撤屋為薪人皆露處城陷布哈猶據西門力鬭中傷見執為賊所臠子巴噶亦死十七年八月張士誠侵嘉興楊旺扎勒敗之士誠乃以書約降旺扎勒欲納之達實特穆爾以其反覆不可信不許旺扎勒固勸乃承制假江浙亷訪使周伯琦行省參政至平江招諭之士誠始要王爵不許又請為三公旺扎勒亦力為之請達實特穆爾幸其降遂授士誠太尉其弟士德淮南平章士信同知樞密院事其黨皆授官有差於是朝廷以招安士誠為達實特穆爾之功加太尉九月徐壽輝將陳友諒殺倪文俊併其軍自稱平章十八年正月陳友諒破安慶淮南行省左丞余闕死之先是余闕固守安慶倚小孤山為藩蔽命義兵元帥胡巴延統水軍戍守友諒自上流引軍直搗山下巴延與戰四日夜不勝奔還賊追薄城下闕遣兵扼之俄而饒冦攻西門友諒兵乘東門既登城闕揀死士奮擊敗之敵兵恚甚乃並軍樹柵起飛樓來攻闕分兵捍敵晝夜不得息至是池州趙普勝軍東門友諒軍西門饒兵軍南門闕徒步提戈為士卒先分遣部將督三門之兵自以孤軍血戰斬首無算而闕亦被十餘創日中城陷火起闕知不可為乃引刀自剄墮清水塘中死妻蔣氏及妾伊伯耶律氏子德臣女安安甥福童亦皆赴井死同時死者守臣韓建一家被害居民誓不從賊焚死者以千計其知名者萬户李宗可紀守仁陳斌金承宗經歷段桂芳都事特穆爾布哈千户盧廷玉葛延齡邱卺許元琰奏差烏德美百户黃寅孫安慶推官黃圖嚕岱經歷楊恆知事余中懷寧縣尹陳巨濟事聞贈闕平章政事追封豳國公諡忠宣四月陳友諒破龍興時和尼齊以左丞守洪都舊帥多通任其將章巴延布哈雅克布哈捍城頗有功和尼齊疾而撓之城陷和尼齊出走多通奔撫州謀舉兵為追者所殺友諒盡陷江西諸路十九年六月陳友諒遣其黨王奉國冦信州巴延布哈德濟自衢往援破走其兵時鎮南王子大聖努屯兵城中開門出迎巴延布哈登城四顧誓以破賊自許後數日賊又來攻遂分兵為三出城奮擊斬首數千級復大破之友諒弟友德植木柵攻城益急又遣使來説降巴延布哈德濟曰汝來誘我耶我頭可斷足不可移乃數其罪而斬之由是日夜鏖戰糧竭矢盡而氣不衰城中食草苗茶紙括靴底掘鼠羅雀殺老弱以食巴延布哈屢出兵破賊奉國遂穴地道晝夜攻之不息踰旬城遂陷巴延布哈德濟與大聖努及部將哈喇丹蔡誠蔣廣皆戰死初巴延布哈德濟之赴援也入白其母鮮于氏曰兒今不得事母矣母曰爾為忠臣吾亦何憾因命子額森布哈奉其母間道入閩以江東亷訪司印送行臺而提兵向信鮮于氏太常典簿樞之女十二月陳友諒徙其主徐壽輝都江州自稱漢王初徐壽輝友諒破龍興欲徙都之友諒忌其來不利於已不從至是壽輝引兵發漢陽南下江州友諒陽出迎而伏兵於城西俟夀輝既入門閉伏發盡殺其部曲惟存壽輝以江州為都居之遂自稱漢王立王府置官屬事權盡歸友諒壽輝惟擁虛位而已二十年五月陳友諒弒其主徐壽輝先是友諒率舟師犯太平挾壽輝以行太平既陷急謀僣竊乃於采石舟中佯使人詣壽輝前白事令壯士持鐵撾自後擊之碎其首壽輝死友諒遂於采石五通廟為行殿稱皇帝國號漢改元大義仍以鄒普勝為太師張必先為丞相羣下立江岸草次行禮值天雨至略無儀節二十三年九月張士誠自稱吳王士誠雖降而城池甲兵錢榖皆自據如故又素忌楊旺扎勒欲圖之而達實特穆爾亦厭旺扎勒驕肆不可制乃陰與定計舉兵圍之旺扎勒及其弟巴延皆自殺士誠遂遣兵據杭城朝廷因以其弟士信為江浙行省平章事方面大權悉歸張氏達實特穆爾徒擁虛名而已至是士誠乃令其部屬自頌功德求王爵朝廷未許士誠遂自立為吳王即平江治宫室官屬達實特穆爾飲藥死是年陳友諒與明兵戰敗中流矢死國亡士誠二十七年始滅方國珍亦降于明諸帥之爭博囉齊李思庫庫弼張良順帝至正十九年三月詔博囉特穆爾移鎮大同博囉特穆爾者達實巴圖爾之子也從父討劉福通等屢立戰功父沒命為河南行省平章政事代總其衆擊福通於衛輝走之遂屯真定復自武安由彭城邀截沙劉等敗之引兵攻拔曹州至是朝廷命博囉特穆爾移鎮大同以為京師捍蔽復置大都督兵農司分十道専督屯田以博囉特穆爾領之二十年八月詔博囉特穆爾守石嶺關以北察罕特穆爾守石嶺關以南初山西晉冀之地皆察罕特穆爾所平定而博囉特穆爾兵駐大同欲併據晉冀遂相讐隙故有是詔九月博囉特穆爾復調兵自石嶺關直抵晉冀圍其城三日退屯交城察罕特穆爾發兵拒之朝廷遣使諭令講和未幾復命以晉冀畀博囉特穆爾察罕特穆爾不從遣部將算卓等來爭交戰于東勝州等處朝廷為再遣使諭解二人始各還鎮二十一年冬十月博囉特穆爾復進屯真定時察罕特穆爾被害子庫庫特穆爾代其任博囉特穆爾結張良弼欲復圖晉冀引兵侵庫庫特穆爾分地遂據真定路二十二年六月博囉特穆爾遣珠展襲據陜西時陜西行省右丞達實特穆爾與行台有隙恐陜西為庫庫所有陰結博囉請珠展入城劫御史大夫旺扎勒特穆爾印復拘留之庫庫遣部將摩該合李思齊兵攻之珠占遂降二十三年十二月御史大夫婁達實罷安置東勝州婁達實逃匿博囉軍中時帝在位久皇太子春秋日盛軍國之事皆其所臨決皇后竒氏乃謀內禪太子而使宦者􅊶布哈喻意於丞相太平太平不答遂罷去吹斯絅為丞相帝益厭政布哈乘間用事與吹斯絅相表裏四方警報皆抑不聞中外憂憤宣政院事托歡與之同惡為國大蠧於是監察御史也先特穆爾孟額森布哈傅公讓等乃劾奏􅊶布哈托歡姦邪當屏黜御史大夫婁達實以其事聞皇太子執不下而皇后庇之尤固御史皆坐左遷治書侍御史陳祖仁連上皇太子書切諫之而臺臣大小皆辭職皇太子乃為言于帝令二人姑辭退而祖仁言猶不已又上帝書言二人亂階禍本今不芟除後必不利侍御史李國鳳亦上書爭之由是帝大怒國鳳祖仁等亦皆左遷時婁達實執其事頗力皇太子因惡之而皇后又譛之於內帝以婁達實母舅故封為雍王遣歸國已而復以􅊶布哈為崇政院使婁達實至大同遂留博囉特穆爾軍中皇太子屢索之不遣二十四年三月詔削博囉特穆爾官爵時皇太子方倚庫庫特穆爾為外援而怨博囉特穆爾匿婁達實不遣吹斯絅包布哈遂誣博囉特穆爾與婁達實等謀不軌詔削其官使解兵柄歸四川博囉拒命不受夏四月詔庫庫特穆爾討博囉博囉知詔命調遣皆吹斯絅所為遂令托卜堅特穆爾舉兵向闕托卜堅兵入居庸關知院伊蘇詹事布埒齊迎戰不利皇太子率侍衛兵出光熙門東走古北口趨興松托卜堅兵至清河列營時京師無備城中大震令百官吏卒分守京城使達勒達國師至其軍問故托卜堅以必得吹斯絅包布哈為對詔慰解之不聽乃執吹斯絅包布哈二人畀之遂復博囉官爵總兵事托卜堅率兵自建德門入覲帝于延春閣慟哭請罪帝宴賚之加博囉太保仍守禦大同托卜堅為中書平章政事五月皇太子出奔至嚕爾嶺詔追及之令還宫皇太子恚怒不已遂命庫庫特穆爾調兵分道以討博囉其東道以白算卓領兵三萬守禦京師中道以摩該珠展領兵四萬西道以關保領兵五萬合擊之關保等進逼大同博囉留兵守大同而自率兵與托卜堅婁達實復大舉向闕六月白算卓以兵至京師秋七月博囉前鋒入居庸關皇太子親率兵禦于清河軍士皆無鬭志太子馳還都城白算卓引兵入平則門遂扈從太子由雄霸河間取道走冀寧博囉進軍駐健德門外與托卜堅婁達實入見帝博囉欲追襲皇太子婁達實止之帝以博囉為中書左丞相尋進右丞相節制天下軍馬婁違實為平章政事托卜堅特穆爾為御史大夫二十五年三月皇太子下令庫庫特穆爾軍中討博囉特穆爾博囉聞之遂出二皇后竒氏幽於諸色總管府頃之逼后還宫取印章偽為后書召太子復逼后出而幽之遣托卜堅特穆爾率衆攻上都之附太子者調伊蘇南禦庫庫特穆爾兵伊蘇次良鄉不進謀之于衆皆以博囉悖逆中外同憤遂勒兵歸永平遣人西連庫庫特穆爾東連遼陽諸王共討博囉軍聲大振博囉患之遣驍將姚巴延布哈出拒至通州河溢營虹橋以待伊蘇出其不意襲破之擒斬姚巴延博囉大怒自將出通州三日大雨而還時后亦數納美女於博囉至百日始還宫秋七月博囉特穆爾伏誅博囉先嘗以疑殺其將保安既又失姚巴延鬱鬱不樂乃日與婁達實等飲宴荒淫無度又酗酒殺人喜怒不測威順王之子華善忿其無君數言于帝受密旨與徐士本謀結勇士上都曼濟諾海拜達勒等陰圖刺殺之至是托卜堅特穆爾遣使上告征上都之捷博囉入奏行至延春閣下拜達勒自衆中奮出斫之中其腦死婁達實趨出擁博囉家屬北遁詔盡殺其部黨托卜堅引輕兵走巴爾斯之地朝廷遣使函博囉首往冀寧召太子還京師九月庫庫特穆爾扈從太子至京師詔以庫庫為中書左丞相知樞密院事太子之奔太原也欲用唐肅宗故事自立庫庫特穆爾與布哷齊等不從及還京師皇后竒氏傳旨令庫庫特穆爾以重兵擁太子入城欲脅帝禪之位庫庫特穆爾知其意比至京師三十里即散遣其軍由是皇太子心銜之十月樞密副使觀音努獲婁達實誅之托卜堅特穆爾尋亦被誅閏月封庫庫特穆爾為河南王還視師是時中原無事而江淮川蜀皆已陷沒皇太子屢請躬出督師征討帝難之乃詔封庫庫河南王代之親征總制關陜晉冀山東諸道並迤南一應軍馬便宜行事庫庫特穆爾於是分省自隨官屬之盛等於朝廷二十六年二月庫庫特穆爾移軍懷慶未幾又移彰德調度各處軍馬二十七年李思齊張良弼圗嚕卜自會于含元殿推李思齊為盟主同拒庫庫特穆爾初李思齊與察罕特穆爾同起義師齒位相等夷及是庫庫特穆爾代總其兵思齊心不能平而張良弼首拒命孔興圖嚕卜等亦皆以功自恃各請别為一軍不相屬庫庫特穆爾遣關保圭林齊以兵西攻良弼于鹿臺而思齊遂與良弼合兵連不能解庫庫特穆爾始受命南征反退居彰德惟思用兵陜西由是朝廷始疑其有異志秋七月詔皇太子總制天下軍馬詔略曰曩者障塞決河本以拯民昏墊豈期妖盜橫造訛言簧鼓愚頑塗炭郡邑殆遍海內兹逾一紀故察罕特穆爾仗義興師獻功敵愾汛掃汴洛克平清濟其子庫庫特穆爾克繼先志用成駿功皇太子阿裕爾實哩達喇計安宗社屢請出師朕以國本至重遂授庫庫特穆爾總戎重寄俾代其行李思齊張良弼等各懷異見搆兵不已以致盜賊愈熾深遺朕憂詢諸衆謀咸謂皇太子宜遵舊典總帥天下兵馬其庫庫特穆爾自潼關以東肅清江淮李思齊自鳯翔以西與侯布延達實進取川蜀少保圖嚕及張良弼孔興圖嚕卜共取襄樊詔書到日悉宜洗心滌慮共濟時艱朝廷屢促庫庫特穆爾出師江淮庫庫僅遣其弟托音特穆爾及摩該往山東而與張良弼搆兵不已詔下和講之庫庫戕殺使臣跋扈之迹漸張朝廷疑之故有是詔冬十月詔罷庫庫特穆爾兵柄初詔書雖下皇太子亦竟止而不行而分兵之命庫庫特穆爾終捍拒不肯受於是摩該關保等皆叛庫庫特穆爾關保自察罕特穆爾起兵以來即為將勇冠諸軍功最高而摩該善論兵尤為察罕特穆爾所信任及是兩人見庫庫特穆爾有不臣之心故皆叛之列其罪狀間于朝舉兵共攻之而皇太子用實喇達哩塔喇實克巴延特穆爾李國鳯等計立撫軍院總制天下軍馬專備庫庫特穆爾以摩該能倡大義賜號忠義功臣落庫庫特穆爾太傅中書左丞相依前河南王以汝州為食邑與弟托音特穆爾同居河南府從行官屬悉令還朝諸軍在帳前者白算卓圭林齊領之在河南者李克彞領之在山東者伊蘇領之在山西者實喇達哩領之在河北者摩該領之庫庫特穆爾既聞詔即退軍還澤州詔又命圖嚕與李思齊張良弼孔興圖嚕卜率兵東向以正天討明年朝廷命左丞孫景逸分省太原關保以兵為之守庫庫特穆爾即遣兵據太原盡殺朝廷所置官皇太子乃命魏賽音布哈及關保皆以兵與思齊良弼諸軍夾攻澤州又下詔削奪庫庫特穆爾爵邑令諸軍共誅之庫庫特穆爾乃退守平陽而關保遂據澤潞二州以與摩該合時李思齊張良弼孔興圖嚕卜等與庫庫特穆爾相持既久明兵時已及河南思齊等乃遣使詣庫庫特穆爾告以出師非本心遂解兵大掠西歸獨摩該復攻平陽當是時庫庫特穆爾氣稍沮而關保摩該勢甚振數請戰庫庫特穆爾不應或師出即復退一日諜知摩該分軍掠祁縣即夜出師薄其營擊之大敗其衆摩該關保皆就擒朝廷聞之遽罷撫軍院而塔喇實克巴延特穆爾李國鳯等以誤國皆受誅既而庫庫特穆爾上疏自陳其情朝廷復下詔滌其前非時聞明兵已定山東及河洛中原俱不守帝乃下詔復命庫庫特穆爾仍前河南王中書左丞相以兵南下伊蘇兵趨山東圖嚕出潼關李思齊出七盤金商圖復汴洛未幾伊蘇兵潰思齊兵亦未嘗出庫庫特穆爾又自平陽退守太原不敢復南向事已不可為矣已而明兵迫京師帝北奔國遂以亡及明兵至太原庫庫特穆爾即棄城遁領其餘軍西奔于甘肅後不知所終元史紀事本末卷四
